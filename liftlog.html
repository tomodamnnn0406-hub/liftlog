<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f97316">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lift Log">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Lift Log</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--card:#1a1a1a;--card2:#222;
  --accent:#f97316;--accent-dim:rgba(249,115,22,0.12);
  --text:#f0f0f0;--muted:#777;--border:#2a2a2a;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;
  --purple:#a855f7;
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.14);
}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  display:flex;flex-direction:column;max-width:480px;margin:0 auto;min-height:100vh;
  touch-action:manipulation;            /* disable double-tap-to-zoom */
}

/* ── Header ── */
#header{
  padding:calc(env(safe-area-inset-top) + 12px) 20px 12px;
  display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--bg);z-index:10;
}
#header-title{font-size:20px;font-weight:800;letter-spacing:-0.5px}

/* ── Main ── */
#main{flex:1;overflow-y:auto;padding:16px 20px calc(88px + env(safe-area-inset-bottom))}

/* ── Nav ── */
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:var(--card);
  border-top:1px solid var(--border);display:flex;
  padding:8px 0 calc(12px + env(safe-area-inset-bottom));z-index:10;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;color:var(--muted);font-size:10px;
  cursor:pointer;padding:6px 2px;transition:color .15s;
  min-height:44px;-webkit-tap-highlight-color:transparent;
}
.nav-btn svg{width:22px;height:22px}
.nav-btn.active{color:var(--accent)}

/* ── Cards ── */
.card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.card-sm{background:var(--card2);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border)}

/* ── Typography ── */
.label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px}
.muted{color:var(--muted)}
.accent{color:var(--accent)}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:12px 16px;border-radius:10px;border:none;
  font-size:14px;font-weight:600;cursor:pointer;
  transition:opacity .15s,transform .1s;font-family:inherit;
  min-height:44px;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.btn:active{transform:scale(.97);opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:none}
.btn-accent-outline{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent)}
.btn-pause{background:rgba(239,68,68,.12);color:var(--red);border:1px solid var(--red)}
.btn-ghost{background:none;border:none;color:var(--muted);padding:8px 10px}
.btn-sm{padding:8px 12px;font-size:12px;border-radius:8px;min-height:36px}
.btn-full{width:100%;justify-content:center}

/* ── Inputs ── */
input,textarea,select{
  width:100%;background:var(--card2);border:1px solid var(--border);
  border-radius:10px;padding:12px 12px;color:var(--text);font-size:16px;
  outline:none;transition:border-color .15s;font-family:inherit;
  -webkit-appearance:none;appearance:none;
  min-height:44px;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
.input-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}

/* ── Select arrow ── */
.select-wrap{position:relative}
.select-wrap::after{
  content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none;font-size:14px;
}
.select-wrap select{padding-right:36px}

/* ── Sets ── */
.sets-header{
  display:grid;grid-template-columns:28px 1fr 1fr 1fr 44px;
  gap:6px;padding:0 2px;margin-bottom:4px;
}
.sets-header span{font-size:10px;color:var(--muted);text-align:center}
.set-row{
  display:grid;grid-template-columns:28px 1fr 1fr 1fr 44px;
  gap:6px;align-items:center;margin-bottom:4px;
}
.set-num{text-align:center;font-size:13px;color:var(--muted);font-weight:600}
.set-row input{padding:10px 4px;text-align:center;border-radius:8px;font-weight:600;font-size:15px;min-height:44px}
.set-rm{text-align:center;font-size:11px;color:var(--muted);font-weight:600}
/* Quick-action buttons inside set rows (BW / Failed) */
.set-cell{display:flex;flex-direction:column;align-items:center;gap:2px}
.set-qbtn{font-size:10px;font-weight:700;background:none;border:1px solid var(--border);
  border-radius:4px;padding:1px 6px;cursor:pointer;color:var(--muted);line-height:1.5;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
.set-qbtn:active{opacity:.7}
.set-qbtn.fail-on{color:var(--red);border-color:var(--red);background:rgba(239,68,68,.1)}
.set-qbtn.bw-on{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
.del-btn{
  background:none;border:none;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  width:44px;height:44px;border-radius:8px;transition:color .15s,background .15s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.del-btn:active{color:var(--red);background:rgba(239,68,68,.1)}

/* ── Stats ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:12px;padding:14px;border:1px solid var(--border)}
.stat-value{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* ── PR Hero display (emphasise actual set, not 1RM) ── */
.pr-hero{
  display:flex;flex-direction:column;align-items:flex-end;
}
.pr-hero-weight{
  font-size:26px;font-weight:900;color:var(--accent);line-height:1;
  letter-spacing:-0.5px;
}
.pr-hero-unit{font-size:13px;font-weight:600;color:var(--accent);margin-left:2px}
.pr-hero-reps{font-size:13px;font-weight:600;color:var(--text);margin-top:2px}
.pr-hero-label{font-size:10px;color:var(--green);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.pr-sub-1rm{font-size:11px;color:var(--muted);margin-top:3px}

/* ── Goals ── */
.goal-card{
  background:var(--card);border-radius:14px;padding:14px 16px;
  margin-bottom:10px;border:1px solid var(--border);
}
.goal-bar-track{
  height:8px;background:var(--card2);border-radius:4px;
  margin:10px 0 6px;overflow:hidden;border:1px solid var(--border);
}
.goal-bar-fill{
  height:100%;border-radius:4px;transition:width .6s ease;
  background:linear-gradient(90deg,var(--accent),#fbbf24);
}
.goal-bar-fill.done{background:linear-gradient(90deg,var(--green),#86efac)}
.goal-meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted)}

/* ── Goal reached celebration ── */
.goal-reached{
  border-color:var(--green)!important;
  background:linear-gradient(180deg,rgba(34,197,94,.13),rgba(34,197,94,.03))!important;
  animation:goalGlow 2.4s ease-in-out infinite;
}
@keyframes goalGlow{
  0%,100%{box-shadow:0 0 0 1px var(--green),0 0 13px rgba(34,197,94,.20)}
  50%{box-shadow:0 0 0 1px var(--green),0 0 26px rgba(34,197,94,.45)}
}
.goal-done-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--green);color:#04210f;font-weight:800;
  font-size:11px;letter-spacing:.3px;padding:4px 10px;border-radius:20px;white-space:nowrap;
}
.goal-celebrate{
  display:flex;align-items:center;gap:8px;margin-top:10px;
  font-size:15px;font-weight:800;color:var(--green);
}
.goal-celebrate .trophy{font-size:20px;display:inline-block;animation:trophyPop .6s ease-out}
@keyframes trophyPop{
  0%{transform:scale(0) rotate(-30deg)}
  60%{transform:scale(1.35) rotate(8deg)}
  100%{transform:scale(1) rotate(0)}
}
.goal-cta{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;margin-top:12px;padding:11px;border-radius:10px;
  background:var(--green);color:#04210f;font-weight:800;font-size:14px;
  border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;transition:transform .1s,opacity .15s;
}
.goal-cta:active{transform:scale(.97);opacity:.9}
/* Confetti */
#confetti-layer{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;display:none}
#confetti-layer.show{display:block}
.confetti-bit{position:absolute;top:-14px;width:9px;height:14px;border-radius:2px;
  will-change:transform,opacity;animation:confettiFall linear forwards}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0);opacity:1}
  100%{transform:translateY(105vh) rotate(720deg);opacity:.9}
}

/* ── Spotlight tour (coach marks) ── */
#tour-block{position:fixed;inset:0;z-index:300}
.tour-spot{z-index:301!important;border-radius:12px;
  box-shadow:0 0 0 3px var(--accent),0 0 0 9999px rgba(0,0,0,.78)!important;
  pointer-events:none}
#tour-tip{position:fixed;left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:440px;z-index:302;
  background:var(--card);border:1px solid var(--accent);border-radius:14px;
  padding:14px 16px;box-shadow:0 8px 30px rgba(0,0,0,.5);
  animation:fadeIn .2s ease}

/* ── Getting-started checklist ── */
.gs-card{background:var(--card);border:1px solid var(--green);border-radius:14px;
  padding:14px 16px;margin-bottom:14px}
.gs-bar-track{height:6px;background:var(--card2);border-radius:3px;overflow:hidden;margin:8px 0 10px}
.gs-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s ease}
.gs-row{display:flex;align-items:center;gap:11px;padding:9px 2px;cursor:pointer;
  border-bottom:1px solid var(--border);-webkit-tap-highlight-color:transparent}
.gs-row:last-child{border-bottom:none}
.gs-row:active{opacity:.7}
.gs-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:12px;color:#04210f;font-weight:800}
.gs-row.done .gs-check{background:var(--green);border-color:var(--green)}
.gs-row.done .gs-title{color:var(--muted);text-decoration:line-through}
.gs-title{font-size:13px;font-weight:600}
.gs-sub{font-size:11px;color:var(--muted)}
.gs-dismiss{background:none;border:none;color:var(--muted);font-size:12px;
  cursor:pointer;padding:4px;-webkit-tap-highlight-color:transparent}

/* ── Monthly goal reminder banner ── */
.month-banner{
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,rgba(249,115,22,.18),rgba(168,85,247,.14));
  border:1px solid var(--accent);border-radius:14px;padding:14px 16px;margin-bottom:14px;
  animation:fadeIn .3s ease;
}
.month-banner-emoji{font-size:26px;flex-shrink:0}
.month-banner-x{background:none;border:none;color:var(--muted);cursor:pointer;
  padding:4px;flex-shrink:0;-webkit-tap-highlight-color:transparent}

/* ── Body-part PR groups ── */
.bp-group{
  background:var(--card);border-radius:14px;margin-bottom:10px;
  border:1px solid var(--border);overflow:hidden;
}
.bp-group-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:background .1s;
}
.bp-group-header:active{background:var(--card2)}
.bp-group-header-left{display:flex;align-items:center;gap:10px}
.bp-group-emoji{font-size:22px;width:32px;text-align:center}
.bp-group-name{font-size:15px;font-weight:700}
.bp-group-best{font-size:11px;color:var(--muted);margin-top:1px}
.bp-group-chevron{
  font-size:14px;color:var(--muted);transition:transform .2s;
}
.bp-group.open .bp-group-chevron{transform:rotate(180deg)}
.bp-group-body{display:none;border-top:1px solid var(--border)}
.bp-group.open .bp-group-body{display:block}
.bp-ex-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .1s;
  -webkit-tap-highlight-color:transparent;
}
.bp-ex-row:last-child{border-bottom:none}
.bp-ex-row:active{background:var(--card2)}
.bp-ex-name{font-size:14px;font-weight:600}
.bp-ex-date{font-size:10px;color:var(--muted);margin-top:2px}
.bp-ex-pr{text-align:right}
.bp-ex-weight{font-size:16px;font-weight:800;color:var(--accent)}
.bp-ex-reps{font-size:11px;color:var(--muted);margin-top:1px}
.bp-ex-1rm{font-size:10px;color:var(--muted);margin-top:1px}

/* ── PR Table (kept for modal detail view) ── */
.pr-table{width:100%;border-collapse:collapse}
.pr-table th,.pr-table td{padding:10px 10px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
.pr-table th{color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:600;letter-spacing:.5px}
.pr-table tr:last-child td{border-bottom:none}

/* ── History items ── */
.workout-item{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:14px 16px;background:var(--card);border-radius:12px;
  margin-bottom:8px;border:1px solid var(--border);cursor:pointer;
  transition:border-color .15s;
}
.workout-item:hover{border-color:var(--accent)}
.workout-date{font-size:11px;color:var(--muted);margin-bottom:3px}
.workout-name{font-size:15px;font-weight:600;margin-bottom:3px}
.workout-exercises{font-size:12px;color:var(--muted)}

/* ── History calendar ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);
  width:34px;height:34px;border-radius:9px;font-size:16px;cursor:pointer;display:flex;
  align-items:center;justify-content:center}
.cal-nav-btn:disabled{opacity:.3;cursor:default}
.cal-nav-title{font-size:15px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;padding-bottom:2px}
.cal-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-size:13px;color:var(--muted);
  border:1px solid transparent;position:relative}
.cal-cell.blank{visibility:hidden}
.cal-cell.today{border-color:var(--border);color:var(--text)}
.cal-cell.has-workout{color:var(--text);font-weight:700;cursor:pointer}
.cal-cell.has-workout:hover{filter:brightness(1.25)}
.cal-dots{position:absolute;bottom:5px;left:0;right:0;display:flex;justify-content:center;gap:3px}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}
/* legend */
.cal-legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:16px;
  padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:14px}
.cal-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text)}
.cal-legend-swatch{width:11px;height:11px;border-radius:3px;flex-shrink:0}

/* ── Modal ── */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);z-index:100;
  align-items:flex-end;justify-content:center;
}
#modal-overlay.open{display:flex}
#modal{
  background:var(--card);border-radius:20px 20px 0 0;
  padding:20px;width:100%;max-width:480px;
  max-height:88vh;overflow-y:auto;
  border:1px solid var(--border);border-bottom:none;
}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
#modal{will-change:transform}

/* ── Reorder buttons ── */
.reorder-btn{background:none;border:1px solid var(--border);color:var(--muted);
  width:30px;height:30px;border-radius:7px;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
.reorder-btn:active{color:var(--accent);border-color:var(--accent)}

/* ── Edit-modal exercise accordion ── */
.ex-acc-header{display:flex;justify-content:space-between;align-items:center;
  gap:8px;padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ex-acc-chevron{font-size:11px;color:var(--muted);transition:transform .2s;
  transform:rotate(-90deg);display:inline-block;width:12px;flex-shrink:0}
.ex-acc.open .ex-acc-chevron{transform:rotate(0deg)}
.ex-acc-body{display:none;padding:0 14px 14px}
.ex-acc.open .ex-acc-body{display:block}

/* ── Drag-and-drop reorder ── */
.drag-handle{cursor:grab;color:var(--muted);font-size:17px;line-height:1;
  padding:4px 4px;flex-shrink:0;touch-action:none;user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent}
.drag-handle:active{cursor:grabbing;color:var(--accent)}
.drag-active{box-shadow:0 10px 28px rgba(0,0,0,.55);opacity:.97;transform:scale(1.015);
  border-color:var(--accent)!important}
.drag-placeholder{border:2px dashed var(--accent);border-radius:12px;
  background:var(--accent-dim);box-sizing:border-box}
.drag-indicator{position:absolute;left:2px;right:2px;height:3px;border-radius:3px;
  background:var(--accent);z-index:150;pointer-events:none;box-shadow:0 0 8px var(--accent)}

/* ── Dashboard customize toggle switch ── */
.dash-toggle{width:46px;height:27px;border-radius:14px;border:1px solid var(--border);
  background:var(--card2);position:relative;cursor:pointer;flex-shrink:0;padding:0;
  transition:background .15s,border-color .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.dash-toggle span{position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;
  background:var(--muted);transition:transform .18s,background .18s}
.dash-toggle.on{background:var(--accent-dim);border-color:var(--accent)}
.dash-toggle.on span{transform:translateX(19px);background:var(--accent)}

/* ── Sticky action bars ── */
.log-action-bar{position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(62px + env(safe-area-inset-bottom));
  width:100%;max-width:480px;display:flex;gap:10px;
  padding:10px 20px;background:var(--bg);border-top:1px solid var(--border);z-index:50}
.log-action-bar .btn,.modal-action-bar .btn{justify-content:center}
.sticky-action-bar{position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(62px + env(safe-area-inset-bottom));
  width:100%;max-width:480px;display:flex;gap:10px;
  padding:10px 20px;background:var(--bg);border-top:1px solid var(--border);z-index:50}
.modal-action-bar{position:sticky;bottom:0;display:flex;gap:10px;
  margin:12px -20px -20px;padding:14px 20px calc(14px + env(safe-area-inset-bottom));
  background:var(--card);border-top:1px solid var(--border);z-index:5}

/* ── Scroll-to-top FAB ── */
#scroll-top-fab{position:fixed;right:16px;
  bottom:calc(138px + env(safe-area-inset-bottom));
  width:46px;height:46px;border-radius:50%;background:var(--accent);color:#fff;
  border:none;display:none;align-items:center;justify-content:center;z-index:120;
  cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.45);
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
#scroll-top-fab.show{display:flex}
#scroll-top-fab:active{transform:scale(.92)}
#scroll-top-fab svg{width:22px;height:22px}

/* ── Autocomplete ── */
.input-wrapper{position:relative}
.ac-dropdown{
  position:absolute;top:100%;left:0;right:0;background:var(--card);
  border:1px solid var(--border);border-radius:10px;margin-top:4px;
  z-index:50;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5);
}
.ac-item{padding:10px 14px;font-size:14px;cursor:pointer;transition:background .1s}
.ac-item:hover{background:var(--card2)}

/* ── Exercise chips ── */
.ex-chip{
  display:inline-block;background:var(--card2);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;font-size:13px;cursor:pointer;
  transition:all .15s;margin:3px;
}
.ex-chip:hover,.ex-chip.active{border-color:var(--accent);color:var(--accent)}

/* ── Unit toggle ── */
.unit-toggle{display:flex;background:var(--card2);border-radius:8px;padding:2px;border:1px solid var(--border)}
.unit-toggle button{
  flex:1;padding:8px 12px;border:none;background:none;color:var(--muted);
  font-size:12px;font-weight:600;cursor:pointer;border-radius:6px;transition:all .15s;
  min-height:36px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.unit-toggle button.active{background:#3a3a3a;color:var(--text)}

/* ── Chart ── */
.chart-wrap{position:relative;height:200px;margin-top:8px}

/* ── Toast ── */
#toast{
  position:fixed;bottom:90px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--green);color:#fff;
  padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;
  opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Rest timer bar ── */
#rest-bar{
  position:fixed;left:50%;transform:translateX(-50%);
  top:calc(env(safe-area-inset-top) + 64px);
  width:calc(100% - 24px);max-width:456px;z-index:130;display:none;
  background:var(--card);border:1px solid var(--accent);border-radius:14px;
  padding:10px 14px;box-shadow:0 6px 24px rgba(0,0,0,.5);animation:fadeIn .2s ease;
}
#rest-bar.show{display:block}
#rest-bar .rb-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
#rest-bar .rb-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
#rest-bar .rb-time{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.5px;color:var(--accent);line-height:1}
#rest-bar .rb-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:7px 11px;font-size:13px;font-weight:700;cursor:pointer;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:36px}
#rest-bar .rb-btn:active{opacity:.7}
#rest-bar .rb-skip{color:var(--red);border-color:var(--red)}
#rest-bar .rb-track{height:5px;background:var(--card2);border-radius:3px;margin-top:9px;overflow:hidden}
#rest-bar .rb-fill{height:100%;background:linear-gradient(90deg,var(--accent),#fbbf24);border-radius:3px;transition:width .25s linear}

/* ── Floating workout-duration pill (visible on all screens while running) ── */
#wk-timer{
  position:fixed;top:calc(env(safe-area-inset-top) + 60px);left:50%;transform:translateX(-50%);
  z-index:125;display:none;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--accent);border-radius:999px;
  padding:7px 15px 7px 13px;box-shadow:0 4px 16px rgba(0,0,0,.45);cursor:pointer;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;animation:fadeIn .2s ease;
}
#wk-timer.show{display:inline-flex}
#wk-timer .wk-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:wkPulse 1.4s ease-in-out infinite}
#wk-timer .wk-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700}
#wk-timer .wk-time{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
@keyframes wkPulse{0%,100%{opacity:1}50%{opacity:.25}}
/* When the workout pill is up, drop the rest bar below it so they don't overlap */
body.wk-timer-on #rest-bar{top:calc(env(safe-area-inset-top) + 108px)}

/* ── Misc ── */
.divider{height:1px;background:var(--border);margin:12px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── Keep it portrait: on a phone held sideways, cover the app and ask to rotate
   (iOS ignores manifest orientation, so this is the reliable fallback) ── */
#rotate-warn{display:none}
@media (orientation: landscape) and (max-height: 500px){
  #rotate-warn{
    display:flex;position:fixed;inset:0;z-index:9999;background:var(--bg);
    flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:30px;gap:12px;
  }
  #rotate-warn .rw-emoji{font-size:46px}
  #rotate-warn .rw-title{font-size:19px;font-weight:800}
  #rotate-warn .rw-sub{font-size:13px;color:var(--muted);max-width:300px;line-height:1.5}
}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const KG_TO_LBS = 2.20462;

const SESSION_PRESETS = [
  'Push','Pull','Legs','Upper Body','Lower Body','Full Body',
  'Chest','Back','Shoulders','Arms','Abs / Core','Cardio'
];

// Map exercise names → body part (lowercase match)
const BODY_PART_MAP = {
  'Chest':     ['bench press','incline bench','dip','cable fly','chest press','push-up','pec deck','close grip bench','decline bench'],
  'Back':      ['deadlift','barbell row','pull-up','chin-up','cable row','lat pulldown','seated row','t-bar row','face pull','inverted row','rack pull'],
  'Legs':      ['squat','leg press','romanian deadlift','hip thrust','leg curl','leg extension','calf raise','hack squat','bulgarian split squat','lunge','goblet squat','front squat','sumo deadlift'],
  'Shoulders': ['overhead press','arnold press','lateral raise','upright row','rear delt fly','front raise','seated dumbbell press','military press','push press'],
  'Arms':      ['bicep curl','hammer curl','tricep extension','skull crusher','preacher curl','tricep pushdown','concentration curl','cable curl','overhead tricep extension','ez bar curl','barbell curl'],
  'Core':      ['plank','crunch','ab wheel','cable crunch','hanging leg raise','russian twist','sit-up','leg raise','decline crunch'],
};
const BODY_PART_EMOJI = {
  'Chest':'🎽','Back':'🎒','Legs':'🦵','Shoulders':'🏋️','Arms':'💪','Abs':'🔥','Core':'🔥','Other':'⚡'
};

// Detailed muscle taxonomy — used for exercise tagging and PR grouping
const MUSCLE_GROUPS = {
  'Chest':     { emoji:'🎽', sub:['Upper Chest','Middle Chest','Lower Chest'] },
  'Shoulders': { emoji:'🏋️', sub:['Front Delt','Middle Delt','Rear Delt'] },
  'Back':      { emoji:'🎒', sub:['Traps','Lats','Teres Major','Rhomboids'] },
  'Legs':      { emoji:'🦵', sub:['Quads','Hamstrings','Calves'] },
  'Glutes':    { emoji:'🍑', sub:['Glutes'] },
  'Arms':      { emoji:'💪', sub:['Biceps','Triceps','Forearms'] },
  'Abs':       { emoji:'🔥', sub:['Rectus Abdominis','Obliques','Lower Abs'] },
};
// Display label for a body-part GROUP. 'Glutes' shows as お尻 (casual) while the
// 'Glutes' muscle tag keeps its anatomical label (臀筋).
function bodyPartLabel(bp){
  if (bp === 'Glutes') return DB.lang === 'ja' ? 'お尻' : 'Glutes';
  return t(bp);
}

// Muscles per exercise — stored as an array (legacy entries may be a string).
// User tags take priority; built-in DEFAULT_MUSCLES fill the gaps.
function getMusclesForExercise(name) {
  const v = DB.exerciseMuscles[name];
  if (v) return Array.isArray(v) ? v : [v];
  return DEFAULT_MUSCLES[name] || [];
}
// Display label: all tagged muscles joined, e.g. "Lats · Hamstrings"
function getMuscleForExercise(name) {
  const ms = getMusclesForExercise(name);
  return ms.length ? ms.join(' · ') : null;
}
function getBodyPartForMuscle(muscle) {
  for (const [bp, data] of Object.entries(MUSCLE_GROUPS)) {
    if (data.sub.includes(muscle)) return bp;
  }
  return null;
}
function getBodyPartForExercise(name) {
  const ms = getMusclesForExercise(name);
  if (ms.length) return getBodyPartForMuscle(ms[0]) || 'Other';
  return getBodyPart(name);
}

function getBodyPart(name) {
  const n = name.toLowerCase();
  for (const [part, list] of Object.entries(BODY_PART_MAP)) {
    if (list.some(e => n.includes(e) || e.includes(n))) return part;
  }
  return 'Other';
}

// ═══════════════════════════════════════════════════════
// WEIGHT CONVERSION HELPERS
// ═══════════════════════════════════════════════════════

// Convert a value FROM its original unit TO the current display unit
function dispW(val, fromUnit) {
  const to = DB.unit;
  if (!val || fromUnit === to) return +val;
  if (fromUnit === 'kg' && to === 'lbs') return Math.round(+val * KG_TO_LBS * 10) / 10;
  if (fromUnit === 'lbs' && to === 'kg') return Math.round(+val / KG_TO_LBS * 10) / 10;
  return +val;
}

// Convert a display-unit value to kg (for goal storage)
function toKg(val, fromUnit) {
  if (fromUnit === 'lbs') return +val / KG_TO_LBS;
  return +val;
}

// Get the dataUnit of a workout (default: 'kg' for old workouts)
function wUnit(workout) {
  return workout.dataUnit || 'kg';
}

// ═══════════════════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════════════════
const DB = {
  get workouts()   { return JSON.parse(localStorage.getItem('ll_workouts') || '[]') },
  save(w)          { localStorage.setItem('ll_workouts', JSON.stringify(w)) },
  get exercises()  {
    const s = localStorage.getItem('ll_exercises');
    return s ? JSON.parse(s) : [...DEFAULT_EXERCISES];
  },
  saveExercises(e) { localStorage.setItem('ll_exercises', JSON.stringify(e)) },
  get unit()       { return localStorage.getItem('ll_unit') || 'kg' },
  saveUnit(u)      { localStorage.setItem('ll_unit', u) },
  get lang()       { return localStorage.getItem('ll_lang') || 'en' },
  saveLang(l)      { localStorage.setItem('ll_lang', l) },
  get profile()    { return JSON.parse(localStorage.getItem('ll_profile') || '{}') },
  saveProfile(p)   { localStorage.setItem('ll_profile', JSON.stringify(p)) },
  get goals()          { return JSON.parse(localStorage.getItem('ll_goals') || '[]') },
  saveGoals(g)         { localStorage.setItem('ll_goals', JSON.stringify(g)) },
  // bodyweight log = [{date:'YYYY-MM-DD', kg:Number}, ...] sorted by date
  get bwLog()          { try { return JSON.parse(localStorage.getItem('ll_bw_log') || '[]'); } catch(e){ return []; } },
  saveBwLog(l)         { localStorage.setItem('ll_bw_log', JSON.stringify(l)) },
  get exerciseMuscles(){ return JSON.parse(localStorage.getItem('ll_exercise_muscles') || '{}') },
  saveExerciseMuscles(m){ localStorage.setItem('ll_exercise_muscles', JSON.stringify(m)) },
  // templates = { 'Push': ['Bench Press','Lateral Raise', ...], ... }
  get templates()      { return JSON.parse(localStorage.getItem('ll_templates') || '{}') },
  saveTemplates(t)     { localStorage.setItem('ll_templates', JSON.stringify(t)) },
  // dashLayout = [{id:'chart',on:true}, ...] — order + visibility of dashboard sections
  get dashLayout()     { return JSON.parse(localStorage.getItem('ll_dash_layout') || 'null') },
  saveDashLayout(l)    { localStorage.setItem('ll_dash_layout', JSON.stringify(l)) },
  addWorkout(w)    { const arr = this.workouts; arr.push(w); this.save(arr) },
  removeWorkout(id){ this.save(this.workouts.filter(w => w.id !== id)) }
};

const DEFAULT_EXERCISES = [
  // Chest
  'Bench Press','Incline Bench Press','Decline Bench Press','Dumbbell Bench Press',
  'Incline Dumbbell Press','Dumbbell Fly','Cable Fly','Cable Crossover','Pec Deck',
  'Chest Press Machine','Push-up','Dip',
  // Back
  'Deadlift','Sumo Deadlift','Rack Pull','Barbell Row','Pendlay Row','Dumbbell Row',
  'T-Bar Row','Seated Cable Row','Cable Row','Machine Row','Chest Supported Row',
  'Pull-up','Chin-up','Lat Pulldown','Close Grip Lat Pulldown','Straight Arm Pulldown',
  'Pull Over','Back Extension','Good Morning','Shrug',
  // Shoulders
  'Overhead Press','Military Press','Push Press','Dumbbell Shoulder Press',
  'Arnold Press','Machine Shoulder Press','Lateral Raise','Cable Lateral Raise',
  'Front Raise','Rear Delt Fly','Reverse Pec Deck','Face Pull','Upright Row',
  // Legs
  'Squat','Front Squat','Goblet Squat','Hack Squat','Smith Machine Squat',
  'Bulgarian Split Squat','Lunge','Walking Lunge','Leg Press','Romanian Deadlift',
  'Stiff Leg Deadlift','Leg Extension','Leg Curl','Seated Leg Curl','Hip Thrust',
  'Glute Bridge','Hip Abduction','Hip Adduction','Calf Raise','Seated Calf Raise',
  // Arms
  'Bicep Curl','Barbell Curl','EZ Bar Curl','Dumbbell Curl','Hammer Curl',
  'Incline Dumbbell Curl','Preacher Curl','Concentration Curl','Cable Curl',
  'Tricep Extension','Overhead Tricep Extension','Skull Crusher','Tricep Pushdown',
  'Cable Press Down','Rope Pushdown','Close Grip Bench Press','Wrist Curl',
  // Abs / Core
  'Crunch','Cable Crunch','Decline Crunch','Sit-up','Plank','Side Plank',
  'Hanging Leg Raise','Leg Raise','Russian Twist','Ab Wheel Rollout','Mountain Climber',
  // Cardio / Other
  'Treadmill','Incline Walk','Running','Cycling','Rowing Machine','Stair Climber',
  'Elliptical','Jump Rope','Farmer\'s Walk','Kettlebell Swing','Burpee'

// Muscle tags for the default exercises (used for body-part grouping).
// Users' own tags in DB.exerciseMuscles always take priority over these.
const DEFAULT_MUSCLES = {
  'Bench Press':['Middle Chest'],'Incline Bench Press':['Upper Chest'],'Decline Bench Press':['Lower Chest'],
  'Dumbbell Bench Press':['Middle Chest'],'Incline Dumbbell Press':['Upper Chest'],'Dumbbell Fly':['Middle Chest'],

  'Pull-up':['Lats'],'Chin-up':['Lats','Biceps'],'Lat Pulldown':['Lats'],'Close Grip Lat Pulldown':['Lats'],
  'Straight Arm Pulldown':['Lats'],'Pull Over':['Lats'],'Back Extension':['Glutes','Hamstrings'],
  'Good Morning':['Hamstrings','Glutes'],'Shrug':['Traps'],
  'Overhead Press':['Front Delt'],'Military Press':['Front Delt'],'Push Press':['Front Delt'],
  'Dumbbell Shoulder Press':['Front Delt','Middle Delt'],'Arnold Press':['Front Delt','Middle Delt'],
  'Machine Shoulder Press':['Front Delt','Middle Delt'],'Lateral Raise':['Middle Delt'],
  'Cable Lateral Raise':['Middle Delt'],'Front Raise':['Front Delt'],'Rear Delt Fly':['Rear Delt'],
  'Reverse Pec Deck':['Rear Delt'],'Face Pull':['Rear Delt','Traps'],'Upright Row':['Middle Delt','Traps'],
  'Squat':['Quads','Glutes'],'Front Squat':['Quads'],'Goblet Squat':['Quads','Glutes'],
  'Hack Squat':['Quads'],'Smith Machine Squat':['Quads','Glutes'],'Bulgarian Split Squat':['Quads','Glutes'],
  'Lunge':['Quads','Glutes'],'Walking Lunge':['Quads','Glutes'],'Leg Press':['Quads','Glutes'],
  'Romanian Deadlift':['Hamstrings','Glutes'],'Stiff Leg Deadlift':['Hamstrings'],
  'Leg Extension':['Quads'],'Leg Curl':['Hamstrings'],'Seated Leg Curl':['Hamstrings'],
  'Hip Thrust':['Glutes'],'Glute Bridge':['Glutes'],'Hip Abduction':['Glutes'],'Hip Adduction':['Glutes'],
  'Calf Raise':['Calves'],'Seated Calf Raise':['Calves'],
  'Bicep Curl':['Biceps'],'Barbell Curl':['Biceps'],'EZ Bar Curl':['Biceps'],'Dumbbell Curl':['Biceps'],
  'Hammer Curl':['Biceps','Forearms'],'Incline Dumbbell Curl':['Biceps'],'Preacher Curl':['Biceps'],

// ── translation helpers ──
function L(){ return DB.lang === 'ja' ? 'ja-JP' : 'en-US'; }   // date locale
function t(s){ return (DB.lang === 'ja' && I18N.ja[s] !== undefined) ? I18N.ja[s] : s; }
// interpolated translate: tf('{name} 📋', {name:'プッシュ'})
function tf(s, vars){ let o = t(s); if(vars) for(const k in vars){ o = o.split('{'+k+'}').join(vars[k]); } return o; }

// fallback-translate a fragment (returns input unchanged if no entry)
function tx(s){ const r = tkey(s); return r === null ? s : r; }
function txTime(s){
  let m;
  if(m = s.match(/^~(\d+)w$/))     return '約' + m[1] + '週';
  if(m = s.match(/^~(\d+)mo$/))    return '約' + m[1] + 'ヶ月';
  if(m = s.match(/^(\d+)\+ yr$/))  return m[1] + '年以上';
  if(m = s.match(/^(.+?) to go$/)) return 'あと' + m[1];
  return s;
}

function exTranslate(name){
  const s = String(name).trim();
  const pm = s.match(/^(.+?)\s*\(([^)]+)\)\s*$/);   // trailing "(...)" variation
  if(pm){ const a = exTranslate(pm[1]); const b = exTranslate(pm[2]); return (a && b) ? a + '（' + b + '）' : null; }
  const words = s.split(/\s+/);
  const out = [];
  for(const w of words){
    let v = EX_TOKENS[w];
    if(v === undefined) v = EX_TOKENS[w.replace(/[’']s$/,'')];      // possessive (Farmer's)
    if(v === undefined) return null;                                // unknown word → give up
    out.push(v);
  }
  return out.join('');
}
// Resolve a single atom (no " · " splitting): dict → pattern → symbol prefix → exercise tokens.
function tkeyAtom(key){
  const dict = I18N.ja;
  if(dict[key] !== undefined) return dict[key];
  for(const [re, fn] of I18N_PATTERNS){ const m = key.match(re); if(m) return fn(m); }
  // emoji- or symbol-prefixed label e.g. "🎽 Chest", "▶ Take the tour", "📅 5 days left"
  const mm = key.match(/^(\S+)\s+(.+)$/);
  if(mm && !/[A-Za-z]/.test(mm[1])){ const sub = tkey(mm[2]); if(sub !== null) return mm[1] + ' ' + sub; }
  // custom exercise names: combinations of known exercise words
  if(/^[A-Za-z][A-Za-z'’()\/ -]*$/.test(key)){ const ex = exTranslate(key); if(ex !== null) return ex; }
  return null;
}
// Resolve one trimmed English string → Japanese (or null when unknown).
function tkey(key){
  const a = tkeyAtom(key);
  if(a !== null) return a;
  // " · "-joined lists (exercise names / muscles / set summaries)
  if(key.indexOf(' · ') !== -1){
    const parts = key.split(' · ');
    let any = false;
    const out = parts.map(p => { const k = p.trim(); const r = tkeyAtom(k); if(r !== null){ any = true; return p.replace(k, r); } return p; });
    if(any) return out.join(' · ');
  }
  return null;
}

// Walk the DOM and swap visible English text → Japanese (and back).
// Original English is cached per-node so switching languages is reversible.
function applyLang(){
  const ja = DB.lang === 'ja';
  // Localize native controls (e.g. the iOS date picker) to match the language.
  document.documentElement.lang = ja ? 'ja' : 'en';
  const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
    acceptNode(node){
      const p = node.parentNode;
      if(!p) return NodeFilter.FILTER_REJECT;
      const tag = p.nodeName;
      if(tag === 'SCRIPT' || tag === 'STYLE') return NodeFilter.FILTER_REJECT;
      if(p.closest && p.closest('svg')) return NodeFilter.FILTER_REJECT;
      return node.nodeValue.trim() ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
    }
  });
  const nodes = []; let n; while(n = walker.nextNode()) nodes.push(n);
  for(const node of nodes){
    if(node.__en === undefined) node.__en = node.nodeValue;
    const raw = node.__en, key = raw.trim();
    let out = raw;
    if(ja && key){ const tr = tkey(key); if(tr !== null) out = raw.replace(key, tr); }
    if(node.nodeValue !== out) node.nodeValue = out;
  }
  // placeholders
  document.body.querySelectorAll('[placeholder]').forEach(el => {
    if(el.__enPh === undefined) el.__enPh = el.getAttribute('placeholder') || '';
    const k = el.__enPh.trim();
    el.setAttribute('placeholder', (ja && I18N.ja[k] !== undefined) ? I18N.ja[k] : el.__enPh);
  });
}

// Re-translate automatically after ANY re-render (accordion toggles, modal
// navigation, log card updates, etc.) that swaps innerHTML without calling
// applyLang directly. applyLang is idempotent (English is cached per node),
// so re-running it converges with no extra changes.
let __langObserver = null, __langScheduled = false;
function applyLangSafe(){
  if(__langObserver) __langObserver.disconnect();
  try { applyLang(); } finally {
    if(__langObserver) __langObserver.observe(document.body, { childList:true, subtree:true, characterData:true });
  }
}
function scheduleApplyLang(){
  if(__langScheduled) return;
  __langScheduled = true;
  (window.requestAnimationFrame || window.setTimeout)(() => { __langScheduled = false; applyLangSafe(); });
}
function startLangObserver(){
  if(__langObserver || typeof MutationObserver === 'undefined') return;
  __langObserver = new MutationObserver(scheduleApplyLang);
  __langObserver.observe(document.body, { childList:true, subtree:true, characterData:true });
}

function setLang(l){
  DB.saveLang(l);
  showView(currentView);
  openDataModal();   // rebuild settings so the selected language highlights
}

// ═══════════════════════════════════════════════════════
// MIGRATION — tag old workouts with a dataUnit
// ═══════════════════════════════════════════════════════
function runMigrations() {
  // v2 — tag old workouts with dataUnit
  if (!localStorage.getItem('ll_migrated_v2')) {
    const currentUnit = DB.unit;
    const workouts = DB.workouts;
    if (workouts.length) {
      DB.save(workouts.map(w => w.dataUnit ? w : { ...w, dataUnit: currentUnit }));
    }
    localStorage.setItem('ll_migrated_v2', '1');
  }

  // v3 — convert goals from est-1RM format → targetWeightKg × targetReps
  if (!localStorage.getItem('ll_migrated_v3')) {
    const goals = DB.goals;
    if (goals.length) {
      DB.saveGoals(goals.map(g => {
        if (g.targetKg !== undefined && !g.targetWeightKg) {
          // old targetKg was est. 1RM; back-calculate to ~5-rep weight
          const wFor5 = g.targetKg / (1 + 5 / 30);
          return { id: g.id, exercise: g.exercise,
            targetWeightKg: Math.round(wFor5 / 2.5) * 2.5, targetReps: 5 };
        }
        return g;
      }));
    }
    localStorage.setItem('ll_migrated_v3', '1');
  }

  // v4 — merge the expanded built-in exercise list into saved lists, so
  // existing users get the new defaults without losing their own exercises.
  if (!localStorage.getItem('ll_migrated_v4')) {
    if (localStorage.getItem('ll_exercises')) {
      const cur = DB.exercises;
      const lower = new Set(cur.map(e => e.toLowerCase()));
      for (const e of DEFAULT_EXERCISES) {
        if (!lower.has(e.toLowerCase())) cur.push(e);
      }
      DB.saveExercises(cur);
    }
    localStorage.setItem('ll_migrated_v4', '1');
  }
}

// The active workout is held in memory; if the app is backgrounded/closed mid-

function logHasContent(l) {

    (l.name && l.name.trim()) || (l.notes && l.notes.trim()) || l.durationSec));

// Format seconds → "1h 05m 12s" / "12:05" style compact display
function fmtDuration(sec) {
  sec = Math.max(0, Math.round(sec));
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  if(h) return `${h}:${pad2(m)}:${pad2(s)}`;
  return `${m}:${pad2(s)}`;
}
function uid()      { return Date.now().toString(36) + Math.random().toString(36).slice(2,6) }
function todayStr() { return new Date().toISOString().slice(0,10) }

function fmtDate(d) {
  return new Date(d+'T12:00:00').toLocaleDateString(L(),{month:'short',day:'numeric',year:'numeric'});
}
function daysAgo(d) {
  const diff = Math.round((Date.now() - new Date(d+'T12:00:00')) / 86400000);
  if(diff===0) return 'Today';
  if(diff===1) return 'Yesterday';
  return diff+'d ago';
}
// Countdown to a goal's target date: "5 days left", "Due today", "3 days overdue"
function deadlineInfo(dateStr) {
  if(!dateStr) return null;
  const diff = Math.round((new Date(dateStr+'T12:00:00') - Date.now()) / 86400000);
  const nice = new Date(dateStr+'T12:00:00').toLocaleDateString(L(),{month:'short',day:'numeric',year:'numeric'});
  if(diff > 1)  return { label:`${diff} days left`,  overdue:false, date:nice };
  if(diff === 1) return { label:`1 day left`,        overdue:false, date:nice };
  if(diff === 0) return { label:`Due today`,         overdue:false, date:nice };
  if(diff === -1) return { label:`1 day overdue`,    overdue:true,  date:nice };
  return { label:`${-diff} days overdue`,            overdue:true,  date:nice };
}

// ═══════════════════════════════════════════════════════
// FORMULAS
// ═══════════════════════════════════════════════════════
// calc1RM is unit-agnostic: works in whatever unit weight is passed in
function calc1RM(weight, reps) {
  const w = +weight, r = +reps;
  if(!w || !r) return 0;
  if(r===1) return w;
  return Math.round(w * (1 + r/30));
}

// ═══════════════════════════════════════════════════════
// PR ENGINE  (compares in kg; returns display-unit values)
// ═══════════════════════════════════════════════════════
function getPRs() {
  const prs = {};
  const displayUnit = DB.unit;

  for(const workout of DB.workouts) {
    const du = wUnit(workout);
    for(const ex of workout.exercises) {
      const n = ex.name;
      if(!prs[n]) prs[n] = { bestSet:null, bestSetUnit:'kg', bestWeightKg:0, best1RM_kg:0, date:'' };
      for(const set of ex.sets) {
        if(!set.weight || !set.reps || set.failed) continue;
        const wKg   = toKg(+set.weight, du);
        const reps  = +set.reps;
        // Prioritise the heaviest weight actually lifted; if two sets share the
        // same weight, the one with more reps wins. (Heavier weight always beats
        // a lighter weight even if the lighter set has more reps.)
        const prevReps = prs[n].bestSet ? +prs[n].bestSet.reps : -1;
        if(wKg > prs[n].bestWeightKg || (wKg === prs[n].bestWeightKg && reps > prevReps)) {
          prs[n].bestWeightKg = wKg;
          prs[n].best1RM_kg   = toKg(calc1RM(+set.weight, +set.reps), du);
          prs[n].bestSet      = set;
          prs[n].bestSetUnit  = du;
          prs[n].date         = workout.date;
        }
      }
    }
  }

  // Attach display-unit versions
  for(const n of Object.keys(prs)) {
    const pr = prs[n];
    if(!pr.bestSet) continue;
    pr.best1RM        = Math.round(dispW(pr.best1RM_kg, 'kg'));
    pr.bestWeight     = Math.round(dispW(pr.bestWeightKg, 'kg') * 10) / 10;
    pr.displayWeight  = dispW(+pr.bestSet.weight, pr.bestSetUnit);
  }
  return prs;
}

function getProgress(name) {
  const data = [];
  const displayUnit = DB.unit;
  const sorted = [...DB.workouts].sort((a,b)=>a.date.localeCompare(b.date));
  for(const workout of sorted) {
    const du = wUnit(workout);
    const ex = workout.exercises.find(e=>e.name===name);
    if(!ex) continue;
    const valid = ex.sets.filter(s=>s.weight&&s.reps&&!s.failed);
    if(!valid.length) continue;
    let bestWeightKg=0, bestSet=null, bestSetUnit=du;
    for(const s of valid){
      const wKg = toKg(+s.weight, du);
      const prevReps = bestSet ? +bestSet.reps : -1;
      if(wKg>bestWeightKg || (wKg===bestWeightKg && +s.reps>prevReps)){
        bestWeightKg=wKg; bestSet=s; bestSetUnit=du;
      }
    }
    const best1RM_kg = toKg(calc1RM(+bestSet.weight, +bestSet.reps), bestSetUnit);
    data.push({
      date:       workout.date,
      weight:     dispW(+bestSet.weight, bestSetUnit),
      reps:       +bestSet.reps,
      est1RM:     Math.round(dispW(best1RM_kg, 'kg'))
    });
  }
  return data;
}

function allExerciseNames() {
  const names = new Set(DB.exercises);
  for(const w of DB.workouts) for(const e of w.exercises) names.add(e.name);
  return [...names].sort();
}

// ═══════════════════════════════════════════════════════
// DASHBOARD CHART HELPERS
// ═══════════════════════════════════════════════════════

// Returns [{date, weightKg}] for an exercise in the chosen mode:
//   'e1rm' → estimated 1RM from the best set per session (every session with
//            the exercise counts, giving a continuous trajectory)
//   '5'   → best weight where reps >= 5 per session
//   '8'   → best weight where reps >= 8 per session
function getProgressByMode(name, mode) {
  const sorted = [...DB.workouts].sort((a,b) => a.date.localeCompare(b.date));
  const data = [];
  for (const workout of sorted) {
    const du = wUnit(workout);
    const ex = workout.exercises.find(e => e.name === name);
    if (!ex) continue;
    let best = 0;
    if (mode === '1rm') {
      // Heaviest ACTUAL single-rep set this session — real lifts only.
      for (const s of ex.sets) {
        if (s.weight && +s.reps === 1 && !s.failed) {
          const wKg = toKg(+s.weight, du);
          if (wKg > best) best = wKg;
        }
      }
    } else if (mode === 'e1rm') {
      // Estimated 1RM from the best set this session → every session with this
      // exercise contributes a point, giving a full trajectory. Sets above 12
      // reps are skipped because the 1RM formula loses accuracy on high reps.
      for (const s of ex.sets) {
        if (s.weight && s.reps && +s.reps <= 12 && !s.failed) {
          const e1Kg = toKg(calc1RM(+s.weight, +s.reps), du);
          if (e1Kg > best) best = e1Kg;
        }
      }
    } else {
      const minReps = +mode;
      for (const s of ex.sets) {
        if (+s.reps >= minReps && s.weight && !s.failed) {
          const wKg = toKg(+s.weight, du);
          if (wKg > best) best = wKg;
        }
      }
    }
    if (best > 0) data.push({ date: workout.date, weightKg: best });
  }
  return data;
}

// Least-squares trend line over a series of y-values (x = evenly-spaced index).
// Returns fitted y-values (same length) so the chart can draw a straight trend
// line, or null when there aren't enough points to fit one.
function trendLineValues(ys) {
  const n = ys.length;
  if (n < 2) return null;
  let sx = 0, sy = 0, sxx = 0, sxy = 0;
  for (let i = 0; i < n; i++) { sx += i; sy += ys[i]; sxx += i * i; sxy += i * ys[i]; }
  const denom = n * sxx - sx * sx;
  if (denom === 0) return null;
  const slope = (n * sxy - sx * sy) / denom;
  const intercept = (sy - slope * sx) / n;
  return ys.map((_, i) => Math.round((intercept + slope * i) * 10) / 10);
}

// Estimate weeks to hit targetKg (est-1RM) using linear regression on recent progress.
// Returns integer weeks, 0 if already achieved, null if can't estimate.
function estimateWeeks(exercise, targetKg) {
  const progress = getProgressByMode(exercise, 'e1rm');
  if (progress.length < 2) return null;
  const current = progress[progress.length - 1].weightKg;
  if (current >= targetKg) return 0;
  const first = progress[0];
  const last  = progress[progress.length - 1];
  const days  = (new Date(last.date+'T12:00:00') - new Date(first.date+'T12:00:00')) / 86400000;
  const gain  = last.weightKg - first.weightKg;
  if (days <= 0 || gain <= 0) return null;
  const perWeek = (gain / days) * 7;
  return Math.max(1, Math.round((targetKg - current) / perWeek));
}

// ═══════════════════════════════════════════════════════
// GOALS ENGINE
// ═══════════════════════════════════════════════════════

// Returns est. 1RM in kg implied by this goal (weight × reps).
// Matches calc1RM: a 1-rep goal IS the weight itself.
function goalTarget1RM_kg(goal) {
  if (goal.targetWeightKg && goal.targetReps) {
    if (+goal.targetReps === 1) return goal.targetWeightKg;
    return goal.targetWeightKg * (1 + goal.targetReps / 30);
  }
  return goal.targetKg || 0; // backward compat
}

// For chart: returns the goal reference line value (in display unit).
// All modes plot real lifted weight, so the line is the goal's target weight.
function goalLineForMode(goal, mode) {
  // Est-1RM view compares against the goal's implied 1RM; rep views against the
  // goal's target weight.
  const kg = (mode === 'e1rm' || mode === '1rm') ? goalTarget1RM_kg(goal)
                               : (goal.targetWeightKg || goalTarget1RM_kg(goal));
  return Math.round(dispW(kg, 'kg') * 10) / 10;
}

// ── Body-weight log helpers ────────────────────────────
// Append/replace today-or-given-date entry (kg). Keeps the log sorted by date.
function logBodyWeight(kg, date) {
  if (!(kg > 0)) return;
  date = date || todayStr();
  const log = DB.bwLog.filter(e => e.date !== date);
  log.push({ date, kg: Math.round(kg * 10) / 10 });
  log.sort((a, b) => a.date.localeCompare(b.date));
  DB.saveBwLog(log);
}
// Record a weigh-in AND keep the My Stats current body weight in sync.
function recordBodyWeight(kg, date) {
  logBodyWeight(kg, date);
  const p = DB.profile;
  p.bodyweight = Math.round(dispW(kg, 'kg') * 10) / 10;   // store in display unit (matches My Stats)
  DB.saveProfile(p);
}
// Latest known body weight in kg (newest weigh-in, else My Stats value), or null.
function currentBodyWeightKg() {
  const log = DB.bwLog;
  if (log.length) return log[log.length - 1].kg;
  const bw = DB.profile.bodyweight;
  return bw ? toKg(+bw, DB.unit) : null;
}

function isBodyWeightGoal(goal) { return goal && goal.type === 'bodyweight'; }

function getGoalProgress(goal) {
  // ── Body-weight goal: progress from a start weight toward a target weight ──
  if (isBodyWeightGoal(goal)) {
    const start   = goal.startWeightKg || currentBodyWeightKg() || goal.targetWeightKg;
    const target  = goal.targetWeightKg;
    const current = currentBodyWeightKg() != null ? currentBodyWeightKg() : start;
    const losing  = target <= start;
    const total   = Math.abs(start - target) || 1;
    const moved   = losing ? (start - current) : (current - start);
    const pct     = Math.max(0, Math.min(100, Math.round((moved / total) * 100)));
    const done    = losing ? current <= target : current >= target;
    const remainingKg = Math.max(0, losing ? current - target : target - current);
    return { type:'bodyweight', currentKg:current, startKg:start, targetKg:target,
      losing, done, pct, remainingKg, target1RM:target, remaining1RM_kg:remainingKg };
  }
  // ── Strength goal (default) ──
  const prs   = getPRs();
  const pr    = prs[goal.exercise];
  // Progress is measured by the heaviest weight actually lifted vs the target weight.
  const currentKg  = pr?.bestWeightKg || 0;
  const targetKg   = goal.targetWeightKg || goalTarget1RM_kg(goal);
  const done       = currentKg >= targetKg && targetKg > 0;
  const remaining1RM_kg = Math.max(0, targetKg - currentKg);
  // target1RM key kept for backward compatibility with callers; holds target weight.
  return { currentKg, target1RM: targetKg, done, remaining1RM_kg };
}

// ═══════════════════════════════════════════════════════
// SPARKLINE SVG
// ═══════════════════════════════════════════════════════
function sparklineSVG(vals, w, h) {
  if (!vals || vals.length < 2) return '';
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const range = max - min || 1;
  const pad = 5;
  const pts = vals.map((v, i) => ({
    x: pad + (i / (vals.length - 1)) * (w - pad * 2),
    y: h - pad - ((v - min) / range) * (h - pad * 2)
  }));
  const line = pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const area = [
    ...pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`),
    `${pts[pts.length-1].x.toFixed(1)},${h}`,
    `${pts[0].x.toFixed(1)},${h}`
  ].join(' ');
  const last = pts[pts.length - 1];
  const gid  = 'sg' + vals.length + Math.round(vals[0]);
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;margin-top:10px;width:100%">
    <defs>
      <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#f97316" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <polygon points="${area}" fill="url(#${gid})"/>
    <polyline points="${line}" fill="none" stroke="#f97316" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last.x.toFixed(1)}" cy="${last.y.toFixed(1)}" r="3.5" fill="#f97316"/>
  </svg>`;
}

// ═══════════════════════════════════════════════════════
function renderDashboard() {
  if (dashChart) { dashChart.destroy(); dashChart = null; }
  if (volTrendChart) { volTrendChart.destroy(); volTrendChart = null; }

  const workouts = DB.workouts;
  const prs      = getPRs();
  const unit     = DB.unit;
  const goals    = DB.goals.slice(0, 3);
  const recent   = [...workouts].sort((a,b) => b.date.localeCompare(a.date))[0];
  const profile  = DB.profile;
  const now      = new Date();

  // Body weight is selectable in the chart (value '__bw__') when there are weigh-ins.
  const hasBwChart = DB.bwLog.length >= 2;

  // Pick default chart exercise (keep a valid body-weight selection intact)
  if (dashChartExercise === '__bw__') {
    if (!hasBwChart) dashChartExercise = null;
  } else if (!dashChartExercise || !prs[dashChartExercise]?.bestSet) {
    const gwd = goals.find(g => prs[g.exercise]?.bestSet);
    if (gwd) dashChartExercise = gwd.exercise;
    else {
      const top = Object.entries(prs).filter(([,p])=>p.bestSet)
        .sort((a,b)=>(b[1].best1RM_kg||0)-(a[1].best1RM_kg||0))[0];
      dashChartExercise = top ? top[0] : null;
    }
  }
  if (!dashChartExercise && hasBwChart) dashChartExercise = '__bw__';

  // All exercises with PR data (for the "change" dropdown)
  const allWithData = Object.keys(prs).filter(n => prs[n]?.bestSet).sort();

  let html = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div>
      <div style="font-size:22px;font-weight:800;margin-bottom:2px">Dashboard</div>
      <div style="font-size:12px;color:var(--muted)">${now.toLocaleDateString(L(),{weekday:'long',month:'long',day:'numeric'})}</div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="toggleDashEdit()" aria-label="Customize dashboard"
      style="font-size:12px;color:${dashEditMode?'var(--accent)':'var(--muted)'};padding:6px 10px;font-weight:600;display:flex;align-items:center;gap:5px">
      ${dashEditMode
        ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Done'
        : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg> Customize'}
    </button>
  </div>`;

  // ── Dashboard customize (edit) mode ────────────────────
  if (dashEditMode) {
    html += dashEditorHTML();
    document.getElementById('main').innerHTML = html;
    setTimeout(initDashEditDrag, 30);
    return;
  }

  // ── Getting-started checklist (auto-hides when complete) ─
  html += gettingStartedHTML();

  // ── Monthly "set a new goal" reminder banner ───────────
  if (shouldShowMonthlyGoalBanner()) {
    const mName = now.toLocaleDateString(L(), { month: 'long' });
    html += `
    <div class="month-banner">
      <div class="month-banner-emoji">🎯</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:14px;margin-bottom:2px">New month, new goals!</div>
        <div style="font-size:12px;color:var(--muted)">It's ${mName} — set a fresh target to stay motivated.</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();dismissMonthlyBanner();showView('goals');openAddGoalModal()">Set goal</button>
      <button class="month-banner-x" onclick="event.stopPropagation();dismissMonthlyBanner();renderDashboard()" aria-label="Dismiss">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;
  }

  // ── Backup reminder banner (when overdue) ─────────────
  if (shouldShowBackupBanner()) {
    const d = daysSinceBackup();
    const msg = d === null
      ? 'You haven\'t backed up yet. Your data lives only on this device — save a copy so you don\'t lose it.'
      : `Your last backup was ${d} days ago. Save a fresh copy so you don't lose your progress.`;
    html += `
    <div class="month-banner" style="background:linear-gradient(135deg,rgba(239,68,68,.16),rgba(249,115,22,.12));border-color:var(--red)">
      <div class="month-banner-emoji">💾</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:14px;margin-bottom:2px">Back up your data</div>
        <div style="font-size:12px;color:var(--muted)">${msg}</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();dismissBackupBanner();exportData()">Back up</button>
      <button class="month-banner-x" onclick="event.stopPropagation();dismissBackupBanner();renderDashboard()" aria-label="Dismiss">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;
  }

  // ── Unsaved-workout banner → opens the Log screen (where it can be saved) ─
  if (hasUnsavedDraft()) {
    html += `
    <div class="month-banner" style="background:linear-gradient(135deg,rgba(249,115,22,.18),rgba(249,115,22,.08));border-color:var(--accent);cursor:pointer" onclick="showView('log')">
      <div class="month-banner-emoji">📝</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:14px;margin-bottom:2px">Unsaved workout in progress</div>
        <div style="font-size:12px;color:var(--muted)">Tap to open the Log screen and finish saving it.</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();showView('log')">Open Log</button>
    </div>`;
  }

  // ── Feedback nudge card (until sent or dismissed) ──────
  html += fbCardHTML();

  // ── Section renderers — order & visibility from the customize layout ──
  const dashSec = {};

  dashSec.chart = () => {
  let html = '';
  if (allWithData.length || hasBwChart) {
    let exOpts = allWithData.map(n =>
      `<option value="${n}" ${n===dashChartExercise?'selected':''}>${n}</option>`
    ).join('');
    if (hasBwChart) exOpts += `<option value="__bw__" ${dashChartExercise==='__bw__'?'selected':''}>⚖️ ${t('Body weight')}</option>`;

    html += `
    <div class="card" style="margin-bottom:14px">
      <!-- Exercise selector -->
      <div class="select-wrap" style="margin-bottom:12px">
        <select id="dash-ex-select" onchange="setDashChartExercise(this.value)"
          style="font-size:13px;font-weight:700;padding:8px 30px 8px 10px;height:38px">
          ${exOpts}
        </select>
      </div>
      <!-- Time-range selector -->
      <div class="label" style="margin-bottom:6px">Period</div>
      <div style="display:flex;gap:6px;margin-bottom:12px">
        ${['1m','3m','6m','all'].map(r => `
          <button id="dr-${r}" class="btn btn-sm ${dashChartRange===r?'btn-primary':'btn-secondary'}"
            style="flex:1;justify-content:center;padding:7px 0;font-size:12px" onclick="setDashChartRange('${r}')">
            ${r==='all'?'All':r.toUpperCase()}</button>`).join('')}
      </div>
      <div id="dash-chart-wrap" style="position:relative;height:210px">
        <canvas id="dash-chart-canvas"></canvas>
      </div>
    </div>`;
  }
  return html;
  };

  dashSec.goals = () => {
  let html = '';
  // ── GOALS ──────────────────────────────────────────────
  html += `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div class="label" style="margin-bottom:0">🎯 My Goals</div>
    <button class="btn btn-ghost btn-sm" onclick="showView('goals')"
      style="font-size:12px;color:var(--accent);padding:4px 8px;font-weight:600">
      ${goals.length ? 'Edit Goals' : '+ Add Goal'}
    </button>
  </div>`;

  if (!goals.length) {
    html += `
    <div class="card" style="text-align:center;padding:24px 20px;margin-bottom:14px">
      <div style="font-size:36px;margin-bottom:8px">🎯</div>
      <div style="font-weight:600;margin-bottom:4px">No goals set yet</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:14px">
        Set a target weight and reps — see your timeline here
      </div>
      <button class="btn btn-primary btn-sm" onclick="showView('goals')">Set Your First Goal</button>
    </div>`;
  } else {
    for (const goal of goals) {
      if (isBodyWeightGoal(goal)) continue;   // body-weight goals live in the Goals tab (no exercise chart)
      const pr   = prs[goal.exercise];
      const gp   = getGoalProgress(goal);
      const barPct = gp.target1RM > 0
        ? Math.min(100, Math.round((gp.currentKg / gp.target1RM) * 100)) : 0;

      // Format target display
      const tWDisp = goal.targetWeightKg
        ? Math.round(dispW(goal.targetWeightKg, 'kg') * 10) / 10 : '—';
      const tReps  = goal.targetReps || '—';

      // Remaining 1RM gap
      const remDisp = Math.round(dispW(gp.remaining1RM_kg, 'kg'));

      // Est. time
      const weeks  = gp.done ? 0 : estimateWeeks(goal.exercise, gp.target1RM);
      const timeStr = gp.done ? null
        : weeks === null ? (remDisp > 0 ? `${remDisp}${unit} to go` : null)
        : weeks <= 4     ? `~${weeks}w`
        : weeks <= 52    ? `~${Math.round(weeks/4)}mo`
        : `${Math.round(weeks/52)}+ yr`;

      const isSelected = dashChartExercise === goal.exercise;

      html += `
      <div class="card${gp.done?' goal-reached':''}" style="margin-bottom:10px;cursor:pointer;
           border-color:${isSelected?'var(--accent)':'var(--border)'};transition:border-color .2s"
           onclick="setDashChartExercise('${esc(goal.exercise)}')">

        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div style="flex:1;min-width:0">
            <!-- Exercise -->
            <div style="font-size:15px;font-weight:700;margin-bottom:6px">${goal.exercise}</div>
            <!-- PR row -->
            <div style="display:flex;align-items:baseline;gap:5px;margin-bottom:4px">
              <span style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);min-width:56px">Current</span>
              ${pr?.bestSet
                ? `<span style="font-size:16px;font-weight:800;color:var(--accent)">${pr.displayWeight}${unit}</span>
                   <span style="font-size:12px;color:var(--muted)">× ${pr.bestSet.reps} reps</span>`
                : `<span style="font-size:12px;color:var(--muted)">No data yet</span>`}
            </div>
            <!-- Target row -->
            <div style="display:flex;align-items:baseline;gap:5px">
              <span style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);min-width:56px">Target</span>
              <span style="font-size:16px;font-weight:800;color:var(--green)">${tWDisp}${unit}</span>
              <span style="font-size:12px;color:var(--muted)">× ${tReps} reps</span>
            </div>
          </div>
          <!-- Tap-to-chart indicator -->
          <div style="flex-shrink:0;margin-left:10px;text-align:center;padding:6px 8px;border-radius:8px;
               background:${isSelected?'var(--accent-dim)':'transparent'};border:1px solid ${isSelected?'var(--accent)':'transparent'}">
            <div style="font-size:10px;color:${isSelected?'var(--accent)':'var(--muted)'};font-weight:600;text-transform:uppercase;letter-spacing:.4px">
              ${isSelected?'◆ Active':'Chart'}
            </div>
          </div>
        </div>

        <!-- Progress bar -->
        <div class="goal-bar-track">
          <div class="goal-bar-fill ${gp.done?'done':''}" style="width:${barPct}%"></div>
        </div>

        <!-- Footer -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:11px">
          ${gp.done
            ? `<span style="color:var(--green);font-weight:700">🎉 Goal reached!</span>`
            : `<span style="color:var(--muted)">${timeStr ? 'Est. '+timeStr+' away' : ''}</span>`}
          ${(() => { const dl = deadlineInfo(goal.targetDate); if(gp.done||!dl) return '';
            return dl.overdue
              ? `<span style="display:inline-flex;align-items:center;gap:4px;background:var(--amber-dim);color:var(--amber);font-weight:600;padding:2px 8px;border-radius:99px">📅 Deadline reached</span>`
              : `<span style="color:var(--muted);font-weight:600">📅 ${dl.label}</span>`; })()}
        </div>
      </div>`;
    }
  }
  return html;
  };

  dashSec.last = () => {
  let html = '';
  html += `<div class="label" style="margin-bottom:8px;margin-top:4px">Last Workout</div>`;
  if (recent) {
    const du        = wUnit(recent);
    const exNames   = recent.exercises.map(e => e.name).join(' · ') || 'No exercises';
    const totalVol  = recent.exercises.reduce((s,e) =>
      s + e.sets.reduce((s2,set) => s2 + (dispW(+set.weight||0,du)) * (+set.reps||0), 0), 0);
    const totalSets = recent.exercises.reduce((s,e) =>
      s + e.sets.filter(s => s.weight || s.reps).length, 0);
    html += `
    <div class="card" style="cursor:pointer;margin-bottom:14px" onclick="showView('history')">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-weight:700;font-size:16px">${recent.name||'Workout'}</div>
        <div style="font-size:12px;color:var(--muted)">${daysAgo(recent.date)}</div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:${totalVol?'8px':'0'};
           white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${exNames}</div>
      ${totalVol
        ? `<div style="font-size:12px;color:var(--accent);font-weight:600">${Math.round(totalVol).toLocaleString()}${unit} vol · ${totalSets} sets</div>`
        : ''}
    </div>`;
  } else {
    html += `
    <div class="card" style="text-align:center;padding:24px 20px;margin-bottom:14px">
      <div style="font-size:40px;margin-bottom:10px">🏋️</div>
      <div style="font-weight:700;margin-bottom:6px">No workouts yet</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:14px">Start logging to track your progress</div>
      <button class="btn btn-primary btn-sm" onclick="showView('log')">Log First Workout</button>
    </div>`;
  }
  return html;
  };

  dashSec.stats = () => {
  let html = '';
  html += `<div class="label" style="margin-bottom:8px">Body Stats</div>`;
  const hasProfile = profile.height || profile.bodyweight;
  if (hasProfile) {
    let bmi = null;
    if (profile.height && profile.bodyweight) {
      const hM  = profile.height / 100;
      const wKg = unit === 'lbs' ? profile.bodyweight / KG_TO_LBS : profile.bodyweight;
      bmi = (wKg / (hM * hM)).toFixed(1);
    }
    html += `
    <div class="card" style="cursor:pointer" onclick="openProfileModal()">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;gap:28px">
          <div>
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:2px">Body Weight</div>
            <div style="font-size:20px;font-weight:800">${profile.bodyweight||'—'}<span style="font-size:12px;font-weight:400;color:var(--muted);margin-left:2px">${unit}</span></div>
          </div>
          <div>
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:2px">Height</div>
            <div style="font-size:20px;font-weight:800">${profile.height||'—'}<span style="font-size:12px;font-weight:400;color:var(--muted);margin-left:2px">${profile.height?'cm':''}</span></div>
          </div>
          ${bmi ? `<div>
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:2px">BMI</div>
            <div style="font-size:20px;font-weight:800;color:${bmiColor(bmi)}">${bmi}</div>
          </div>` : ''}
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </div>
    </div>`;
  } else {
    html += `
    <div class="card" style="cursor:pointer" onclick="openProfileModal()">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:28px">👤</div>
        <div>
          <div style="font-weight:600;margin-bottom:2px">Add your stats</div>
          <div style="font-size:12px;color:var(--muted)">Tap to set your height & body weight</div>
        </div>
      </div>
    </div>`;
  }
  return html;
  };

  // Append sections in the user's chosen order, skipping hidden ones.
  for (const item of getDashLayout()) {
    if (!item.on) continue;
    if (dashSec[item.id])               html += dashSec[item.id]();
    else if (dashCardRenderers[item.id]) html += dashCardRenderers[item.id]();
  }

  document.getElementById('main').innerHTML = html;
  checkGoalCelebrations();
  const _dl = getDashLayout();
  if (dashChartExercise && _dl.find(s => s.id === 'chart' && s.on)) setTimeout(() => renderDashboardChart(), 60);
  if (_dl.find(s => s.id === 'voltrend' && s.on)) setTimeout(() => renderVolTrendChart(), 60);
}

// ── Dashboard chart renderer ──────────────────────────
function renderDashboardChart() {
  const wrap = document.getElementById('dash-chart-wrap');
  if (!wrap) return;
  if (dashChart) { dashChart.destroy(); dashChart = null; }

  const exercise = dashChartExercise;
  if (!exercise) return;
  const isBw = exercise === '__bw__';

  const unit     = DB.unit;
  let   progress = isBw
    ? DB.bwLog.map(e => ({ date: e.date, weightKg: e.kg })).sort((a,b) => a.date.localeCompare(b.date))
    : getProgressByMode(exercise, dashChartMode);
  const goal     = isBw ? DB.goals.find(isBodyWeightGoal) : DB.goals.find(g => g.exercise === exercise);

  // Filter to the chosen time range.
  const cut = rangeCutoff(dashChartRange);
  const allCount = progress.length;
  if (cut) progress = progress.filter(p => new Date(p.date+'T12:00:00') >= cut);

  if (!progress.length) {
    const what = allCount > 0
      ? 'No data in this time range for'
      : isBw
        ? 'No weigh-ins logged yet for'
        : dashChartMode === '1rm'
          ? 'No actual 1-rep sets logged yet for'
          : dashChartMode === 'e1rm'
            ? 'No sets logged yet for'
            : `No sets of ${dashChartMode}+ reps logged yet for`;
    wrap.innerHTML = `
      <div style="height:200px;display:flex;align-items:center;justify-content:center;
                  color:var(--muted);font-size:13px;text-align:center;line-height:1.6">
        ${what}<br><strong style="color:var(--text)">${isBw ? t('Body weight') : exercise}</strong>
      </div>`;
    return;
  }

  // Ensure canvas exists (could have been replaced by the message above)
  if (!document.getElementById('dash-chart-canvas')) {
    wrap.innerHTML = `<canvas id="dash-chart-canvas"></canvas>`;
  }
  const ctx = document.getElementById('dash-chart-canvas');
  if (!ctx) return;

  const labels  = progress.map(p =>
    new Date(p.date+'T12:00:00').toLocaleDateString(L(),{month:'short',day:'numeric'}));
  const weights = progress.map(p => Math.round(dispW(p.weightKg,'kg') * 10) / 10);

  const modeLabel = isBw
    ? `${t('Body weight')} (${unit})`
    : dashChartMode === '1rm'
      ? `1-rep max (${unit})`
      : dashChartMode === 'e1rm'
        ? `Est. 1-rep max (${unit})`
        : `Best weight @ ${dashChartMode}+ reps (${unit})`;

  const datasets = [{
    label:              modeLabel,
    data:               weights,
    borderColor:        '#f97316',
    backgroundColor:    'rgba(249,115,22,0.12)',
    borderWidth:        2.5,
    pointBackgroundColor:'#f97316',
    pointRadius:        4,
    pointHoverRadius:   6,
    tension:            0.3,
    fill:               true
  }];

  // Trend line — shows the direction of progress (best practice: the trend
  // matters more than any single point). Only drawn with 2+ data points.
  const trend = trendLineValues(weights);
  if (trend) {
    datasets.push({
      label:       'Trend',
      data:        trend,
      borderColor: 'rgba(249,115,22,0.5)',
      borderDash:  [4, 4],
      borderWidth: 1.5,
      pointRadius: 0,
      tension:     0,
      fill:        false
    });
  }

  // Goal reference line
  if (goal) {
    const goalDisplay = isBw
      ? Math.round(dispW(goal.targetWeightKg, 'kg') * 10) / 10
      : goalLineForMode(goal, dashChartMode);
    datasets.push({
      label:       `Goal: ${goalDisplay}${unit}`,
      data:        Array(labels.length).fill(goalDisplay),
      borderColor: '#22c55e',
      borderDash:  [6, 3],
      borderWidth: 2,
      pointRadius: 0,
      tension:     0,
      fill:        false
    });
  }

  dashChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color:'#888', font:{ size:11 }, boxWidth:12, padding:12 } },
        subtitle: {
          display: progress.length < 3,
          text: t('Log a few more sessions to see your trajectory'),
          color:'#666', font:{ size:10 }, padding:{ bottom:8 }
        },
        tooltip: {
          backgroundColor:'#1a1a1a', borderColor:'#2a2a2a', borderWidth:1,
          titleColor:'#f0f0f0', bodyColor:'#aaa',
          callbacks: { label: c => ` ${c.dataset.label}: ${c.parsed.y}${unit}` }
        }
      },
      scales: {
        x: { offset: true, grid:{ color:'#1f1f1f' }, ticks:{ color:'#555', font:{ size:10 }, maxTicksLimit:6 } },
        y: { grid:{ color:'#1f1f1f' }, ticks:{ color:'#555', font:{ size:10 }, callback: v => v+unit } }
      }
    }
  });
}

// ── Dashboard chart controls ──────────────────────────
function setDashChartMode(mode) {
  dashChartMode = mode;
  // Update button styles without full re-render
  ['1rm','e1rm','5','8'].forEach(m => {
    const btn = document.getElementById('dm-' + m);
    if (!btn) return;
    btn.className = btn.className
      .replace('btn-primary','').replace('btn-secondary','').trim()
      + (m === mode ? ' btn-primary' : ' btn-secondary');
  });
  renderDashboardChart();
}

// Date cutoff for the chart time-range buttons (null = all time).
function rangeCutoff(range) {
  const months = { '1m': 1, '3m': 3, '6m': 6 }[range];
  if (!months) return null;
  const d = new Date();
  d.setMonth(d.getMonth() - months);
  return d;
}
function setDashChartRange(range) {
  dashChartRange = range;
  ['1m','3m','6m','all'].forEach(r => {
    const btn = document.getElementById('dr-' + r);
    if (!btn) return;
    btn.className = btn.className
      .replace('btn-primary','').replace('btn-secondary','').trim()
      + (r === range ? ' btn-primary' : ' btn-secondary');
  });
  renderDashboardChart();
}

function setDashChartExercise(name) {
  dashChartExercise = name;
  renderDashboard(); // Re-render so card highlights update correctly
}

function toggleLogSetup() {
  logSetupExpanded = !logSetupExpanded;

function handleSessionSelect(val) {
  const customInput = document.getElementById('log-name-custom');
  if (val === '__custom__') {
    customInput.style.display = '';
    currentLog.name = '';
    setTimeout(() => customInput.focus(), 50);
  } else {
    customInput.style.display = 'none';
    currentLog.name = val;
    saveDraft();
    // Re-render so the template / repeat-last suggestion appears
    if (!currentLog.exercises.length) renderLog();
  }
}
