<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f97316">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lift Log">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Lift Log</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--card:#1a1a1a;--card2:#222;
  --accent:#f97316;--accent-dim:rgba(249,115,22,0.12);
  --text:#f0f0f0;--muted:#777;--border:#2a2a2a;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;
  --purple:#a855f7;
}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  display:flex;flex-direction:column;max-width:480px;margin:0 auto;min-height:100vh;
}

/* ── Header ── */
#header{
  padding:calc(env(safe-area-inset-top) + 12px) 20px 12px;
  display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--bg);z-index:10;
}
#header-title{font-size:20px;font-weight:800;letter-spacing:-0.5px}

/* ── Main ── */
#main{flex:1;overflow-y:auto;padding:16px 20px calc(88px + env(safe-area-inset-bottom))}

/* ── Nav ── */
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:var(--card);
  border-top:1px solid var(--border);display:flex;
  padding:8px 0 calc(12px + env(safe-area-inset-bottom));z-index:10;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;color:var(--muted);font-size:10px;
  cursor:pointer;padding:6px 2px;transition:color .15s;
  min-height:44px;-webkit-tap-highlight-color:transparent;
}
.nav-btn svg{width:22px;height:22px}
.nav-btn.active{color:var(--accent)}

/* ── Cards ── */
.card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.card-sm{background:var(--card2);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border)}

/* ── Typography ── */
.label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px}
.muted{color:var(--muted)}
.accent{color:var(--accent)}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:12px 16px;border-radius:10px;border:none;
  font-size:14px;font-weight:600;cursor:pointer;
  transition:opacity .15s,transform .1s;font-family:inherit;
  min-height:44px;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.btn:active{transform:scale(.97);opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:none}
.btn-accent-outline{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent)}
.btn-pause{background:rgba(239,68,68,.12);color:var(--red);border:1px solid var(--red)}
.btn-ghost{background:none;border:none;color:var(--muted);padding:8px 10px}
.btn-sm{padding:8px 12px;font-size:12px;border-radius:8px;min-height:36px}
.btn-full{width:100%;justify-content:center}

/* ── Inputs ── */
input,textarea,select{
  width:100%;background:var(--card2);border:1px solid var(--border);
  border-radius:10px;padding:12px 12px;color:var(--text);font-size:16px;
  outline:none;transition:border-color .15s;font-family:inherit;
  -webkit-appearance:none;appearance:none;
  min-height:44px;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
.input-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}

/* ── Select arrow ── */
.select-wrap{position:relative}
.select-wrap::after{
  content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none;font-size:14px;
}
.select-wrap select{padding-right:36px}

/* ── Sets ── */
.sets-header{
  display:grid;grid-template-columns:28px 1fr 1fr 1fr 44px;
  gap:6px;padding:0 2px;margin-bottom:4px;
}
.sets-header span{font-size:10px;color:var(--muted);text-align:center}
.set-row{
  display:grid;grid-template-columns:28px 1fr 1fr 1fr 44px;
  gap:6px;align-items:center;margin-bottom:4px;
}
.set-num{text-align:center;font-size:13px;color:var(--muted);font-weight:600}
.set-row input{padding:10px 4px;text-align:center;border-radius:8px;font-weight:600;font-size:15px;min-height:44px}
.set-rm{text-align:center;font-size:11px;color:var(--muted);font-weight:600}
/* Quick-action buttons inside set rows (BW / Failed) */
.set-cell{display:flex;flex-direction:column;align-items:center;gap:2px}
.set-qbtn{font-size:10px;font-weight:700;background:none;border:1px solid var(--border);
  border-radius:4px;padding:1px 6px;cursor:pointer;color:var(--muted);line-height:1.5;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
.set-qbtn:active{opacity:.7}
.set-qbtn.fail-on{color:var(--red);border-color:var(--red);background:rgba(239,68,68,.1)}
.set-qbtn.bw-on{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
.del-btn{
  background:none;border:none;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  width:44px;height:44px;border-radius:8px;transition:color .15s,background .15s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.del-btn:active{color:var(--red);background:rgba(239,68,68,.1)}

/* ── Stats ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:12px;padding:14px;border:1px solid var(--border)}
.stat-value{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* ── PR Hero display (emphasise actual set, not 1RM) ── */
.pr-hero{
  display:flex;flex-direction:column;align-items:flex-end;
}
.pr-hero-weight{
  font-size:26px;font-weight:900;color:var(--accent);line-height:1;
  letter-spacing:-0.5px;
}
.pr-hero-unit{font-size:13px;font-weight:600;color:var(--accent);margin-left:2px}
.pr-hero-reps{font-size:13px;font-weight:600;color:var(--text);margin-top:2px}
.pr-hero-label{font-size:10px;color:var(--green);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.pr-sub-1rm{font-size:11px;color:var(--muted);margin-top:3px}

/* ── Goals ── */
.goal-card{
  background:var(--card);border-radius:14px;padding:14px 16px;
  margin-bottom:10px;border:1px solid var(--border);
}
.goal-bar-track{
  height:8px;background:var(--card2);border-radius:4px;
  margin:10px 0 6px;overflow:hidden;border:1px solid var(--border);
}
.goal-bar-fill{
  height:100%;border-radius:4px;transition:width .6s ease;
  background:linear-gradient(90deg,var(--accent),#fbbf24);
}
.goal-bar-fill.done{background:linear-gradient(90deg,var(--green),#86efac)}
.goal-meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted)}

/* ── Goal reached celebration ── */
.goal-reached{
  border-color:var(--green)!important;
  background:linear-gradient(180deg,rgba(34,197,94,.13),rgba(34,197,94,.03))!important;
  animation:goalGlow 2.4s ease-in-out infinite;
}
@keyframes goalGlow{
  0%,100%{box-shadow:0 0 0 1px var(--green),0 0 13px rgba(34,197,94,.20)}
  50%{box-shadow:0 0 0 1px var(--green),0 0 26px rgba(34,197,94,.45)}
}
.goal-done-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--green);color:#04210f;font-weight:800;
  font-size:11px;letter-spacing:.3px;padding:4px 10px;border-radius:20px;white-space:nowrap;
}
.goal-celebrate{
  display:flex;align-items:center;gap:8px;margin-top:10px;
  font-size:15px;font-weight:800;color:var(--green);
}
.goal-celebrate .trophy{font-size:20px;display:inline-block;animation:trophyPop .6s ease-out}
@keyframes trophyPop{
  0%{transform:scale(0) rotate(-30deg)}
  60%{transform:scale(1.35) rotate(8deg)}
  100%{transform:scale(1) rotate(0)}
}
.goal-cta{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;margin-top:12px;padding:11px;border-radius:10px;
  background:var(--green);color:#04210f;font-weight:800;font-size:14px;
  border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;transition:transform .1s,opacity .15s;
}
.goal-cta:active{transform:scale(.97);opacity:.9}
/* Confetti */
#confetti-layer{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;display:none}
#confetti-layer.show{display:block}
.confetti-bit{position:absolute;top:-14px;width:9px;height:14px;border-radius:2px;
  will-change:transform,opacity;animation:confettiFall linear forwards}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0);opacity:1}
  100%{transform:translateY(105vh) rotate(720deg);opacity:.9}
}

/* ── Getting-started checklist ── */
.gs-card{background:var(--card);border:1px solid var(--green);border-radius:14px;
  padding:14px 16px;margin-bottom:14px}
.gs-bar-track{height:6px;background:var(--card2);border-radius:3px;overflow:hidden;margin:8px 0 10px}
.gs-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s ease}
.gs-row{display:flex;align-items:center;gap:11px;padding:9px 2px;cursor:pointer;
  border-bottom:1px solid var(--border);-webkit-tap-highlight-color:transparent}
.gs-row:last-child{border-bottom:none}
.gs-row:active{opacity:.7}
.gs-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:12px;color:#04210f;font-weight:800}
.gs-row.done .gs-check{background:var(--green);border-color:var(--green)}
.gs-row.done .gs-title{color:var(--muted);text-decoration:line-through}
.gs-title{font-size:13px;font-weight:600}
.gs-sub{font-size:11px;color:var(--muted)}
.gs-dismiss{background:none;border:none;color:var(--muted);font-size:12px;
  cursor:pointer;padding:4px;-webkit-tap-highlight-color:transparent}

/* ── Monthly goal reminder banner ── */
.month-banner{
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,rgba(249,115,22,.18),rgba(168,85,247,.14));
  border:1px solid var(--accent);border-radius:14px;padding:14px 16px;margin-bottom:14px;
  animation:fadeIn .3s ease;
}
.month-banner-emoji{font-size:26px;flex-shrink:0}
.month-banner-x{background:none;border:none;color:var(--muted);cursor:pointer;
  padding:4px;flex-shrink:0;-webkit-tap-highlight-color:transparent}

/* ── Body-part PR groups ── */
.bp-group{
  background:var(--card);border-radius:14px;margin-bottom:10px;
  border:1px solid var(--border);overflow:hidden;
}
.bp-group-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:background .1s;
}
.bp-group-header:active{background:var(--card2)}
.bp-group-header-left{display:flex;align-items:center;gap:10px}
.bp-group-emoji{font-size:22px;width:32px;text-align:center}
.bp-group-name{font-size:15px;font-weight:700}
.bp-group-best{font-size:11px;color:var(--muted);margin-top:1px}
.bp-group-chevron{
  font-size:14px;color:var(--muted);transition:transform .2s;
}
.bp-group.open .bp-group-chevron{transform:rotate(180deg)}
.bp-group-body{display:none;border-top:1px solid var(--border)}
.bp-group.open .bp-group-body{display:block}
.bp-ex-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .1s;
  -webkit-tap-highlight-color:transparent;
}
.bp-ex-row:last-child{border-bottom:none}
.bp-ex-row:active{background:var(--card2)}
.bp-ex-name{font-size:14px;font-weight:600}
.bp-ex-date{font-size:10px;color:var(--muted);margin-top:2px}
.bp-ex-pr{text-align:right}
.bp-ex-weight{font-size:16px;font-weight:800;color:var(--accent)}
.bp-ex-reps{font-size:11px;color:var(--muted);margin-top:1px}
.bp-ex-1rm{font-size:10px;color:var(--muted);margin-top:1px}

/* ── PR Table (kept for modal detail view) ── */
.pr-table{width:100%;border-collapse:collapse}
.pr-table th,.pr-table td{padding:10px 10px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
.pr-table th{color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:600;letter-spacing:.5px}
.pr-table tr:last-child td{border-bottom:none}

/* ── History items ── */
.workout-item{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:14px 16px;background:var(--card);border-radius:12px;
  margin-bottom:8px;border:1px solid var(--border);cursor:pointer;
  transition:border-color .15s;
}
.workout-item:hover{border-color:var(--accent)}
.workout-date{font-size:11px;color:var(--muted);margin-bottom:3px}
.workout-name{font-size:15px;font-weight:600;margin-bottom:3px}
.workout-exercises{font-size:12px;color:var(--muted)}

/* ── History calendar ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);
  width:34px;height:34px;border-radius:9px;font-size:16px;cursor:pointer;display:flex;
  align-items:center;justify-content:center}
.cal-nav-btn:disabled{opacity:.3;cursor:default}
.cal-nav-title{font-size:15px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;padding-bottom:2px}
.cal-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-size:13px;color:var(--muted);
  border:1px solid transparent;position:relative}
.cal-cell.blank{visibility:hidden}
.cal-cell.today{border-color:var(--border);color:var(--text)}
.cal-cell.has-workout{color:var(--text);font-weight:700;cursor:pointer}
.cal-cell.has-workout:hover{filter:brightness(1.25)}
.cal-dots{position:absolute;bottom:5px;left:0;right:0;display:flex;justify-content:center;gap:3px}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}
/* legend */
.cal-legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:16px;
  padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:14px}
.cal-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text)}
.cal-legend-swatch{width:11px;height:11px;border-radius:3px;flex-shrink:0}

/* ── Modal ── */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);z-index:100;
  align-items:flex-end;justify-content:center;
}
#modal-overlay.open{display:flex}
#modal{
  background:var(--card);border-radius:20px 20px 0 0;
  padding:20px;width:100%;max-width:480px;
  max-height:88vh;overflow-y:auto;
  border:1px solid var(--border);border-bottom:none;
}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
#modal{will-change:transform}

/* ── Reorder buttons ── */
.reorder-btn{background:none;border:1px solid var(--border);color:var(--muted);
  width:30px;height:30px;border-radius:7px;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
.reorder-btn:active{color:var(--accent);border-color:var(--accent)}

/* ── Edit-modal exercise accordion ── */
.ex-acc-header{display:flex;justify-content:space-between;align-items:center;
  gap:8px;padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ex-acc-chevron{font-size:11px;color:var(--muted);transition:transform .2s;
  transform:rotate(-90deg);display:inline-block;width:12px;flex-shrink:0}
.ex-acc.open .ex-acc-chevron{transform:rotate(0deg)}
.ex-acc-body{display:none;padding:0 14px 14px}
.ex-acc.open .ex-acc-body{display:block}

/* ── Sticky action bars ── */
.log-action-bar{position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(62px + env(safe-area-inset-bottom));
  width:100%;max-width:480px;display:flex;gap:10px;
  padding:10px 20px;background:var(--bg);border-top:1px solid var(--border);z-index:50}
.log-action-bar .btn,.modal-action-bar .btn{justify-content:center}
.sticky-action-bar{position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(62px + env(safe-area-inset-bottom));
  width:100%;max-width:480px;display:flex;gap:10px;
  padding:10px 20px;background:var(--bg);border-top:1px solid var(--border);z-index:50}
.modal-action-bar{position:sticky;bottom:0;display:flex;gap:10px;
  margin:12px -20px -20px;padding:14px 20px calc(14px + env(safe-area-inset-bottom));
  background:var(--card);border-top:1px solid var(--border);z-index:5}

/* ── Scroll-to-top FAB ── */
#scroll-top-fab{position:fixed;right:16px;
  bottom:calc(138px + env(safe-area-inset-bottom));
  width:46px;height:46px;border-radius:50%;background:var(--accent);color:#fff;
  border:none;display:none;align-items:center;justify-content:center;z-index:120;
  cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.45);
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
#scroll-top-fab.show{display:flex}
#scroll-top-fab:active{transform:scale(.92)}
#scroll-top-fab svg{width:22px;height:22px}

/* ── Autocomplete ── */
.input-wrapper{position:relative}
.ac-dropdown{
  position:absolute;top:100%;left:0;right:0;background:var(--card);
  border:1px solid var(--border);border-radius:10px;margin-top:4px;
  z-index:50;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5);
}
.ac-item{padding:10px 14px;font-size:14px;cursor:pointer;transition:background .1s}
.ac-item:hover{background:var(--card2)}

/* ── Exercise chips ── */
.ex-chip{
  display:inline-block;background:var(--card2);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;font-size:13px;cursor:pointer;
  transition:all .15s;margin:3px;
}
.ex-chip:hover,.ex-chip.active{border-color:var(--accent);color:var(--accent)}

/* ── Unit toggle ── */
.unit-toggle{display:flex;background:var(--card2);border-radius:8px;padding:2px;border:1px solid var(--border)}
.unit-toggle button{
  flex:1;padding:8px 12px;border:none;background:none;color:var(--muted);
  font-size:12px;font-weight:600;cursor:pointer;border-radius:6px;transition:all .15s;
  min-height:36px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.unit-toggle button.active{background:#3a3a3a;color:var(--text)}

/* ── Chart ── */
.chart-wrap{position:relative;height:200px;margin-top:8px}

/* ── Toast ── */
#toast{
  position:fixed;bottom:90px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--green);color:#fff;
  padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;
  opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Misc ── */
.divider{height:1px;background:var(--border);margin:12px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}

<script>
// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const KG_TO_LBS = 2.20462;

const SESSION_PRESETS = [
  'Push','Pull','Legs','Upper Body','Lower Body','Full Body',
  'Chest','Back','Shoulders','Arms','Abs / Core','Cardio'
];

// Map exercise names → body part (lowercase match)
const BODY_PART_MAP = {
  'Chest':     ['bench press','incline bench','dip','cable fly','chest press','push-up','pec deck','close grip bench','decline bench'],
  'Back':      ['deadlift','barbell row','pull-up','chin-up','cable row','lat pulldown','seated row','t-bar row','face pull','inverted row','rack pull'],
  'Legs':      ['squat','leg press','romanian deadlift','hip thrust','leg curl','leg extension','calf raise','hack squat','bulgarian split squat','lunge','goblet squat','front squat','sumo deadlift'],
  'Shoulders': ['overhead press','arnold press','lateral raise','upright row','rear delt fly','front raise','seated dumbbell press','military press','push press'],
  'Arms':      ['bicep curl','hammer curl','tricep extension','skull crusher','preacher curl','tricep pushdown','concentration curl','cable curl','overhead tricep extension','ez bar curl','barbell curl'],
  'Core':      ['plank','crunch','ab wheel','cable crunch','hanging leg raise','russian twist','sit-up','leg raise','decline crunch'],
};
const BODY_PART_EMOJI = {
  'Chest':'🎽','Back':'🎒','Legs':'🦵','Shoulders':'🏋️','Arms':'💪','Abs':'🔥','Core':'🔥','Other':'⚡'
};

// Detailed muscle taxonomy — used for exercise tagging and PR grouping
const MUSCLE_GROUPS = {
  'Chest':     { emoji:'🎽', sub:['Upper Chest','Middle Chest','Lower Chest'] },
  'Shoulders': { emoji:'🏋️', sub:['Front Delt','Middle Delt','Rear Delt'] },
  'Back':      { emoji:'🎒', sub:['Traps','Lats','Teres Major','Rhomboids'] },
  'Legs':      { emoji:'🦵', sub:['Quads','Hamstrings','Glutes','Calves'] },
  'Arms':      { emoji:'💪', sub:['Biceps','Triceps','Forearms'] },
  'Abs':       { emoji:'🔥', sub:['Rectus Abdominis','Obliques','Lower Abs'] },
};

// Muscles per exercise — stored as an array (legacy entries may be a string)
function getMusclesForExercise(name) {
  const v = DB.exerciseMuscles[name];
  if (!v) return [];
  return Array.isArray(v) ? v : [v];
}
// Display label: all tagged muscles joined, e.g. "Lats · Hamstrings"
function getMuscleForExercise(name) {
  const ms = getMusclesForExercise(name);
  return ms.length ? ms.join(' · ') : null;
}
function getBodyPartForMuscle(muscle) {
  for (const [bp, data] of Object.entries(MUSCLE_GROUPS)) {
    if (data.sub.includes(muscle)) return bp;
  }
  return null;
}
function getBodyPartForExercise(name) {
  const ms = getMusclesForExercise(name);
  if (ms.length) return getBodyPartForMuscle(ms[0]) || 'Other';
  return getBodyPart(name);
}

function getBodyPart(name) {
  const n = name.toLowerCase();
  for (const [part, list] of Object.entries(BODY_PART_MAP)) {
    if (list.some(e => n.includes(e) || e.includes(n))) return part;
  }
  return 'Other';
}

// ═══════════════════════════════════════════════════════
// WEIGHT CONVERSION HELPERS
// ═══════════════════════════════════════════════════════

// Convert a value FROM its original unit TO the current display unit
function dispW(val, fromUnit) {
  const to = DB.unit;
  if (!val || fromUnit === to) return +val;
  if (fromUnit === 'kg' && to === 'lbs') return Math.round(+val * KG_TO_LBS * 10) / 10;
  if (fromUnit === 'lbs' && to === 'kg') return Math.round(+val / KG_TO_LBS * 10) / 10;
  return +val;
}

// Convert a display-unit value to kg (for goal storage)
function toKg(val, fromUnit) {
  if (fromUnit === 'lbs') return +val / KG_TO_LBS;
  return +val;
}

// Get the dataUnit of a workout (default: 'kg' for old workouts)
function wUnit(workout) {
  return workout.dataUnit || 'kg';
}

// ═══════════════════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════════════════
const DB = {
  get workouts()   { return JSON.parse(localStorage.getItem('ll_workouts') || '[]') },
  save(w)          { localStorage.setItem('ll_workouts', JSON.stringify(w)) },
  get exercises()  {
    const s = localStorage.getItem('ll_exercises');
    return s ? JSON.parse(s) : [...DEFAULT_EXERCISES];
  },
  saveExercises(e) { localStorage.setItem('ll_exercises', JSON.stringify(e)) },
  get unit()       { return localStorage.getItem('ll_unit') || 'kg' },
  saveUnit(u)      { localStorage.setItem('ll_unit', u) },
  get lang()       { return localStorage.getItem('ll_lang') || 'en' },
  saveLang(l)      { localStorage.setItem('ll_lang', l) },
  get profile()    { return JSON.parse(localStorage.getItem('ll_profile') || '{}') },
  saveProfile(p)   { localStorage.setItem('ll_profile', JSON.stringify(p)) },
  get goals()          { return JSON.parse(localStorage.getItem('ll_goals') || '[]') },
  saveGoals(g)         { localStorage.setItem('ll_goals', JSON.stringify(g)) },
  get exerciseMuscles(){ return JSON.parse(localStorage.getItem('ll_exercise_muscles') || '{}') },
  saveExerciseMuscles(m){ localStorage.setItem('ll_exercise_muscles', JSON.stringify(m)) },
  // templates = { 'Push': ['Bench Press','Lateral Raise', ...], ... }
  get templates()      { return JSON.parse(localStorage.getItem('ll_templates') || '{}') },
  saveTemplates(t)     { localStorage.setItem('ll_templates', JSON.stringify(t)) },
  addWorkout(w)    { const arr = this.workouts; arr.push(w); this.save(arr) },
  removeWorkout(id){ this.save(this.workouts.filter(w => w.id !== id)) }
};

const DEFAULT_EXERCISES = [
  'Squat','Bench Press','Deadlift','Overhead Press','Barbell Row',
  'Pull-up','Chin-up','Dip','Bicep Curl','Tricep Extension',
  'Leg Press','Romanian Deadlift','Incline Bench','Cable Row','Lateral Raise',
  'Hip Thrust','Face Pull','Hammer Curl','Skull Crusher','Arnold Press'
];

// ═══════════════════════════════════════════════════════
// I18N — English (source) + Japanese
// ═══════════════════════════════════════════════════════
const I18N = {
  ja: {
    // nav
    'Dashboard':'ダッシュボード','Log':'記録','History':'履歴','PRs':'自己ベスト','Exercises':'種目','Goals':'目標',
    // sections / headers
    'Last Workout':'前回のワークアウト','Body Stats':'身体データ','My Goals':'マイ目標',
    'Edit Goals':'目標を編集','Progress':'進捗','Target Muscle':'対象の筋肉',
    // buttons
    'Save':'保存','Cancel':'キャンセル','Delete':'削除','Edit':'編集','← Back':'← 戻る',
    'Export All Data':'すべてのデータを書き出す','Import Data':'データを取り込む',
    'Add Goal':'目標を追加','+ Add Goal':'＋ 目標を追加','Set Your First Goal':'最初の目標を設定',
    'Log First Workout':'最初のワークアウトを記録','Add Exercise':'種目を追加',
    'Save Workout':'ワークアウトを保存','Finish Workout':'ワークアウト終了',"Skip — don't tag a muscle":'スキップ（筋肉を指定しない）',
    'Manage Goals':'目標を管理',
    // labels
    'Current':'現在','Target':'目標値','Goal reached!':'目標達成！','Active':'選択中','Chart':'グラフ',
    'Top Weight':'最高重量','1 Rep':'1レップ','5 Rep':'5レップ','8 Rep':'8レップ','Est. 1RM':'推定1RM',
    'days trained':'トレーニング日数','days / week':'週あたり日数',
    'sessions':'セッション','session':'セッション','sessions this day':'この日のセッション',
    'Notes':'メモ','Workout':'ワークアウト','No data yet':'データがありません','No exercises':'種目なし',
    'Today':'今日','Yesterday':'昨日',
    // settings
    'Data & Settings':'データと設定','Backup your data':'データのバックアップ',
    'Restore from backup':'バックアップから復元','Language':'言語',
    // empty states
    'No goals set yet':'目標がまだ設定されていません','No workouts logged yet':'まだ記録がありません',
    'Tap Log to get started':'「記録」をタップして始めましょう','No workouts yet':'ワークアウトがまだありません',
    'Start logging to track your progress':'記録を始めて進捗を追跡しましょう',
    'Tap a highlighted day to see that session':'ハイライトされた日をタップするとその記録を表示します',
    // body parts
    'Chest':'胸','Shoulders':'肩','Back':'背中','Legs':'脚','Arms':'腕','Abs':'腹筋','Core':'体幹','Other':'その他',
    'Upper Chest':'胸上部','Middle Chest':'胸中部','Lower Chest':'胸下部',
    'Front Delt':'三角筋前部','Middle Delt':'三角筋中部','Rear Delt':'三角筋後部',
    'Traps':'僧帽筋','Lats':'広背筋','Teres Major':'大円筋','Rhomboids':'菱形筋',
    'Quads':'大腿四頭筋','Hamstrings':'ハムストリング','Glutes':'臀筋','Calves':'ふくらはぎ',
    'Biceps':'上腕二頭筋','Triceps':'上腕三頭筋','Forearms':'前腕',
    'Rectus Abdominis':'腹直筋','Obliques':'腹斜筋','Lower Abs':'下腹部'
  }
};

function L(){ return DB.lang === 'ja' ? 'ja-JP' : 'en-US'; }   // date locale
function t(s){ return (DB.lang === 'ja' && I18N.ja[s] !== undefined) ? I18N.ja[s] : s; }

// Walk the DOM and swap visible English text → Japanese (and back).
// Original English is cached per-node so switching languages is reversible.
function applyLang(){
  const dict = I18N.ja, ja = DB.lang === 'ja';
  const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
    acceptNode(node){
      const p = node.parentNode;
      if(!p) return NodeFilter.FILTER_REJECT;
      const tag = p.nodeName;
      if(tag === 'SCRIPT' || tag === 'STYLE') return NodeFilter.FILTER_REJECT;
      if(p.closest && p.closest('svg')) return NodeFilter.FILTER_REJECT;
      return node.nodeValue.trim() ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
    }
  });
  const nodes = []; let n; while(n = walker.nextNode()) nodes.push(n);
  for(const node of nodes){
    if(node.__en === undefined) node.__en = node.nodeValue;
    const raw = node.__en, key = raw.trim();
    let out = raw;
    if(ja && key){
      if(dict[key] !== undefined){
        out = raw.replace(key, dict[key]);
      } else {
        const m = key.match(/^(\S+)\s+(.+)$/);   // emoji-prefixed label e.g. "🎽 Chest"
        if(m && !/[A-Za-z]/.test(m[1]) && dict[m[2]] !== undefined)
          out = raw.replace(key, m[1] + ' ' + dict[m[2]]);
      }
    }
    if(node.nodeValue !== out) node.nodeValue = out;
  }
  // placeholders
  document.body.querySelectorAll('[placeholder]').forEach(el => {
    if(el.__enPh === undefined) el.__enPh = el.getAttribute('placeholder') || '';
    const k = el.__enPh.trim();
    el.setAttribute('placeholder', (ja && dict[k] !== undefined) ? dict[k] : el.__enPh);
  });
}

function setLang(l){
  DB.saveLang(l);
  showView(currentView);
  openDataModal();   // rebuild settings so the selected language highlights
}

// ═══════════════════════════════════════════════════════
// MIGRATION — tag old workouts with a dataUnit
// ═══════════════════════════════════════════════════════
function runMigrations() {
  // v2 — tag old workouts with dataUnit
  if (!localStorage.getItem('ll_migrated_v2')) {
    const currentUnit = DB.unit;
    const workouts = DB.workouts;
    if (workouts.length) {
      DB.save(workouts.map(w => w.dataUnit ? w : { ...w, dataUnit: currentUnit }));
    }
    localStorage.setItem('ll_migrated_v2', '1');
  }

  // v3 — convert goals from est-1RM format → targetWeightKg × targetReps
  if (!localStorage.getItem('ll_migrated_v3')) {
    const goals = DB.goals;
    if (goals.length) {
      DB.saveGoals(goals.map(g => {
        if (g.targetKg !== undefined && !g.targetWeightKg) {
          // old targetKg was est. 1RM; back-calculate to ~5-rep weight
          const wFor5 = g.targetKg / (1 + 5 / 30);
          return { id: g.id, exercise: g.exercise,
            targetWeightKg: Math.round(wFor5 / 2.5) * 2.5, targetReps: 5 };
        }
        return g;
      }));
    }
    localStorage.setItem('ll_migrated_v3', '1');
  }
}

// ═══════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════
let currentView    = 'dashboard';
let currentLog     = newLog();
let editingWorkout = null;  // non-null when editing a saved workout
let selectedPREx   = null;
let prChart        = null;
let openBPGroups   = new Set(); // which body-part groups are expanded
let editOpenEx     = new Set(); // expanded exercise accordions in the edit modal
let timerRunning   = false;     // workout stopwatch state
let timerInterval  = null;
let timerStartTs   = null;      // epoch ms when the current run segment started

// Dashboard chart state
let dashChart         = null;
let dashChartMode     = '1rm';   // '1rm' | '5' | '8'
let dashChartExercise = null;

// History calendar state — 'YYYY-MM' of the month currently shown (null = latest)
let historyMonth      = null;

// Returns the workout currently being built/edited (log or edit mode)
function getActiveLog() { return editingWorkout || currentLog; }

function newLog() {
  return { id: uid(), date: todayStr(), name: '', notes: '', exercises: [], durationSec: 0 };
}
// Format seconds → "1h 05m 12s" / "12:05" style compact display
function fmtDuration(sec) {
  sec = Math.max(0, Math.round(sec));
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  if(h) return `${h}:${pad2(m)}:${pad2(s)}`;
  return `${m}:${pad2(s)}`;
}
function uid()      { return Date.now().toString(36) + Math.random().toString(36).slice(2,6) }
function todayStr() { return new Date().toISOString().slice(0,10) }

function fmtDate(d) {
  return new Date(d+'T12:00:00').toLocaleDateString(L(),{month:'short',day:'numeric',year:'numeric'});
}
function daysAgo(d) {
  const diff = Math.round((Date.now() - new Date(d+'T12:00:00')) / 86400000);
  if(diff===0) return 'Today';
  if(diff===1) return 'Yesterday';
  return diff+'d ago';
}
// Countdown to a goal's target date: "5 days left", "Due today", "3 days overdue"
function deadlineInfo(dateStr) {
  if(!dateStr) return null;
  const diff = Math.round((new Date(dateStr+'T12:00:00') - Date.now()) / 86400000);
  const nice = new Date(dateStr+'T12:00:00').toLocaleDateString(L(),{month:'short',day:'numeric',year:'numeric'});
  if(diff > 1)  return { label:`${diff} days left`,  overdue:false, date:nice };
  if(diff === 1) return { label:`1 day left`,        overdue:false, date:nice };
  if(diff === 0) return { label:`Due today`,         overdue:false, date:nice };
  if(diff === -1) return { label:`1 day overdue`,    overdue:true,  date:nice };
  return { label:`${-diff} days overdue`,            overdue:true,  date:nice };
}

// ═══════════════════════════════════════════════════════
// FORMULAS
// ═══════════════════════════════════════════════════════
// calc1RM is unit-agnostic: works in whatever unit weight is passed in
function calc1RM(weight, reps) {
  const w = +weight, r = +reps;
  if(!w || !r) return 0;
  if(r===1) return w;
  return Math.round(w * (1 + r/30));
}

// ═══════════════════════════════════════════════════════
// PR ENGINE  (compares in kg; returns display-unit values)
// ═══════════════════════════════════════════════════════
function getPRs() {
  const prs = {};
  const displayUnit = DB.unit;

  for(const workout of DB.workouts) {
    const du = wUnit(workout);
    for(const ex of workout.exercises) {
      const n = ex.name;
      if(!prs[n]) prs[n] = { bestSet:null, bestSetUnit:'kg', bestWeightKg:0, best1RM_kg:0, date:'' };
      for(const set of ex.sets) {
        if(!set.weight || !set.reps || set.failed) continue;
        const wKg   = toKg(+set.weight, du);
        const reps  = +set.reps;
        // Prioritise the heaviest weight actually lifted; if two sets share the
        // same weight, the one with more reps wins. (Heavier weight always beats
        // a lighter weight even if the lighter set has more reps.)
        const prevReps = prs[n].bestSet ? +prs[n].bestSet.reps : -1;
        if(wKg > prs[n].bestWeightKg || (wKg === prs[n].bestWeightKg && reps > prevReps)) {
          prs[n].bestWeightKg = wKg;
          prs[n].best1RM_kg   = toKg(calc1RM(+set.weight, +set.reps), du);
          prs[n].bestSet      = set;
          prs[n].bestSetUnit  = du;
          prs[n].date         = workout.date;
        }
      }
    }
  }

  // Attach display-unit versions
  for(const n of Object.keys(prs)) {
    const pr = prs[n];
    if(!pr.bestSet) continue;
    pr.best1RM        = Math.round(dispW(pr.best1RM_kg, 'kg'));
    pr.bestWeight     = Math.round(dispW(pr.bestWeightKg, 'kg') * 10) / 10;
    pr.displayWeight  = dispW(+pr.bestSet.weight, pr.bestSetUnit);
  }
  return prs;
}

function getProgress(name) {
  const data = [];
  const displayUnit = DB.unit;
  const sorted = [...DB.workouts].sort((a,b)=>a.date.localeCompare(b.date));
  for(const workout of sorted) {
    const du = wUnit(workout);
    const ex = workout.exercises.find(e=>e.name===name);
    if(!ex) continue;
    const valid = ex.sets.filter(s=>s.weight&&s.reps&&!s.failed);
    if(!valid.length) continue;
    let bestWeightKg=0, bestSet=null, bestSetUnit=du;
    for(const s of valid){
      const wKg = toKg(+s.weight, du);
      const prevReps = bestSet ? +bestSet.reps : -1;
      if(wKg>bestWeightKg || (wKg===bestWeightKg && +s.reps>prevReps)){
        bestWeightKg=wKg; bestSet=s; bestSetUnit=du;
      }
    }
    const best1RM_kg = toKg(calc1RM(+bestSet.weight, +bestSet.reps), bestSetUnit);
    data.push({
      date:       workout.date,
      weight:     dispW(+bestSet.weight, bestSetUnit),
      reps:       +bestSet.reps,
      est1RM:     Math.round(dispW(best1RM_kg, 'kg'))
    });
  }
  return data;
}

function allExerciseNames() {
  const names = new Set(DB.exercises);
  for(const w of DB.workouts) for(const e of w.exercises) names.add(e.name);
  return [...names].sort();
}

// ═══════════════════════════════════════════════════════
// DASHBOARD CHART HELPERS
// ═══════════════════════════════════════════════════════

// Returns [{date, weightKg}] for an exercise in the chosen mode:
//   '1rm' → heaviest ACTUAL single-rep set per session (sessions without a
//            1-rep set are skipped — no estimates, only real lifts)
//   '5'   → best weight where reps >= 5 per session
//   '8'   → best weight where reps >= 8 per session
function getProgressByMode(name, mode) {
  const sorted = [...DB.workouts].sort((a,b) => a.date.localeCompare(b.date));
  const data = [];
  for (const workout of sorted) {
    const du = wUnit(workout);
    const ex = workout.exercises.find(e => e.name === name);
    if (!ex) continue;
    if (mode === '1rm') {
      let best = 0;
      for (const s of ex.sets) {
        if (s.weight && +s.reps === 1 && !s.failed) {
          const wKg = toKg(+s.weight, du);
          if (wKg > best) best = wKg;
        }
      }
      if (best > 0) data.push({ date: workout.date, weightKg: best });
    } else {
      const minReps = +mode;
      let best = 0;
      for (const s of ex.sets) {
        if (+s.reps >= minReps && s.weight && !s.failed) {
          const wKg = toKg(+s.weight, du);
          if (wKg > best) best = wKg;
        }
      }
      if (best > 0) data.push({ date: workout.date, weightKg: best });
    }
  }
  return data;
}

// Estimate weeks to hit targetKg (est-1RM) using linear regression on recent progress.
// Returns integer weeks, 0 if already achieved, null if can't estimate.
function estimateWeeks(exercise, targetKg) {
  const progress = getProgressByMode(exercise, '1rm');
  if (progress.length < 2) return null;
  const current = progress[progress.length - 1].weightKg;
  if (current >= targetKg) return 0;
  const first = progress[0];
  const last  = progress[progress.length - 1];
  const days  = (new Date(last.date+'T12:00:00') - new Date(first.date+'T12:00:00')) / 86400000;
  const gain  = last.weightKg - first.weightKg;
  if (days <= 0 || gain <= 0) return null;
  const perWeek = (gain / days) * 7;
  return Math.max(1, Math.round((targetKg - current) / perWeek));
}

// ═══════════════════════════════════════════════════════
// GOALS ENGINE
// ═══════════════════════════════════════════════════════

// Returns est. 1RM in kg implied by this goal (weight × reps).
// Matches calc1RM: a 1-rep goal IS the weight itself.
function goalTarget1RM_kg(goal) {
  if (goal.targetWeightKg && goal.targetReps) {
    if (+goal.targetReps === 1) return goal.targetWeightKg;
    return goal.targetWeightKg * (1 + goal.targetReps / 30);
  }
  return goal.targetKg || 0; // backward compat
}

// For chart: returns the goal reference line value (in display unit).
// All modes plot real lifted weight, so the line is the goal's target weight.
function goalLineForMode(goal, mode) {
  const tw_kg = goal.targetWeightKg || goalTarget1RM_kg(goal);
  return Math.round(dispW(tw_kg, 'kg') * 10) / 10;
}

function getGoalProgress(goal) {
  const prs   = getPRs();
  const pr    = prs[goal.exercise];
  // Progress is measured by the heaviest weight actually lifted vs the target weight.
  const currentKg  = pr?.bestWeightKg || 0;
  const targetKg   = goal.targetWeightKg || goalTarget1RM_kg(goal);
  const done       = currentKg >= targetKg && targetKg > 0;
  const remaining1RM_kg = Math.max(0, targetKg - currentKg);
  // target1RM key kept for backward compatibility with callers; holds target weight.
  return { currentKg, target1RM: targetKg, done, remaining1RM_kg };
}

function bmiColor(bmi) {
  const b = +bmi;
  if (b < 18.5) return '#3b82f6';
  if (b < 25)   return '#22c55e';
  if (b < 30)   return '#f97316';
  return '#ef4444';
}
function bmiLabel(bmi) {
  const b = +bmi;
  if (b < 18.5) return 'Underweight';
  if (b < 25)   return 'Normal';
  if (b < 30)   return 'Overweight';
  return 'Obese';
}

// ═══════════════════════════════════════════════════════
// SPARKLINE SVG
// ═══════════════════════════════════════════════════════
function sparklineSVG(vals, w, h) {
  if (!vals || vals.length < 2) return '';
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const range = max - min || 1;
  const pad = 5;
  const pts = vals.map((v, i) => ({
    x: pad + (i / (vals.length - 1)) * (w - pad * 2),
    y: h - pad - ((v - min) / range) * (h - pad * 2)
  }));
  const line = pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const area = [
    ...pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`),
    `${pts[pts.length-1].x.toFixed(1)},${h}`,
    `${pts[0].x.toFixed(1)},${h}`
  ].join(' ');
  const last = pts[pts.length - 1];
  const gid  = 'sg' + vals.length + Math.round(vals[0]);
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;margin-top:10px;width:100%">
    <defs>
      <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#f97316" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <polygon points="${area}" fill="url(#${gid})"/>
    <polyline points="${line}" fill="none" stroke="#f97316" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last.x.toFixed(1)}" cy="${last.y.toFixed(1)}" r="3.5" fill="#f97316"/>
  </svg>`;
}

function showView(view) {
  currentView = view;
  // Leaving the Log tab: keep counting in the background by banking elapsed time
  // into durationSec and pausing the visible 1s tick (resumes when you return).
  if (view !== 'log' && timerRunning) {
    currentLog.durationSec = currentDurationSec();
    timerStartTs = Date.now();   // keep wall-clock anchor so time still accrues
    clearInterval(timerInterval); timerInterval = null;
  }
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const navEl = document.getElementById('nav-'+view);
  if(navEl) navEl.classList.add('active');
  const main = document.getElementById('main');
  main.className = 'fade-in';
  if(view==='dashboard') renderDashboard();
  else if(view==='log')     renderLog();
  else if(view==='history') { historyMonth = null; renderHistory(); }
  else if(view==='prs')     renderPRs();
  else if(view==='goals')   renderGoals();
  syncUnitToggle();
  applyLang();
  document.getElementById('main').scrollTop = 0;
  updateScrollFab();
}

function setUnit(u) {
  DB.saveUnit(u);

  showView(currentView);

// ── Dashboard chart renderer ──────────────────────────
function renderDashboardChart() {
  const wrap = document.getElementById('dash-chart-wrap');
  if (!wrap) return;
  if (dashChart) { dashChart.destroy(); dashChart = null; }

  const exercise = dashChartExercise;
  if (!exercise) return;

  const unit     = DB.unit;
  const progress = getProgressByMode(exercise, dashChartMode);
  const goal     = DB.goals.find(g => g.exercise === exercise);

  if (!progress.length) {
    const what = dashChartMode === '1rm'
      ? 'No 1-rep sets logged yet for'
      : `No sets of ${dashChartMode}+ reps logged yet for`;
    wrap.innerHTML = `
      <div style="height:200px;display:flex;align-items:center;justify-content:center;
                  color:var(--muted);font-size:13px;text-align:center;line-height:1.6">
        ${what}<br><strong style="color:var(--text)">${exercise}</strong>
      </div>`;
    return;
  }

  // Ensure canvas exists (could have been replaced by the message above)
  if (!document.getElementById('dash-chart-canvas')) {
    wrap.innerHTML = `<canvas id="dash-chart-canvas"></canvas>`;
  }
  const ctx = document.getElementById('dash-chart-canvas');
  if (!ctx) return;

  const labels  = progress.map(p =>
    new Date(p.date+'T12:00:00').toLocaleDateString(L(),{month:'short',day:'numeric'}));
  const weights = progress.map(p => Math.round(dispW(p.weightKg,'kg') * 10) / 10);

  const modeLabel = dashChartMode === '1rm'
    ? `1-rep max (${unit})`
    : `Best weight @ ${dashChartMode}+ reps (${unit})`;

  const datasets = [{
    label:              modeLabel,
    data:               weights,
    borderColor:        '#f97316',
    backgroundColor:    'rgba(249,115,22,0.12)',
    borderWidth:        2.5,
    pointBackgroundColor:'#f97316',
    pointRadius:        4,
    pointHoverRadius:   6,
    tension:            0.3,
    fill:               true
  }];

  // Goal reference line
  if (goal) {
    const goalDisplay = goalLineForMode(goal, dashChartMode);
    datasets.push({
      label:       `Goal: ${goalDisplay}${unit}`,
      data:        Array(labels.length).fill(goalDisplay),
      borderColor: '#22c55e',
      borderDash:  [6, 3],
      borderWidth: 2,
      pointRadius: 0,
      tension:     0,
      fill:        false
    });
  }

  dashChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color:'#888', font:{ size:11 }, boxWidth:12, padding:12 } },
        tooltip: {
          backgroundColor:'#1a1a1a', borderColor:'#2a2a2a', borderWidth:1,
          titleColor:'#f0f0f0', bodyColor:'#aaa',
          callbacks: { label: c => ` ${c.dataset.label}: ${c.parsed.y}${unit}` }
        }
      },
      scales: {
        x: { grid:{ color:'#1f1f1f' }, ticks:{ color:'#555', font:{ size:10 }, maxTicksLimit:6 } },
        y: { grid:{ color:'#1f1f1f' }, ticks:{ color:'#555', font:{ size:10 }, callback: v => v+unit } }
      }
    }
  });
}

// Suggestion banner under Session Type: template first, last-session fallback
function templateSuggestionHTML() {
  const name = currentLog.name;
  if (!name || currentLog.exercises.length) return '';
  const tpl = DB.templates[name];
  if (tpl && tpl.length) {
    return `
    <div class="card" style="border-color:var(--green);background:rgba(34,197,94,.06)">

// "Save as template" offer — shown when exercises exist and differ from saved template
function saveTemplateOfferHTML() {
  const name = currentLog.name;
  if (!name || !currentLog.exercises.length) return '';
  const cur = currentLog.exercises.map(e => e.name);
  const tpl = DB.templates[name] || [];
  if (tpl.length === cur.length && tpl.every((n,i) => n === cur[i])) return '';
  return `
  <button class="btn btn-secondary btn-full btn-sm" style="margin-bottom:12px" onclick="saveCurrentAsTemplate()">
    📋 ${tpl.length ? 'Update' : 'Save as'} ${name} template
  </button>`;
}

// ── Templates & repeat-last-session ────────────────────
// Most recent workout with this session name (exact match)
function lastSessionNamed(name) {
  if (!name) return null;
  const sorted = [...DB.workouts].filter(w => w.name === name)
    .sort((a,b) => b.date.localeCompare(a.date));
  return sorted[0] || null;
}
// Last sets for an exercise across all workouts → placeholder values in display unit
function lastSetsFor(exName) {
  const sorted = [...DB.workouts].sort((a,b) => b.date.localeCompare(a.date));
  for (const w of sorted) {
    const ex = w.exercises.find(e => e.name === exName);
    if (ex && ex.sets.length) {
      const du = wUnit(w);
      return ex.sets.map(s => ({
        phW: s.weight ? Math.round(dispW(+s.weight, du) * 10) / 10 : '',
        phR: s.reps || ''
      }));
    }
  }
  return null;
}
// Build a fresh exercise entry with placeholder sets from history
function exerciseWithPlaceholders(name) {
  const last = lastSetsFor(name);
  const sets = last
    ? last.map(p => ({ weight:'', reps:'', phW:p.phW, phR:p.phR }))
    : [{ weight:'', reps:'' }];
  return { name, sets };
}
function applyTemplateToLog() {
  const tpl = DB.templates[currentLog.name];
  if (!tpl || !tpl.length) return;
  currentLog.exercises = tpl.map(exerciseWithPlaceholders);
  renderLog();
  showToast(`Loaded your ${currentLog.name} template 📋`);
}
function applyLastSessionToLog() {
  const last = lastSessionNamed(currentLog.name);
  if (!last) return;
  currentLog.exercises = last.exercises.map(ex => {
    const du = wUnit(last);
    return { name: ex.name, sets: ex.sets.map(s => ({
      weight:'', reps:'',
      phW: s.weight ? Math.round(dispW(+s.weight, du) * 10) / 10 : '',
      phR: s.reps || ''
    })) };
  });
  renderLog();
  showToast(`Loaded last ${currentLog.name} session ⟳`);
}
// Tap an empty input → accept the placeholder value, selected for easy bump
function phFill(el, ei, si, field) {
  if (!el.value && el.placeholder && el.placeholder !== '0') {
    el.value = el.placeholder;
    updateSet(ei, si, field, el.value);
    refreshRM(ei, si);
    el.select();
  }
}
function saveCurrentAsTemplate() {
  const name = currentLog.name;
  const exNames = currentLog.exercises.map(e => e.name);
  if (!name || !exNames.length) return;
  const t = DB.templates;
  t[name] = exNames;
  DB.saveTemplates(t);
  showToast(`Saved as your ${name} template 📋`);
  renderLog();
}
function deleteTemplate(name) {
  if (!confirm(`Delete the "${name}" template?`)) return;
  const t = DB.templates;
  delete t[name];
  DB.saveTemplates(t);
  openDataModal();
  showToast('Template deleted');
}

// ── Workout duration stopwatch ─────────────────────────
function currentDurationSec() {
  let s = currentLog.durationSec || 0;
  if (timerRunning && timerStartTs) s += (Date.now() - timerStartTs) / 1000;
  return s;
}
function paintTimer() {
  const d = document.getElementById('dur-display');
  if (d) d.textContent = fmtDuration(currentDurationSec());
}
function toggleTimer() {
  if (timerRunning) {
    // pause: bank elapsed time
    currentLog.durationSec = currentDurationSec();
    timerRunning = false;
    timerStartTs = null;
    clearInterval(timerInterval); timerInterval = null;
  } else {
    timerRunning = true;
    timerStartTs = Date.now();
    clearInterval(timerInterval);
    timerInterval = setInterval(paintTimer, 1000);
  }
  if (currentView === 'log') renderLog();
}
function resetTimer() {
  if ((currentLog.durationSec || timerRunning) && !confirm('Reset the timer to 0:00?')) return;
  timerRunning = false;
  timerStartTs = null;
  clearInterval(timerInterval); timerInterval = null;
  currentLog.durationSec = 0;
  if (currentView === 'log') renderLog();
}
function stopTimerAndBank() {
  if (timerRunning) {
    currentLog.durationSec = currentDurationSec();
    timerRunning = false;
    timerStartTs = null;
  }
  clearInterval(timerInterval); timerInterval = null;
}

function refreshExSection() {
  document.getElementById('exercises-section').innerHTML = renderExercisesHTML();
}

function updateSet(ei, si, field, val) {
  currentLog.exercises[ei].sets[si][field] = val;
}
function refreshRM(ei, si) {
  const set = currentLog.exercises[ei].sets[si];
  const el  = document.getElementById(`rm-${ei}-${si}`);
  if (!el) return;
  if (set.failed) { el.innerHTML = '<span style="color:var(--red);font-size:10px">FAIL</span>'; return; }
  el.textContent = set.weight && set.reps ? calc1RM(set.weight, set.reps) : '-';
}
function addSet(ei) {
  const last = currentLog.exercises[ei].sets.slice(-1)[0];
  currentLog.exercises[ei].sets.push({weight:last?.weight||'', reps:''});
  refreshExSection();
  setTimeout(()=>document.getElementById(`w-${ei}-${currentLog.exercises[ei].sets.length-1}`)?.focus(),50);
}
function removeSet(ei, si) {
  currentLog.exercises[ei].sets.splice(si,1);
  if(!currentLog.exercises[ei].sets.length) currentLog.exercises[ei].sets.push({weight:'',reps:''});
  refreshExSection();
}
function removeExercise(ei) {
  currentLog.exercises.splice(ei,1);
  refreshExSection();
}

function setBW(ei, si) {
  const bw = DB.profile.bodyweight;
  if (!bw) { showToast('Add your body weight in My Stats (tap 👤 icon) first', false); return; }
  const log = getActiveLog();
  const set = log.exercises[ei].sets[si];

  if (editingWorkout) {
    // Convert display-unit BW to the workout's stored data unit
    const du  = wUnit(editingWorkout);
    const kg  = toKg(+bw, DB.unit);
    set.weight = (du === 'kg') ? Math.round(kg * 10) / 10 : Math.round(kg * KG_TO_LBS * 10) / 10;
    set._bw    = true;
    const el   = document.getElementById(`ew-${ei}-${si}`);
    if (el) el.value = bw; // show in display unit
    editRefreshRM(ei, si);
    // Refresh BW button highlight without full re-render
    const btn = el?.closest('.set-cell')?.querySelector('.set-qbtn');
    if (btn) btn.className = 'set-qbtn bw-on';
  } else {
    set.weight = bw;
    set._bw    = true;
    const el   = document.getElementById(`w-${ei}-${si}`);
    if (el) el.value = bw;
    refreshRM(ei, si);
    const btn = el?.closest('.set-cell')?.querySelector('.set-qbtn');
    if (btn) btn.className = 'set-qbtn bw-on';
  }
}

function toggleFailed(ei, si) {
  const log = getActiveLog();
  const set = log.exercises[ei].sets[si];
  set.failed = !set.failed;
  if (editingWorkout) editRefreshExSection();
  else refreshExSection();
}

  const avail  = allExerciseNames().filter(e=>!used.has(e));
  document.getElementById('modal-content').innerHTML = `
  <div style="font-size:18px;font-weight:700;margin-bottom:14px">Add Exercise</div>

      oninput="filterExDropdown(this.value)" autocomplete="off"
      autocapitalize="words" autocorrect="off" spellcheck="false"
      onkeydown="if(event.key==='Enter'){const v=this.value.trim();if(v)pickExerciseName(v)}">
    <div id="ex-dropdown" class="ac-dropdown" style="display:none"></div>
  </div>
  <button class="btn btn-primary btn-full" style="margin-bottom:14px" onclick="pickExerciseName(document.getElementById('ex-search').value.trim())">Next: Pick Muscle →</button>
  <div class="label">Common Exercises</div>
  <div>${avail.map(e=>`<span class="ex-chip" onclick="pickExerciseName('${esc(e)}')">${e}</span>`).join('')}</div>`;
  openModal();
  setTimeout(()=>document.getElementById('ex-search')?.focus(), 100);
}

// Multi-select muscle picker (shared by log flow and Exercises-tab flow)
let pickedMuscles = new Set();
function renderMusclePicker(name, backFn, confirmFn) {
  let html = `
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <button class="btn btn-secondary btn-sm" onclick="${backFn}" style="padding:8px 10px">← Back</button>
    <div style="font-size:18px;font-weight:700">Target Muscles</div>
  </div>
  <div style="font-size:14px;color:var(--accent);font-weight:600;margin-bottom:4px">${name}</div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Tap all the muscles this exercise hits — e.g. Deadlift → Lats + Hamstrings + Glutes</div>`;

  for (const [bp, data] of Object.entries(MUSCLE_GROUPS)) {
    html += `<div class="label" style="margin-bottom:6px">${data.emoji} ${bp}</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">`;
    for (const m of data.sub) {
      const sel = pickedMuscles.has(m);
      html += `<span class="ex-chip" id="mchip-${m.replace(/\s/g,'_')}" onclick="toggleMuscleChip('${esc(m)}')"
        style="${sel?'background:var(--accent);color:#fff;border-color:var(--accent)':''}">${sel?'✓ ':''}${m}</span>`;
    }
    html += `</div>`;
  }
  html += `
  <button class="btn btn-primary btn-full" style="margin-top:4px" onclick="${confirmFn}">
    Add Exercise<span id="mcount">${pickedMuscles.size?` (${pickedMuscles.size} muscle${pickedMuscles.size>1?'s':''})`:''}</span>
  </button>
  <button class="btn btn-secondary btn-full" style="margin-top:8px" onclick="pickedMuscles.clear();${confirmFn}">Skip — don't tag muscles</button>`;
  document.getElementById('modal-content').innerHTML = html;
}
function toggleMuscleChip(m) {
  pickedMuscles.has(m) ? pickedMuscles.delete(m) : pickedMuscles.add(m);
  const chip = document.getElementById(`mchip-${m.replace(/\s/g,'_')}`);
  if (chip) {
    const on = pickedMuscles.has(m);
    chip.style.background  = on ? 'var(--accent)' : '';
    chip.style.color       = on ? '#fff' : '';
    chip.style.borderColor = on ? 'var(--accent)' : '';
    chip.textContent       = (on ? '✓ ' : '') + m;
  }
  const c = document.getElementById('mcount');
  if (c) c.textContent = pickedMuscles.size ? ` (${pickedMuscles.size} muscle${pickedMuscles.size>1?'s':''})` : '';
}

function pickExerciseName(name) {
  name = name.trim();
  if (!name) { showToast('Enter an exercise name', false); return; }
  pickedMuscles = new Set(getMusclesForExercise(name));
  renderMusclePicker(name, 'openAddExModal()', `confirmAddExercise('${esc(name)}')`);
}
function confirmAddExercise(name) {
  addExercise(name, [...pickedMuscles]);
}

function filterExDropdown(q) {
  const dd = document.getElementById('ex-dropdown');
  if(!q.trim()) { dd.style.display='none'; return }
  const active = getActiveLog();
  const used   = new Set(active.exercises.map(e=>e.name));
  const matches = allExerciseNames().filter(e=>!used.has(e)&&e.toLowerCase().includes(q.toLowerCase()));
  const isNew  = q.trim() && !allExerciseNames().map(e=>e.toLowerCase()).includes(q.trim().toLowerCase());
  const items  = [
    ...matches.map(e=>`<div class="ac-item" onclick="pickExerciseName('${esc(e)}')">${e}</div>`),
    isNew ? `<div class="ac-item" onclick="pickExerciseName('${esc(q.trim())}')" style="color:var(--accent)">+ Add "${q.trim()}"</div>` : ''
  ].join('');
  dd.innerHTML = items || `<div class="ac-item" style="color:var(--muted)">No matches</div>`;
  dd.style.display = 'block';
}

function addExercise(name, muscle) {
  name = name.trim(); if(!name) return;
  // Save to known exercises list
  const exs = DB.exercises;
  if(!exs.includes(name)) { exs.push(name); DB.saveExercises(exs) }
  // Save muscle mapping if provided (array of muscles)
  const mList = Array.isArray(muscle) ? muscle : (muscle ? [muscle] : []);
  if (mList.length) {
    const muscles = DB.exerciseMuscles;
    muscles[name] = mList;
    DB.saveExerciseMuscles(muscles);
  }

  if (editingWorkout) {
    // Edit mode — add to editingWorkout and refresh edit modal
    editingWorkout.exercises.push({name, sets:[{weight:'',reps:''}]});
    editOpenEx.add(editingWorkout.exercises.length - 1); // expand the new one
    renderWorkoutEditModal();
    setTimeout(()=>{
      document.getElementById(`edit-ex-${editingWorkout.exercises.length-1}`)
        ?.scrollIntoView({behavior:'smooth',block:'start'});
    }, 120);
  } else {
    // Log mode — pre-fill placeholder sets from this exercise's last session
    currentLog.exercises.push(exerciseWithPlaceholders(name));
    closeModal();
    refreshExSection();
    setTimeout(()=>{
      document.getElementById(`ex-${currentLog.exercises.length-1}`)
        ?.scrollIntoView({behavior:'smooth',block:'start'});
    }, 100);
  }
}

function saveWorkout() {
  const dateEl  = document.getElementById('log-date');
  const nameEl  = document.getElementById('log-name-select');
  const custEl  = document.getElementById('log-name-custom');
  const notesEl = document.getElementById('log-notes');
  if(dateEl)  currentLog.date  = dateEl.value;
  if(nameEl && nameEl.value !== '__custom__') currentLog.name = nameEl.value;
  if(custEl && custEl.style.display !== 'none') currentLog.name = custEl.value;
  if(notesEl) currentLog.notes = notesEl.value;
  stopTimerAndBank();                          // freeze the stopwatch into durationSec

  if(!currentLog.exercises.length) { showToast('Add at least one exercise!', false); return }

  const cleaned = {
    ...currentLog,
    name:     currentLog.name || 'Workout',
    durationSec: Math.round(currentLog.durationSec || 0),
    dataUnit: DB.unit,                        // ← tag with current unit
    exercises: currentLog.exercises.map(ex=>({
      ...ex,
      sets: ex.sets.filter(s=>s.weight||s.reps)
                   .map(({phW, phR, ...s}) => s)   // drop placeholder hints
    })).filter(ex=>ex.sets.length)
  };

  DB.addWorkout(cleaned);
  showToast('Workout saved! 💪');
  timerRunning = false; timerStartTs = null;
  clearInterval(timerInterval); timerInterval = null;
  currentLog = newLog();
  showView('dashboard');
}

function clearLog() {
  if(currentLog.exercises.length && !confirm('Clear this workout?')) return;
  stopTimerAndBank();
  timerRunning = false; timerStartTs = null;
  clearInterval(timerInterval); timerInterval = null;
  currentLog = newLog();
  renderLog();
}

// ═══════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════
// ── History — calendar view ───────────────────────────
const pad2 = n => String(n).padStart(2, '0');

// Stable colour per workout name (same name → same colour, app-wide)
const WORKOUT_PALETTE = ['#f97316','#22c55e','#3b82f6','#a855f7','#ec4899',
                         '#eab308','#14b8a6','#ef4444','#06b6d4','#f43f5e'];
function workoutColor(name){
  const names = [...new Set(DB.workouts.map(w => w.name || 'Workout'))].sort();
  const i = names.indexOf(name || 'Workout');
  return WORKOUT_PALETTE[(i < 0 ? 0 : i) % WORKOUT_PALETTE.length];
}

function renderHistory() {
  const workouts = DB.workouts;
  let html = `
  <div class="section-header">
    <div style="font-size:22px;font-weight:800">${t('History')}</div>
    <div style="font-size:13px;color:var(--muted)">${workouts.length} ${t('sessions')}</div>
  </div>`;

  if(!workouts.length) {
    html += `<div class="empty">
      <div class="empty-icon">⏱️</div>
      <div style="font-weight:600;margin-bottom:6px">Your workout history lives here</div>
      <div style="font-size:13px;margin-bottom:18px">Every workout you finish appears on a calendar.<br>Tap a day to review or edit it later.</div>
      <button class="btn btn-primary" onclick="showView('log')">Log your first workout →</button>
    </div>`;
    document.getElementById('main').innerHTML = html;
    return;
  }

  // Map each YYYY-MM-DD to the workouts logged that day
  const byDate = {};
  for(const w of workouts) (byDate[w.date] = byDate[w.date] || []).push(w);
  const allDates = Object.keys(byDate).sort();
  const earliestYM = allDates[0].slice(0,7);

  // Which month are we showing?
  const realNow = new Date();
  const currentYM = `${realNow.getFullYear()}-${pad2(realNow.getMonth()+1)}`;
  const ym = historyMonth || allDates[allDates.length-1].slice(0,7);
  const [year, mon] = ym.split('-').map(Number);
  const monthIdx = mon - 1;

  const monthLabel = new Date(year, monthIdx, 1)
    .toLocaleDateString(L(), { month:'long', year:'numeric' });
  const todayStr = `${realNow.getFullYear()}-${pad2(realNow.getMonth()+1)}-${pad2(realNow.getDate())}`;

  const startDOW    = new Date(year, monthIdx, 1).getDay();
  const daysInMonth = new Date(year, monthIdx+1, 0).getDate();

  // Sessions + distinct training days this month.
  // Weekly frequency = average training days across the Sun–Sat weeks that
  // actually had a workout (so a single full week of 5 days reads as 5, not 1.1).
  let monthSessions = 0;
  const monthDays = new Set();
  const weekDayCounts = {};   // weekKey (Sunday's date) → Set of training days
  for(let d=1; d<=daysInMonth; d++){
    const ds = `${year}-${pad2(monthIdx+1)}-${pad2(d)}`;
    if(byDate[ds]){
      monthSessions += byDate[ds].length;
      monthDays.add(ds);
      const dt = new Date(year, monthIdx, d);
      const sunday = new Date(dt); sunday.setDate(dt.getDate() - dt.getDay());
      const wk = `${sunday.getFullYear()}-${pad2(sunday.getMonth()+1)}-${pad2(sunday.getDate())}`;
      (weekDayCounts[wk] = weekDayCounts[wk] || new Set()).add(ds);
    }
  }
  const activeWeeks = Object.keys(weekDayCounts).length;
  const perWeekRaw  = activeWeeks ? monthDays.size / activeWeeks : 0;
  const perWeek     = Number.isInteger(perWeekRaw) ? perWeekRaw : Math.round(perWeekRaw * 10) / 10;

  const prevDisabled = ym <= earliestYM;
  const nextDisabled = ym >= currentYM;

  // Nav + month title
  html += `
  <div class="cal-nav">
    <button class="cal-nav-btn" onclick="historyShiftMonth(-1)" ${prevDisabled?'disabled':''}>‹</button>
    <div class="cal-nav-title">${monthLabel}</div>
    <button class="cal-nav-btn" onclick="historyShiftMonth(1)" ${nextDisabled?'disabled':''}>›</button>
  </div>`;

  // Weekday headers (localised)
  const dow = DB.lang === 'ja' ? ['日','月','火','水','木','金','土'] : ['S','M','T','W','T','F','S'];
  html += `<div class="cal-grid" style="margin-bottom:5px">`;
  for(const d of dow) html += `<div class="cal-dow">${d}</div>`;
  html += `</div>`;

  // Day cells — coloured by workout type
  html += `<div class="cal-grid">`;
  for(let i=0; i<startDOW; i++) html += `<div class="cal-cell blank"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const ds   = `${year}-${pad2(monthIdx+1)}-${pad2(d)}`;
    const list = byDate[ds];
    const isToday = ds === todayStr;
    if(list && list.length){
      const tap = list.length === 1
        ? `showWorkoutDetail('${list[0].id}')`
        : `showDaySessions('${ds}')`;
      const c0   = workoutColor(list[0].name);
      const dots = list.slice(0,4)
        .map(w => `<span class="cal-dot" style="background:${workoutColor(w.name)}"></span>`).join('');
      html += `
      <div class="cal-cell has-workout ${isToday?'today':''}" onclick="${tap}"
           style="background:${c0}22;border-color:${c0}">
        ${d}
        <span class="cal-dots">${dots}</span>
      </div>`;
    } else {
      html += `<div class="cal-cell ${isToday?'today':''}">${d}</div>`;
    }
  }
  html += `</div>`;

  // Legend — workout types present this month, with their colours
  const monthNames = [...new Set(
    [...monthDays].flatMap(ds => byDate[ds].map(w => w.name || 'Workout'))
  )].sort();
  if(monthNames.length){
    html += `<div class="cal-legend">`;
    for(const n of monthNames){
      html += `<div class="cal-legend-item">
        <span class="cal-legend-swatch" style="background:${workoutColor(n)}"></span>${n}</div>`;
    }
    html += `</div>`;
  }

  // Month summary
  html += `
  <div class="card" style="margin-top:16px;display:flex;justify-content:space-around;text-align:center">
    <div>
      <div style="font-size:20px;font-weight:800;color:var(--accent)">${monthSessions}</div>
      <div style="font-size:11px;color:var(--muted)">${t('sessions')}</div>
    </div>
    <div>
      <div style="font-size:20px;font-weight:800;color:var(--accent)">${monthDays.size}</div>
      <div style="font-size:11px;color:var(--muted)">${t('days trained')}</div>
    </div>
    <div>
      <div style="font-size:20px;font-weight:800;color:var(--accent)">${perWeek}</div>
      <div style="font-size:11px;color:var(--muted)">${t('days / week')}</div>
    </div>
  </div>
  <div style="text-align:center;font-size:11px;color:var(--muted);margin-top:6px">
    ${t('Tap a highlighted day to see that session')}
  </div>`;

  document.getElementById('main').innerHTML = html;
}

function historyShiftMonth(delta){
  const workouts = DB.workouts;
  const allDates = workouts.map(w=>w.date).sort();
  const ym = historyMonth || (allDates.length ? allDates[allDates.length-1].slice(0,7) : null);
  if(!ym) return;
  let [y, m] = ym.split('-').map(Number);
  m += delta;
  if(m < 1){ m = 12; y--; } else if(m > 12){ m = 1; y++; }
  historyMonth = `${y}-${pad2(m)}`;
  renderHistory();
}

// When a day has more than one session, list them and let the user pick
function showDaySessions(dateStr){
  const list = DB.workouts.filter(w=>w.date===dateStr);
  if(!list.length) return;
  if(list.length===1){ showWorkoutDetail(list[0].id); return; }
  const unit = DB.unit;
  let html = `<div style="font-size:18px;font-weight:800;margin-bottom:4px">${fmtDate(dateStr)}</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px">${list.length} ${t('sessions this day')}</div>`;
  for(const w of list){
    const du       = wUnit(w);
    const exNames  = w.exercises.map(e=>e.name).join(' · ') || 'No exercises';
    const totalSets= w.exercises.reduce((s,e)=>s+e.sets.length, 0);
    const vol      = w.exercises.reduce((s,e)=>s+e.sets.reduce((s2,set)=>s2+(dispW(+set.weight||0,du))*(+set.reps||0),0),0);
    html += `
    <div class="workout-item" onclick="showWorkoutDetail('${w.id}')">
      <div style="flex:1;min-width:0">
        <div class="workout-name">${w.name||'Workout'}</div>
        <div class="workout-exercises" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${exNames}</div>
        ${vol?`<div style="font-size:11px;color:var(--accent);font-weight:600;margin-top:4px">${Math.round(vol).toLocaleString()}${unit} vol · ${totalSets} sets</div>`:''}
      </div>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" style="margin-left:8px;flex-shrink:0;margin-top:2px">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>`;
  }
  document.getElementById('modal-content').innerHTML = html;
  openModal();
}

function showWorkoutDetail(id) {
  const w = DB.workouts.find(x=>x.id===id); if(!w) return;
  const unit = DB.unit;
  const du   = wUnit(w);
  let html = `
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
    <div>
      <div style="font-size:20px;font-weight:800">${w.name||'Workout'}</div>
      <div style="font-size:13px;color:var(--muted)">${fmtDate(w.date)}${w.durationSec?` · ⏱️ ${fmtDuration(w.durationSec)}`:''}</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-secondary btn-sm" onclick="openEditWorkoutModal('${id}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Edit
      </button>
      <button class="btn btn-danger btn-sm" onclick="deleteWorkout('${id}')">Delete</button>
    </div>
  </div>`;

  for(const ex of w.exercises) {
    html += `
    <div style="margin-bottom:16px">
      <div style="font-size:15px;font-weight:700;margin-bottom:${ex.note?'2px':'8px'};color:var(--accent)">${ex.name}</div>
      ${ex.note?`<div style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:8px">💬 ${ex.note}</div>`:''}
      <div class="sets-header">
        <span>Set</span><span>Wt (${unit})</span><span>Reps</span><span>~1RM</span><span></span>
      </div>
      ${ex.sets.map((s,i)=>{
        const dw    = dispW(+s.weight||0, du);
        const drm   = s.failed ? '<span style="color:var(--red);font-size:10px">FAIL</span>'
                                : (dw && s.reps ? calc1RM(dw, s.reps) : '—');
        const bwTag = s._bw ? ' <span style="font-size:10px;color:var(--accent)">BW</span>' : '';
        return `
        <div class="set-row" style="pointer-events:none">
          <div class="set-num">${i+1}</div>
          <div style="text-align:center;font-size:14px;font-weight:700">${dw||'—'}${bwTag}</div>
          <div style="text-align:center;font-size:14px;font-weight:700">${s.failed?'✗':s.reps||'—'}</div>
          <div class="set-rm">${drm}</div>
          <div></div>
        </div>`;
      }).join('')}
    </div>`;
  }

  if(w.notes) html += `<div class="card-sm"><div class="label">Notes</div><div style="font-size:13px">${w.notes}</div></div>`;
  document.getElementById('modal-content').innerHTML = html;
  openModal();
}

function deleteWorkout(id) {
  if(!confirm('Delete this workout permanently?')) return;
  DB.removeWorkout(id);
  closeModal();
  renderHistory();
  showToast('Workout deleted');
}

// ── Edit workout ──────────────────────────────────────
function openEditWorkoutModal(id) {
  const w = DB.workouts.find(x=>x.id===id); if(!w) return;
  editingWorkout = JSON.parse(JSON.stringify(w));
  editOpenEx = new Set();   // start with all exercises collapsed

        <select id="edit-log-name-select" onchange="handleEditSessionSelect(this.value)">

    </div>
