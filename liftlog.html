// Gather all app data into one JSON string (shared by file export + cloud sync).
function buildBackupJSON(pretty) {
  const data = {};
  DATA_KEYS.forEach(k => {
    const v = localStorage.getItem(k);
    if (v !== null) data[k] = v;
  });
  return JSON.stringify(data, null, pretty ? 2 : 0);
}

async function exportData() {
  const json     = buildBackupJSON(true);
  const date     = new Date().toISOString().slice(0,10);
  const filename = `liftlog-backup-${date}.json`;
  const blob     = new Blob([json], { type: 'application/json' });

  // Prefer the native share sheet on mobile (esp. iOS installed PWAs, where a
  // plain download often just opens a preview). Falls back to file download.
  let shared = false;
  if (navigator.canShare) {
    try {
      const file = new File([blob], filename, { type: 'application/json' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Lift Log backup' });
        shared = true;
      }
    } catch (e) {
      // User cancelled the share sheet, or sharing failed — fall through to download.
      if (e && e.name === 'AbortError') return;   // cancelled: don't mark as backed up
    }
  }

  if (!shared) {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href        = url;
    a.download    = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
  }

  localStorage.setItem('ll_last_backup', Date.now().toString());
  showToast(t('Backup saved! 📦'));
  if (currentView === 'dashboard') renderDashboard();
}

// ── Backup status helpers ──────────────────────────────
function lastBackupTs() {
  const v = +localStorage.getItem('ll_last_backup');
  return v > 0 ? v : null;
}
function daysSinceBackup() {
  const ts = lastBackupTs();
  return ts === null ? null : Math.floor((Date.now() - ts) / 86400000);
}
// Overdue if there's data worth keeping and no backup in the last 7 days.
function backupOverdue() {
  if (!DB.workouts.length) return false;
  const d = daysSinceBackup();
  return d === null || d >= 7;
}
function lastBackupLabel() {
  const d = daysSinceBackup();
  if (d === null) return '⚠️ You haven\'t backed up yet — your data lives only on this device.';
  if (d === 0)   return '✅ Last backup: today';
  if (d === 1)   return '✅ Last backup: yesterday';
  return `${d >= 7 ? '⚠️' : '✅'} Last backup: ${d} days ago`;
}
// Dashboard banner: nudge once per day while a backup is overdue.
function shouldShowBackupBanner() {
  if (!backupOverdue()) return false;
  return localStorage.getItem('ll_backup_banner_dismissed') !== todayStr();
}
function dismissBackupBanner() {
  localStorage.setItem('ll_backup_banner_dismissed', todayStr());
}

// Read a chosen .json backup file directly (no copy-paste needed).
function importFromFile(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => { applyImport(String(reader.result || '')); input.value = ''; };
  reader.onerror = () => showToast(t('Couldn\'t read that file'), false);
  reader.readAsText(file);
}

// Restore from JSON pasted into the textarea (fallback path).
function importData() {
  const raw = document.getElementById('import-json').value.trim();
  if (!raw) { showToast(t('Choose a backup file or paste JSON first'), false); return; }
  applyImport(raw);
}

// Shared restore logic: validate, summarise, confirm, then overwrite.
function applyImport(raw) { restoreFromString(raw, true); }

// Restore from a JSON string. askConfirm=false skips the prompt (used by cloud restore
// flows that have already confirmed). Returns true on success.
function restoreFromString(raw, askConfirm) {
  let data;
  try { data = JSON.parse(String(raw).trim()); }
  catch(e) { showToast(t('Invalid JSON — check your backup file'), false); return false; }
  if (!data.ll_workouts) { showToast(t('Doesn\'t look like a Lift Log backup'), false); return false; }

  if (askConfirm) {
    // Build a plain-language summary so the user knows what they're about to replace.
    let incoming = [];
    try { incoming = JSON.parse(data.ll_workouts || '[]'); } catch(e) {}
    const current = DB.workouts.length;
    const dates   = incoming.map(w => w.date).filter(Boolean).sort();
    const range   = dates.length ? `${fmtDate(dates[0])} – ${fmtDate(dates[dates.length-1])}` : t('no dates');
    const summary = tf('This backup has {n} workout(s) ({range}).\nIt will REPLACE your current {cur} workout(s).\n\nContinue?',
      {n:incoming.length, range:range, cur:current});
    if (!confirm(summary)) return false;
  }

  DATA_KEYS.forEach(k => {
    if (data[k] !== undefined) localStorage.setItem(k, data[k]);
  });
  closeModal();
  showToast(t('Data restored! 💪'));
  runMigrations();
  showView('dashboard');
  return true;
}

// ═══════════════════════════════════════════════════════
// GOOGLE DRIVE AUTO-BACKUP
// Serverless: signs in via Google Identity Services and stores ONE file in the
// app's private "appDataFolder" (the app can't see any of your other Drive files).
// ═══════════════════════════════════════════════════════
const GD_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
const GD_FILE  = 'liftlog-backup.json';
// The app's built-in Google Client ID — users just tap Connect, no pasting.
// (An OAuth Web client ID is not a secret; it's meant to ship in client code.)
const GD_CLIENT_ID = '78446155323-isaqvdoe79jo8j0gdfff8jl7vo8v40b6.apps.googleusercontent.com';
let gdTokenClient = null;
let gdToken       = null;   // { access_token, expiry(ms) }
let gdSyncTimer   = null;
let gdSyncing     = false;

function gdClientId()  { return (localStorage.getItem('ll_gd_client_id') || GD_CLIENT_ID || '').trim(); }
function gdConnected() { return localStorage.getItem('ll_gd_connected') === '1' && !!gdClientId(); }
function gdReady()     { return !!(window.google && window.google.accounts && google.accounts.oauth2); }

function gdSetStatus(txt) {
  const el = document.getElementById('gd-status');
  if (el) el.textContent = txt;
}
function syncAgoLabel(ts) {
  if (!ts) return 'not yet';
  const m = Math.floor((Date.now() - ts) / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + ' min ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function gdInitClient() {
  if (!gdClientId() || !gdReady()) return false;
  if (gdTokenClient) return true;
  gdTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: gdClientId(),
    scope: GD_SCOPE,
    callback: () => {}   // set per-request in gdGetToken
  });
  return true;
}

// Resolve a valid access token. interactive=false attempts a silent refresh
// (no popup) and rejects if the user would need to interact.
function gdGetToken(interactive) {
  return new Promise((resolve, reject) => {
    if (gdToken && gdToken.expiry - 60000 > Date.now()) return resolve(gdToken.access_token);
    if (!gdInitClient()) return reject(new Error('Google sign-in not ready yet'));
    gdTokenClient.callback = (resp) => {
      if (resp && resp.access_token) {
        gdToken = { access_token: resp.access_token, expiry: Date.now() + (resp.expires_in || 3500) * 1000 };
        resolve(resp.access_token);
      } else {
        reject(resp || new Error('No token'));
      }
    };
    try { gdTokenClient.requestAccessToken({ prompt: interactive ? '' : 'none' }); }
    catch (e) { reject(e); }
  });
}

async function gdFindFileId(token) {
  const url = 'https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id)&q=' +
    encodeURIComponent(`name='${GD_FILE}'`);
  const r = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
  if (!r.ok) throw new Error('Drive list failed (' + r.status + ')');
  const j = await r.json();
  return (j.files && j.files[0]) ? j.files[0].id : null;
}

async function gdUpload(token, jsonStr) {
  const id       = await gdFindFileId(token);
  const metadata = id ? {} : { name: GD_FILE, parents: ['appDataFolder'] };
  const boundary = 'llbnd' + Date.now();
  const body =
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n` +
    JSON.stringify(metadata) +
    `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n` +
    jsonStr +
    `\r\n--${boundary}--`;
  const url = id
    ? `https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=multipart`
    : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  const r = await fetch(url, {
    method: id ? 'PATCH' : 'POST',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': `multipart/related; boundary=${boundary}` },
    body
  });
  if (!r.ok) throw new Error('Drive upload failed (' + r.status + ')');
}

async function gdDownload(token) {
  const id = await gdFindFileId(token);
  if (!id) return null;
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,
    { headers: { Authorization: 'Bearer ' + token } });
  if (!r.ok) throw new Error('Drive download failed (' + r.status + ')');
  return await r.text();
}

// Debounced auto-sync — called after any data change.
function scheduleCloudBackup() {
  if (!gdConnected()) return;
  clearTimeout(gdSyncTimer);
  gdSyncTimer = setTimeout(() => cloudBackupNow(true), 2500);
}

// Push current data to Drive. silent=true is the background path (no popups/toasts on token issues).
async function cloudBackupNow(silent) {
  if (!gdConnected() || gdSyncing) return;
  gdSyncing = true;
  gdSetStatus('syncing…');
  try {
    const token = await gdGetToken(!silent);   // background sync stays silent; manual taps may prompt
    await gdUpload(token, buildBackupJSON(false));
    const now = Date.now();
    localStorage.setItem('ll_last_backup', now.toString());
    localStorage.setItem('ll_gd_last_sync', now.toString());
    gdSetStatus(syncAgoLabel(now));
    if (!silent) showToast(t('Backed up to Google Drive ☁️'));
  } catch (e) {
    gdSetStatus('reconnect needed');
    if (!silent) showToast(t('Drive sync failed — try reconnecting'), false);
  } finally {
    gdSyncing = false;
  }
}

// First-time connect: sign in, then reconcile device vs. cloud data.
async function gdConnect() {
  const input = document.getElementById('gd-client-id');
  if (input && input.value.trim()) localStorage.setItem('ll_gd_client_id', input.value.trim());
  if (!gdClientId()) { showToast(t('Paste your Google Client ID first'), false); return; }
  if (!gdReady())    { showToast(t('Google sign-in still loading — try again in a second'), false); return; }
  gdTokenClient = null;   // re-init in case the Client ID changed
  try {
    const token = await gdGetToken(true);
    localStorage.setItem('ll_gd_connected', '1');

    const remote = await gdDownload(token);
    let remoteCount = 0;
    if (remote) { try { remoteCount = JSON.parse(JSON.parse(remote).ll_workouts || '[]').length; } catch (e) {} }
    const localCount = DB.workouts.length;

    if (remote && remoteCount > 0 && (localCount === 0 || remoteCount > localCount)) {
      if (confirm(tf('Found a backup in Google Drive with {n} workout(s) (this device has {local}).\n\nRestore the Drive copy?', {n:remoteCount, local:localCount}))) {
        restoreFromString(remote, false);
      } else {
        await gdUpload(token, buildBackupJSON(false));   // keep device data, overwrite cloud
      }
    } else {
      await gdUpload(token, buildBackupJSON(false));
    }
    const now = Date.now();
    localStorage.setItem('ll_last_backup', now.toString());
    localStorage.setItem('ll_gd_last_sync', now.toString());
    showToast(t('Google Drive connected ☁️'));
    if (document.getElementById('modal-overlay').classList.contains('open')) openDataModal();
  } catch (e) {
    showToast(t('Couldn\'t connect to Google Drive'), false);
  }
}

function gdDisconnect() {
  if (!confirm(t('Stop auto-backup to Google Drive?\n\nYour existing Drive backup file stays safe — the app just stops syncing.'))) return;
  localStorage.removeItem('ll_gd_connected');
  gdToken = null;
  showToast(t('Disconnected from Google Drive'));
  openDataModal();
}

// On launch: if connected, warm a silent token so background syncs work without a popup.
function gdBootstrap() {
  if (!gdConnected()) return;
  let tries = 0;
  const iv = setInterval(() => {
    if (gdReady()) {
      clearInterval(iv);
      gdInitClient();
      gdGetToken(false).then(() => cloudBackupNow(true)).catch(() => gdSetStatus('reconnect needed'));
    } else if (++tries > 40) {
      clearInterval(iv);   // give up after ~10s
    }
  }, 250);
}

// UTILS

function esc(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'") }

// ═══════════════════════════════════════════════════════
// GENERIC TOUCH DRAG-AND-DROP REORDER
// ═══════════════════════════════════════════════════════
// Works on any container whose children carry [data-drag-item]. Two ways to grab:
//   • the [data-drag-handle] (⠿) starts dragging immediately, and
//   • pressing-and-holding anywhere on the row (long-press ~200ms) also lifts it,
//     so you can reorder by grabbing the whole section, not just the handle.
// A quick tap still works as a normal click, and a moving touch still scrolls.
// onReorder(from, to) uses splice semantics (remove at `from`, insert at `to`).
function scrollParent(el) {
  let n = el;
  while (n && n !== document.body) {
    const oy = getComputedStyle(n).overflowY;
    if (/(auto|scroll)/.test(oy) && n.scrollHeight > n.clientHeight) return n;
    n = n.parentElement;
  }
  return document.getElementById('main') || document.scrollingElement || document.body;
}

function enableDragReorder(container, onReorder) {
  if (!container) return;
  container.querySelectorAll('[data-drag-item]').forEach(item => {
    const handle = item.querySelector('[data-drag-handle]');
    if (handle) {
      handle.style.touchAction = 'none';
      handle.onpointerdown = (e) => {
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        e.preventDefault();
        e.stopPropagation();
        startActiveDrag(item, container, onReorder, handle, e.clientY, e.pointerId);
      };
    }
    // Long-press anywhere on the row (avoids interactive controls + the handle).
    item.onpointerdown = (e) => beginLongPressDrag(e, item, container, onReorder, handle);
  });
}

function beginLongPressDrag(e, item, container, onReorder, handle) {
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  // Let real controls and the dedicated handle behave normally.
  if (e.target.closest('input,textarea,select,button,a,[data-no-drag]')) return;
  if (handle && (e.target === handle || handle.contains(e.target))) return;

  const startX = e.clientX, startY = e.clientY, pid = e.pointerId;
  let timer = null;
  const cleanup = () => {
    clearTimeout(timer);
    item.removeEventListener('pointermove', onMove);
    item.removeEventListener('pointerup', cleanup);
    item.removeEventListener('pointercancel', cleanup);
  };
  const onMove = (ev) => {
    // Movement before the hold completes → it's a scroll/tap, abort the long-press.
    if (Math.abs(ev.clientX - startX) > 9 || Math.abs(ev.clientY - startY) > 9) cleanup();
  };
  timer = setTimeout(() => {
    cleanup();
    try { if (navigator.vibrate) navigator.vibrate(15); } catch (_) {}
    startActiveDrag(item, container, onReorder, item, startY, pid, true);
  }, 200);
  item.addEventListener('pointermove', onMove, { passive: true });
  item.addEventListener('pointerup', cleanup);
  item.addEventListener('pointercancel', cleanup);
}

function startActiveDrag(item, container, onReorder, captureEl, startClientY, pointerId, suppressClick) {
  const items0   = [...container.querySelectorAll('[data-drag-item]')];
  const fromIdx  = items0.indexOf(item);
  if (fromIdx < 0) return;
  const scroller = scrollParent(container);
  const rect     = item.getBoundingClientRect();
  const grabDY   = startClientY - rect.top;

  if (getComputedStyle(container).position === 'static') {
    container.dataset._posfix = '1';
    container.style.position = 'relative';
  }

  // Placeholder keeps the original slot so the list doesn't collapse.
  const ph = document.createElement('div');
  ph.className = 'drag-placeholder';
  ph.style.height = rect.height + 'px';
  ph.style.margin = getComputedStyle(item).margin;
  item.parentNode.insertBefore(ph, item);

  // Lift the dragged item out of flow and follow the finger.
  const prevTouch = captureEl.style.touchAction;
  captureEl.style.touchAction = 'none';
  item.classList.add('drag-active');
  item.style.position = 'fixed';
  item.style.zIndex   = '200';
  item.style.width    = rect.width + 'px';
  item.style.left     = rect.left + 'px';
  item.style.top      = (startClientY - grabDY) + 'px';
  item.style.pointerEvents = 'none';

  const indicator = document.createElement('div');
  indicator.className = 'drag-indicator';
  container.appendChild(indicator);

  let toIdx = fromIdx, clientY = startClientY, raf = null;
  const realItems = () => [...container.querySelectorAll('[data-drag-item]')].filter(x => x !== item);

  const update = () => {
    item.style.top = (clientY - grabDY) + 'px';
    const rl = realItems();
    let k = 0;
    for (const el of rl) {
      const r = el.getBoundingClientRect();
      if (clientY > r.top + r.height / 2) k++; else break;
    }
    toIdx = k;
    const cRect = container.getBoundingClientRect();
    let top;
    if (k >= rl.length) {
      const ref = rl.length ? rl[rl.length - 1].getBoundingClientRect() : ph.getBoundingClientRect();
      top = ref.bottom - cRect.top;
    } else {
      top = rl[k].getBoundingClientRect().top - cRect.top;
    }
    indicator.style.top = (top - 1) + 'px';
  };

  const tick = () => {
    const s = scroller.getBoundingClientRect();
    const EDGE = 70, SPEED = 14;
    if (clientY < s.top + EDGE)         scroller.scrollTop -= SPEED;
    else if (clientY > s.bottom - EDGE) scroller.scrollTop += SPEED;
    update();
    raf = requestAnimationFrame(tick);
  };

  const onMove = (ev) => { ev.preventDefault(); clientY = ev.clientY; update(); };
  const onUp = () => {
    cancelAnimationFrame(raf);
    captureEl.removeEventListener('pointermove', onMove);
    captureEl.removeEventListener('pointerup', onUp);
    captureEl.removeEventListener('pointercancel', onUp);
    captureEl.style.touchAction = prevTouch;
    item.classList.remove('drag-active');
    ['position','zIndex','width','left','top','pointerEvents'].forEach(p => item.style[p] = '');
    ph.remove();
    indicator.remove();
    if (container.dataset._posfix) { container.style.position = ''; delete container.dataset._posfix; }
    // Swallow the click that would otherwise fire after a drag (e.g. expand/collapse).
    if (suppressClick) item.addEventListener('click', (ev) => { ev.stopPropagation(); ev.preventDefault(); }, { capture: true, once: true });
    if (toIdx !== fromIdx) onReorder(fromIdx, toIdx);
  };

  try { captureEl.setPointerCapture(pointerId); } catch (_) {}
  captureEl.addEventListener('pointermove', onMove, { passive: false });
  captureEl.addEventListener('pointerup', onUp);
  captureEl.addEventListener('pointercancel', onUp);
  update();
  raf = requestAnimationFrame(tick);
}

// Order shown in the customize list (and default dashboard order).
const DASH_DEFAULT = ['chart','goals','last','stats','quickstats','thisweek','records','streak','voltrend','muscle','minical','goalring'];

function getDashLayout() {
  const saved = DB.dashLayout;
  let layout = Array.isArray(saved) ? saved.filter(s => s && DASH_SECTIONS[s.id]) : [];
  const present = new Set(layout.map(s => s.id));
  for (const id of DASH_DEFAULT) if (!present.has(id)) layout.push({ id, on: DASH_SECTIONS[id].on });
  return layout;
}
function saveDashLayout(layout) { DB.saveDashLayout(layout); }

function toggleDashEdit() { dashEditMode = !dashEditMode; renderDashboard(); }
function toggleDashSection(id) {
  const l = getDashLayout();
  const s = l.find(x => x.id === id);
  if (s) s.on = !s.on;
  saveDashLayout(l);
  renderDashboard();
}
function moveDashSection(from, to) {
  const l = getDashLayout();
  if (from === to || from < 0 || to < 0 || from >= l.length || to >= l.length) return;
  const [it] = l.splice(from, 1);
  l.splice(to, 0, it);
  saveDashLayout(l);
  renderDashboard();
}
function dashEditorHTML() {
  const rows = getDashLayout().map(item => {
    const meta = DASH_SECTIONS[item.id];

      </div>

    </div>`;
  }).join('');
  return `
  <div class="card" style="background:var(--accent-dim);border-color:var(--accent);margin-bottom:12px">

    <div style="font-size:12px;color:var(--muted);line-height:1.5">${t('Press and hold a row (or its <span style="color:var(--text)">⠿</span> handle) to drag it into a new order, and use the switches to show or hide each section. Tap <strong style="color:var(--accent)">Done</strong> up top when you\'re finished.')}</div>
  </div>
  <div id="dash-edit-list">${rows}</div>`;
}

// OPTIONAL DASHBOARD CARDS (toggled on in Customize)

// Monday-start week containing date d, at local midnight.
function startOfWeek(d) {
  const x = new Date(d);
  const day = (x.getDay() + 6) % 7;   // Mon=0 … Sun=6
  x.setHours(0, 0, 0, 0);
  x.setDate(x.getDate() - day);
  return x;
}
// Total volume of a workout in the current display unit (skips failed sets).
function workoutVolumeDisp(w) {
  const du = wUnit(w);
  return w.exercises.reduce((s, e) =>
    s + e.sets.reduce((s2, set) =>
      s2 + (set.failed ? 0 : (dispW(+set.weight || 0, du)) * (+set.reps || 0)), 0), 0);
}
function workoutSetCount(w) {
  return w.exercises.reduce((s, e) => s + e.sets.filter(st => st.weight || st.reps).length, 0);
}
function fmtVolShort(v, unit) {
  v = Math.round(v);
  return (v >= 10000 ? Math.round(v / 1000) + 'k' : v >= 1000 ? (v / 1000).toFixed(1) + 'k' : v) + unit;
}
function trainedWeekStamps() {
  const set = new Set();
  for (const w of DB.workouts) set.add(+startOfWeek(w.date + 'T12:00:00'));
  return set;
}
function weekStreaks() {
  const weeks = trainedWeekStamps();
  let cur = 0;
  const d = startOfWeek(new Date());
  if (!weeks.has(+d)) d.setDate(d.getDate() - 7);   // grace: count from last week if none yet this week
  while (weeks.has(+d)) { cur++; d.setDate(d.getDate() - 7); }
  const sorted = [...weeks].sort((a, b) => a - b);
  let longest = 0, run = 0, prev = null;
  for (const t of sorted) {
    if (prev !== null) { const pd = new Date(prev); pd.setDate(pd.getDate() + 7); run = (+pd === t) ? run + 1 : 1; }
    else run = 1;
    longest = Math.max(longest, run); prev = t;
  }
  return { current: cur, longest };
}

function dashLabel(txt) { return `<div class="label" style="margin-bottom:8px;margin-top:4px">${txt}</div>`; }
function dashStatCell(val, lbl, color) {
  return `<div style="flex:1;text-align:center;min-width:0">
    <div style="font-size:21px;font-weight:800;color:${color||'var(--text)'}">${val}</div>
    <div style="font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-top:3px">${lbl}</div>
  </div>`;
}

function dashCardQuickStats() {
  const ws = DB.workouts, unit = DB.unit;
  if (!ws.length) return '';
  const totalVol = ws.reduce((s, w) => s + workoutVolumeDisp(w), 0);
  const sow = startOfWeek(new Date());
  const thisWk = ws.filter(w => new Date(w.date + 'T12:00:00') >= sow).length;
  const streak = weekStreaks().current;
  return dashLabel('📊 Overview') + `
  <div class="card" style="margin-bottom:14px;display:flex;gap:4px">
    ${dashStatCell(ws.length, 'Workouts')}
    ${dashStatCell(fmtVolShort(totalVol, unit), 'Total vol')}
    ${dashStatCell(thisWk, 'This week')}
    ${dashStatCell(streak + 'w', 'Streak', 'var(--accent)')}
  </div>`;
}

function dashCardThisWeek() {
  const ws = DB.workouts, unit = DB.unit;
  const sow = startOfWeek(new Date());
  const prevStart = new Date(sow); prevStart.setDate(prevStart.getDate() - 7);
  const inRange = (w, a, b) => { const d = new Date(w.date + 'T12:00:00'); return d >= a && (!b || d < b); };
  const cur = ws.filter(w => inRange(w, sow, null));
  const prev = ws.filter(w => inRange(w, prevStart, sow));
  const vol = cur.reduce((s, w) => s + workoutVolumeDisp(w), 0);
  const volPrev = prev.reduce((s, w) => s + workoutVolumeDisp(w), 0);
  const sets = cur.reduce((s, w) => s + workoutSetCount(w), 0);
  const delta = volPrev > 0 ? Math.round((vol - volPrev) / volPrev * 100) : null;
  const deltaHTML = delta === null ? '<span style="color:var(--muted)">No data last week</span>'
    : `<span style="color:${delta >= 0 ? 'var(--green)' : 'var(--red)'};font-weight:700">${delta >= 0 ? '▲' : '▼'} ${Math.abs(delta)}%</span> <span style="color:var(--muted)">vs last week</span>`;
  return dashLabel('🗓️ This Week') + `
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;gap:4px;margin-bottom:10px">
      ${dashStatCell(cur.length, 'Workouts')}
      ${dashStatCell(sets, 'Sets')}
      ${dashStatCell(fmtVolShort(vol, unit), 'Volume')}
    </div>
    <div style="font-size:12px;text-align:center">${deltaHTML}</div>
  </div>`;
}

function dashCardRecords() {
  const prs = getPRs(), unit = DB.unit;

      <div style="flex:1;min-width:0">

      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:15px;font-weight:800">${p.best1RM}${unit}</div>

      </div>

  return dashLabel('🏆 Personal Records') + `<div class="card" style="margin-bottom:14px;padding-top:4px;padding-bottom:4px">${rows}</div>`;

function dashCardStreak() {
  if (!DB.workouts.length) return '';
  const { current, longest } = weekStreaks();
  return dashLabel('🔥 Training Streak') + `
  <div class="card" style="margin-bottom:14px;display:flex;align-items:center;gap:16px">

function dashCardVolTrend() {
  if (DB.workouts.length < 1) return '';
  return dashLabel('📉 Weekly Volume') + `

function renderVolTrendChart() {
  const ctx = document.getElementById('voltrend-canvas');
  if (!ctx) return;
  if (volTrendChart) { volTrendChart.destroy(); volTrendChart = null; }
  const unit = DB.unit;
  const sow = startOfWeek(new Date());
  const weeks = [];
  for (let i = 11; i >= 0; i--) { const d = new Date(sow); d.setDate(d.getDate() - i * 7); weeks.push(d); }
  const totals = weeks.map(wk => {
    const end = new Date(wk); end.setDate(end.getDate() + 7);
    return DB.workouts.filter(w => { const d = new Date(w.date + 'T12:00:00'); return d >= wk && d < end; })
      .reduce((s, w) => s + workoutVolumeDisp(w), 0);
  });
  const labels = weeks.map(wk => wk.toLocaleDateString(L(), { month: 'short', day: 'numeric' }));
  volTrendChart = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ label: `Volume (${unit})`, data: totals.map(v => Math.round(v)),
      backgroundColor: 'rgba(249,115,22,0.5)', borderColor: '#f97316', borderWidth: 1, borderRadius: 4 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { backgroundColor: '#1a1a1a', borderColor: '#2a2a2a', borderWidth: 1,

        y: { grid: { color: '#1f1f1f' }, ticks: { color: '#555', font: { size: 9 },
          callback: v => v >= 1000 ? (v / 1000) + 'k' : v } }

  });
}

function dashCardMuscle() {
  const since = new Date(); since.setDate(since.getDate() - 30);
  const counts = {};
  for (const w of DB.workouts) {
    if (new Date(w.date + 'T12:00:00') < since) continue;
    for (const ex of w.exercises) {
      const done = ex.sets.filter(s => s.weight || s.reps).length;
      if (!done) continue;
      const muscles = getMusclesForExercise(ex.name);
      const groups = muscles.length ? [...new Set(muscles.map(m => getBodyPartForMuscle(m) || 'Other'))] : ['Other'];
      for (const g of groups) counts[g] = (counts[g] || 0) + done;
    }
  }
  const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  if (!entries.length) return dashLabel('💪 Muscle Balance') + `
    <div class="card" style="margin-bottom:14px;text-align:center;color:var(--muted);font-size:12px;padding:20px">
      Log some workouts to see which muscle groups you train most (last 30 days).
    </div>`;
  const max = entries[0][1];
  const bars = entries.map(([g, n]) => `
    <div style="margin-bottom:9px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
        <span style="font-weight:600">${bodyPartLabel(g)}</span><span style="color:var(--muted)">${n} set${n !== 1 ? 's' : ''}</span>
      </div>
      <div style="height:8px;background:var(--card2);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${Math.round(n / max * 100)}%;background:var(--accent);border-radius:4px"></div>
      </div>
    </div>`).join('');
  return dashLabel('💪 Muscle Balance') + `
  <div class="card" style="margin-bottom:14px">
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Sets per muscle group · last 30 days</div>
    ${bars}
  </div>`;
}

function dashCardMiniCal() {
  const ws = DB.workouts;
  const byDate = {};
  for (const w of ws) (byDate[w.date] = byDate[w.date] || []).push(w);
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const start = startOfWeek(today); start.setDate(start.getDate() - 7 * 4);   // 5 weeks incl. current
  const dow = DB.lang === 'ja' ? ['月','火','水','木','金','土','日'] : ['M','T','W','T','F','S','S'];
  let cells = '';
  for (let i = 0; i < 35; i++) {
    const d = new Date(start); d.setDate(start.getDate() + i);
    const ds = `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
    const list = byDate[ds];
    const future = d > today;
    const isToday = +d === +today;
    const bg = list && list.length ? workoutColor(list[0].name) : 'var(--card2)';
    cells += `<div title="${ds}" style="aspect-ratio:1;border-radius:6px;background:${future ? 'transparent' : bg};
      opacity:${future ? .3 : 1};border:${isToday ? '2px solid var(--accent)' : '1px solid var(--border)'};
      display:flex;align-items:center;justify-content:center;font-size:9px;color:${list && list.length ? '#fff' : 'var(--muted)'}">${d.getDate()}</div>`;
  }
  const head = dow.map(d => `<div style="text-align:center;font-size:9px;color:var(--muted)">${d}</div>`).join('');
  return dashLabel('📅 Training Calendar') + `
  <div class="card" style="margin-bottom:14px">
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Last 5 weeks</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">${head}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>
  </div>`;
}

function dashCardGoalRing() {
  const goals = DB.goals;
  if (!goals.length) return '';
  let sum = 0, n = 0;
  for (const g of goals) {
    const gp = getGoalProgress(g);
    if (gp.type === 'bodyweight') { sum += gp.pct; n++; }
    else if (gp.target1RM > 0) { sum += Math.min(100, (gp.currentKg / gp.target1RM) * 100); n++; }
  }
  if (!n) return '';
  const pct = Math.round(sum / n);
  const reached = goals.filter(g => getGoalProgress(g).done).length;
  const R = 34, C = 2 * Math.PI * R, off = C * (1 - pct / 100);
  return dashLabel('🎯 Goal Progress') + `
  <div class="card" style="margin-bottom:14px;display:flex;align-items:center;gap:18px;cursor:pointer" onclick="showView('goals')">
    <svg width="84" height="84" viewBox="0 0 84 84" style="flex-shrink:0">
      <circle cx="42" cy="42" r="${R}" fill="none" stroke="var(--card2)" stroke-width="9"/>
      <circle cx="42" cy="42" r="${R}" fill="none" stroke="var(--accent)" stroke-width="9" stroke-linecap="round"
        stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 42 42)"/>
      <text x="42" y="47" text-anchor="middle" font-size="18" font-weight="800" fill="var(--text)">${pct}%</text>
    </svg>
    <div style="flex:1;min-width:0">
      <div style="font-size:14px;font-weight:700;margin-bottom:3px">Overall goal progress</div>
      <div style="font-size:12px;color:var(--muted)">${reached} of ${goals.length} goal${goals.length !== 1 ? 's' : ''} reached · tap to view</div>
    </div>
  </div>`;
}

function moveExercise(ei, dir) {
  const arr = currentLog.exercises, ni = ei + dir;
  if (ni < 0 || ni >= arr.length) return;
  [arr[ei], arr[ni]] = [arr[ni], arr[ei]];

}
function editMoveExercise(ei, dir) {
  const arr = editingWorkout.exercises, ni = ei + dir;
  if (ni < 0 || ni >= arr.length) return;
  [arr[ei], arr[ni]] = [arr[ni], arr[ei]];
  // keep accordion open-state attached to the moved cards
  const a = editOpenEx.has(ei), b = editOpenEx.has(ni);
  b ? editOpenEx.add(ei) : editOpenEx.delete(ei);
  a ? editOpenEx.add(ni) : editOpenEx.delete(ni);
  editRefreshExSection();
}
function toggleEditEx(ei) {
  editOpenEx.has(ei) ? editOpenEx.delete(ei) : editOpenEx.add(ei);
  editRefreshExSection();
}

function activeScrollEl() {
  const overlay = document.getElementById('modal-overlay');
  return overlay.classList.contains('open')
    ? document.getElementById('modal')
    : document.getElementById('main');
}
function scrollActiveTop() {
  activeScrollEl().scrollTo({ top: 0, behavior: 'smooth' });
}
function updateScrollFab() {
  const fab = document.getElementById('scroll-top-fab');
  if (!fab) return;
  fab.classList.toggle('show', activeScrollEl().scrollTop > 300);
}

function initEnhancements() {
  const main  = document.getElementById('main');
  const sheet = document.getElementById('modal');
  main.addEventListener('scroll', updateScrollFab, { passive: true });
  sheet.addEventListener('scroll', updateScrollFab, { passive: true });

  // Swipe the bottom sheet down to dismiss it
  const overlay = document.getElementById('modal-overlay');
  let startY = null, delta = 0, dragging = false;
  const reset = () => { sheet.style.transform = ''; overlay.style.background = ''; };

  sheet.addEventListener('touchstart', e => {
    if (e.touches.length !== 1 || sheet.scrollTop > 0) { dragging = false; startY = null; return; }
    startY = e.touches[0].clientY; delta = 0; dragging = true;
    sheet.style.transition = 'none';
  }, { passive: true });

  sheet.addEventListener('touchmove', e => {
    if (!dragging || startY === null) return;
    delta = e.touches[0].clientY - startY;
    if (delta > 0 && sheet.scrollTop <= 0) {
      e.preventDefault();
      sheet.style.transform = `translateY(${delta}px)`;
      overlay.style.background = `rgba(0,0,0,${Math.max(0, 0.75 - delta / 600)})`;
    }
  }, { passive: false });

  sheet.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    sheet.style.transition = 'transform .25s ease';
    if (delta <= 110) { reset(); startY = null; delta = 0; return; }

    if (editingWorkout && !document.getElementById('edit-exercises-section')) {
      // inside the add-exercise sub-modal → go back to the edit modal
      reset(); renderWorkoutEditModal();
    } else if (editingWorkout) {
      // the edit modal itself → confirm before discarding
      reset();
      if (confirm(t('Discard changes?'))) cancelEditWorkout();
    } else {
      // any other modal → slide out, then close
      sheet.style.transform = 'translateY(100%)';
      overlay.style.background = '';
      setTimeout(() => { closeModal(); sheet.style.transform = ''; }, 220);
    }
    startY = null; delta = 0;
  });
}

function fireConfetti() {
  const layer = document.getElementById('confetti-layer');
  if (!layer) return;
  layer.innerHTML = '';
  layer.classList.add('show');
  const colors = ['#22c55e','#86efac','#f97316','#fbbf24','#3b82f6','#a855f7','#ffffff'];
  const N = 110;
  for (let i = 0; i < N; i++) {
    const b = document.createElement('div');
    b.className = 'confetti-bit';
    b.style.left = (Math.random() * 100) + 'vw';
    b.style.background = colors[i % colors.length];
    b.style.animationDuration = (2.2 + Math.random() * 1.8) + 's';
    b.style.animationDelay = (Math.random() * 0.5) + 's';
    if (Math.random() < 0.5) b.style.borderRadius = '50%';
    layer.appendChild(b);
  }
  clearTimeout(window.__confettiTO);
  window.__confettiTO = setTimeout(() => { layer.classList.remove('show'); layer.innerHTML = ''; }, 4500);
}

// ── Completed-goal archive ─────────────────────────────
function achievedGoals() {
  try { return JSON.parse(localStorage.getItem('ll_goals_achieved') || '[]'); }
  catch (e) { return []; }
}
function saveAchievedGoals(a) { localStorage.setItem('ll_goals_achieved', JSON.stringify(a)); }

// Earliest workout date where this exercise hit the goal's target weight.
function goalAchievedDate(goal) {
  if (isBodyWeightGoal(goal)) {
    const start = goal.startWeightKg || currentBodyWeightKg() || goal.targetWeightKg;
    const losing = goal.targetWeightKg <= start;
    for (const e of DB.bwLog) {
      if (losing ? e.kg <= goal.targetWeightKg : e.kg >= goal.targetWeightKg) return e.date;
    }
    return todayStr();
  }
  const targetKg = goal.targetWeightKg || goalTarget1RM_kg(goal);
  if (!(targetKg > 0)) return todayStr();
  const sorted = [...DB.workouts].sort((a, b) => a.date.localeCompare(b.date));
  for (const w of sorted) {
    const du = wUnit(w);
    const ex = w.exercises.find(e => e.name === goal.exercise);
    if (!ex) continue;
    for (const s of ex.sets) {
      if (s.weight && s.reps && !s.failed && toKg(+s.weight, du) >= targetKg) return w.date;
    }
  }
  return todayStr();
}
// Record a reached goal once (re-records if the target was later raised & hit again).
function archiveGoalIfNew(goal) {
  const tgtKg = goal.targetWeightKg || goalTarget1RM_kg(goal);
  const arr   = achievedGoals();
  if (isBodyWeightGoal(goal)) {
    const key = goal.id + ':bw' + tgtKg;
    if (arr.some(a => a.key === key)) return;
    arr.push({ key, type: 'bodyweight', targetWeightKg: tgtKg, date: goalAchievedDate(goal) });
    saveAchievedGoals(arr);
    return;
  }
  const key = goal.id + ':' + tgtKg + 'x' + (goal.targetReps || '');
  if (arr.some(a => a.key === key)) return;
  arr.push({ key, exercise: goal.exercise, targetWeightKg: tgtKg,
    targetReps: goal.targetReps || 1, date: goalAchievedDate(goal) });
  saveAchievedGoals(arr);
}
function syncGoalArchive() {
  for (const goal of DB.goals) if (getGoalProgress(goal).done) archiveGoalIfNew(goal);
}

// Fire confetti once when a goal is newly reached. Re-arms if the target is raised.
function checkGoalCelebrations() {
  let celebrated;
  try { celebrated = JSON.parse(localStorage.getItem('ll_celebrated') || '[]'); }
  catch (e) { celebrated = []; }
  const nowDone = [];
  let fresh = false;
  for (const goal of DB.goals) {
    if (getGoalProgress(goal).done) {
      nowDone.push(goal.id);
      archiveGoalIfNew(goal);
      if (!celebrated.includes(goal.id)) fresh = true;
    }
  }
  // Keep only still-completed ids, so raising a target lets it celebrate again later
  localStorage.setItem('ll_celebrated', JSON.stringify(nowDone));
  if (fresh) {
    fireConfetti();
    showToast(t('🎉 Goal reached! Set a new target to keep going'));
    setTimeout(askFeedbackAfterCelebration, 3200);
  }
}

// ═══════════════════════════════════════════════════════
// MISSED-GOAL REVIEW  (deadline passed, target not yet hit)
// Reframes an "overdue" goal as a decision point instead of a failure.
// ═══════════════════════════════════════════════════════
function addDaysStr(n) {
  const d = new Date(); d.setDate(d.getDate() + n);
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
}

// True when a goal's deadline has passed but the target hasn't been reached.
function goalDeadlinePassed(goal) {
  const gp = getGoalProgress(goal);
  if (gp.done || !goal.targetDate) return false;
  const dl = deadlineInfo(goal.targetDate);
  return !!(dl && dl.overdue);
}

// Positive-framed review block: earned progress + four forward actions.
function goalReviewHTML(goal) {
  const unit  = DB.unit;
  const gp    = getGoalProgress(goal);
  const curKg = gp.currentKg || 0;
  const tgtKg = gp.target1RM || goal.targetWeightKg || 0;
  const curDisp = Math.round(dispW(curKg, 'kg') * 10) / 10;
  const tgtDisp = Math.round(dispW(tgtKg, 'kg') * 10) / 10;
  const pct = (gp.pct != null) ? gp.pct
            : (tgtKg > 0 ? Math.min(100, Math.round((curKg / tgtKg) * 100)) : 0);
  const progressLine = curKg > 0
    ? `You've reached <strong>${curDisp}${unit}</strong> of your ${tgtDisp}${unit} goal · <strong>${pct}% there</strong>`
    : `Deadline passed — pick up where you left off`;
  return `
    <div class="goal-meta" style="margin-bottom:2px">
      <span style="display:inline-flex;align-items:center;gap:4px;background:var(--amber-dim);color:var(--amber);font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px">📅 Deadline reached</span>
    </div>
    <div style="font-size:12px;color:var(--green);font-weight:600;margin:8px 0 2px">${progressLine}</div>
    <div style="font-size:11px;color:var(--muted);margin:8px 0 8px">What next?</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();goalExtendDeadline('${goal.id}')">📆 Extend</button>
      <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();goalAdjustTarget('${goal.id}')">🎯 Adjust target</button>
      <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();goalMarkDone('${goal.id}')">✓ Mark done</button>
      <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();goalArchive('${goal.id}')">🗄️ Archive</button>
    </div>`;
}

  const goal = DB.goals.find(g => g.id === id); if (!goal) return;

  const d14 = addDaysStr(14), d30 = addDaysStr(30);
  document.getElementById('modal-content').innerHTML = `
  <div style="font-size:18px;font-weight:700;margin-bottom:6px">Extend deadline</div>
  <div style="font-size:13px;color:var(--muted);margin-bottom:16px">Keep your ${name} target — just give it more time.</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
    <button class="btn btn-secondary" onclick="applyGoalExtend('${id}','${d14}')">+2 weeks</button>
    <button class="btn btn-secondary" onclick="applyGoalExtend('${id}','${d30}')">+1 month</button>
  </div>
  <div class="input-group">
    <div class="label">Or pick a date</div>
    <input type="date" id="ext-date" value="${d14}" min="${todayStr()}">
  </div>
  <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="applyGoalExtend('${id}', document.getElementById('ext-date').value)">Save</button>`;
  openModal();
}
function applyGoalExtend(id, date) {
  if (!date) { showToast('Pick a date', false); return; }
  const goals = DB.goals; const i = goals.findIndex(g => g.id === id); if (i < 0) return;
  goals[i].targetDate = date;
  DB.saveGoals(goals);
  closeModal(); showToast('Deadline extended 📆'); renderGoals();
}

// ── Adjust target (suggest an easier interim goal) ──
function goalAdjustTarget(id) {
  const goal = DB.goals.find(g => g.id === id); if (!goal) return;
  const unit  = DB.unit;
  const gp    = getGoalProgress(goal);
  const curKg = gp.currentKg || 0;
  const tgtKg = gp.target1RM || goal.targetWeightKg || 0;
  const interimKg = curKg > 0 ? curKg + (tgtKg - curKg) / 2 : tgtKg;
  const step = unit === 'kg' ? 2.5 : 5;
  const interimDisp = Math.round(dispW(interimKg, 'kg') / step) * step;
  const tgtDisp = Math.round(dispW(tgtKg, 'kg') * 10) / 10;
  document.getElementById('modal-content').innerHTML = `
  <div style="font-size:18px;font-weight:700;margin-bottom:6px">Adjust target</div>
  <div style="font-size:13px;color:var(--muted);margin-bottom:14px">This one's been slow. A smaller interim target is easier to hit and keeps your momentum going.</div>
  <div class="card" style="background:var(--accent-dim);border-color:var(--accent);margin-bottom:14px;cursor:pointer" onclick="document.getElementById('adj-weight').value='${interimDisp}'">
    <div style="font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.4px">Suggested interim target</div>
    <div style="font-size:22px;font-weight:800;margin-top:2px">${interimDisp}${unit} <span style="font-size:12px;color:var(--muted);font-weight:600">was ${tgtDisp}${unit}</span></div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px">Tap to use</div>
  </div>
  <div class="input-group">
    <div class="label">Target weight (${unit})</div>
    <input type="number" inputmode="decimal" id="adj-weight" value="${interimDisp}" min="1" step="${step}">
  </div>
  <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="applyGoalAdjust('${id}')">Update target</button>`;
  openModal();
}
function applyGoalAdjust(id) {
  const goals = DB.goals; const i = goals.findIndex(g => g.id === id); if (i < 0) return;
  const v = +document.getElementById('adj-weight').value;
  if (!v || v <= 0) { showToast('Enter a valid weight', false); return; }
  goals[i].targetWeightKg = Math.round(toKg(v, DB.unit) * 10) / 10;
  DB.saveGoals(goals);
  closeModal(); showToast('Target adjusted 🎯'); renderGoals();
}

// ── Mark done (hit it but didn't log the set) ──
function goalMarkDone(id) {
  const goal = DB.goals.find(g => g.id === id); if (!goal) return;
  if (!confirm('Log this goal as achieved?')) return;
  archiveGoalIfNew(goal);
  DB.saveGoals(DB.goals.filter(g => g.id !== id));
  fireConfetti(); showToast('Logged to Achieved 🏆'); renderGoals();
}

// ── Archive (set aside, no penalty) ──
function goalArchive(id) {
  if (!confirm('Archive this goal? It will be removed from your goals list.')) return;
  DB.saveGoals(DB.goals.filter(g => g.id !== id));
  showToast('Goal archived 🗄️'); renderGoals();
}

// ═══════════════════════════════════════════════════════
// MONTHLY GOAL REMINDER  (in-app banner + optional OS push)
// ═══════════════════════════════════════════════════════
function monthKey(d = new Date()) {
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1);
}
// Show the banner during the first 5 days of a month, until dismissed for that month.
function shouldShowMonthlyGoalBanner() {
  const now = new Date();
  if (now.getDate() > 5) return false;
  return localStorage.getItem('ll_month_banner_dismissed') !== monthKey(now);
}
function dismissMonthlyBanner() {
  localStorage.setItem('ll_month_banner_dismissed', monthKey());
}

// OS push: ask once, then (re)schedule a one-shot reminder for the next 1st-of-month.
async function setupMonthlyNotification(askPermission) {
  if (!('Notification' in window)) return;
  if (askPermission && Notification.permission === 'default') {
    try { await Notification.requestPermission(); } catch (e) {}
  }
  if (Notification.permission !== 'granted') return;

  // Fire if we've crossed into a new month and haven't notified for it yet.
  const now = new Date();
  if (now.getDate() === 1 && localStorage.getItem('ll_month_notified') !== monthKey(now)) {
    notifyNewMonth();
    localStorage.setItem('ll_month_notified', monthKey(now));
  }

  // Schedule an in-session timer for the next 1st 09:00 (covers app left open across midnight).
  const next = new Date(now.getFullYear(), now.getMonth() + 1, 1, 9, 0, 0, 0);
  const ms = next - now;
  clearTimeout(window.__monthNotifyTO);
  if (ms > 0 && ms < 2147483647) {   // setTimeout max ~24.8 days; only arm when within range
    window.__monthNotifyTO = setTimeout(() => {
      if (localStorage.getItem('ll_month_notified') !== monthKey(new Date())) {
        notifyNewMonth();
        localStorage.setItem('ll_month_notified', monthKey(new Date()));
      }
      setupMonthlyNotification(false);
    }, ms);
  }
}
function notifyNewMonth() {
  try {
    const body = "A new month is here — set a fresh workout goal to stay on track. 🎯";
    if (navigator.serviceWorker && navigator.serviceWorker.ready) {
      navigator.serviceWorker.ready.then(reg =>
        reg.showNotification('Lift Log', { body, icon: './icon-192.png', badge: './icon-192.png', tag: 'monthly-goal' })
      ).catch(() => new Notification('Lift Log', { body, icon: './icon-192.png' }));
    } else {
      new Notification('Lift Log', { body, icon: './icon-192.png' });
    }
  } catch (e) {}
}

// ═══════════════════════════════════════════════════════
// UNSAVED-WORKOUT REMINDER  (in-app banner always; optional OS push)
// ═══════════════════════════════════════════════════════
// Reminds you about an in-progress workout that's been left unsaved for >1h.
const UNSAVED_REMIND_MS = 60 * 60 * 1000;   // 1 hour

function unsavedReminderOn() {
  return localStorage.getItem('ll_unsaved_reminder') === '1';
}

// (Re)arm the one-shot reminder based on when the draft was last updated.
function scheduleUnsavedReminder() {
  clearTimeout(window.__unsavedNotifyTO);
  if (!unsavedReminderOn()) return;
  if (!('Notification' in window) || Notification.permission !== 'granted') return;

  // Is there actually an unsaved draft?
  let draft = null;
  try { draft = JSON.parse(localStorage.getItem('ll_draft') || 'null'); } catch (e) {}
  if (!draft || !logHasContent(draft)) return;

  const updatedAt = Number(localStorage.getItem('ll_draft_updated')) || Date.now();
  const fireAt = updatedAt + UNSAVED_REMIND_MS;
  const ms = fireAt - Date.now();
  const fireOnce = () => {
    if (localStorage.getItem('ll_unsaved_notified') !== String(updatedAt)) {
      notifyUnsavedWorkout();
      localStorage.setItem('ll_unsaved_notified', String(updatedAt));
    }
  };
  if (ms <= 0) { fireOnce(); return; }                 // already overdue
  if (ms < 2147483647) window.__unsavedNotifyTO = setTimeout(fireOnce, ms);
}

function notifyUnsavedWorkout() {
  try {
    const body = "You have an unsaved workout. Tap to finish and save it. 💪";
    const opts = {
      body, icon: './icon-192.png', badge: './icon-192.png',
      tag: 'unsaved-workout',
      data: { url: './liftlog.html#log', view: 'log' }
    };
    if (navigator.serviceWorker && navigator.serviceWorker.ready) {
      navigator.serviceWorker.ready.then(reg => reg.showNotification('Lift Log', opts))
        .catch(() => new Notification('Lift Log', opts));
    } else {
      new Notification('Lift Log', opts);
    }
  } catch (e) {}
}

function unsavedNotifSettingHTML() {
  if (!('Notification' in window)) {
    return `<div style="font-size:12px;color:var(--muted)">📅 In-app reminder only — notifications aren't supported on this device.</div>`;
  }
  if (Notification.permission === 'denied') {
    return `<div style="font-size:12px;color:var(--muted)">Notifications are blocked in your browser/OS settings. You'll still see the in-app banner.</div>`;
  }
  const on = unsavedReminderOn();
  return `<button class="btn ${on ? 'btn-accent-outline' : 'btn-secondary'} btn-full" onclick="toggleUnsavedReminder()">
    ${on
      ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Reminder on — tap to turn off'
      : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> Enable reminder'}
  </button>`;
}

async function toggleUnsavedReminder() {
  const turningOn = !unsavedReminderOn();
  if (turningOn) {
    if (('Notification' in window) && Notification.permission === 'default') {
      try { await Notification.requestPermission(); } catch (e) {}
    }
    if (('Notification' in window) && Notification.permission !== 'granted') {
      showToast(t('Notifications blocked in settings'), false);
    } else {
      localStorage.setItem('ll_unsaved_reminder', '1');
      showToast(t('Unsaved-workout reminder on 🔔'));
    }
  } else {
    localStorage.removeItem('ll_unsaved_reminder');
    clearTimeout(window.__unsavedNotifyTO);
    showToast(t('Reminder off'));
  }
  scheduleUnsavedReminder();
  const row = document.getElementById('unsaved-notif-row');
  if (row) { row.innerHTML = unsavedNotifSettingHTML(); applyLang(); }
}

// ═══════════════════════════════════════════════════════
// GETTING STARTED CHECKLIST + HELP GUIDE
// ═══════════════════════════════════════════════════════
// Steps auto-complete from real data — nothing to track manually.
function gsSteps() {
  return [
    { id:'workout',  title:t2('Log your first workout'),  sub:t2('Pick a session type, add an exercise, type weight × reps'),
      done: DB.workouts.length > 0, go:() => showView('log') },
    { id:'goal',     title:t2('Set a goal'),              sub:t2('A target weight to chase, e.g. 100kg × 1 rep'),
      done: DB.goals.length > 0, go:() => { showView('goals'); if(!DB.goals.length) setTimeout(openAddGoalModal, 150); } },
    { id:'template', title:t2('Save a workout template'), sub:t2('So next time your menu loads in one tap'),
      done: Object.keys(DB.templates).length > 0, go:() => { showView('prs'); setTimeout(openTemplateBuilder, 150); } },
    { id:'stats',    title:t2('Add your body stats'),     sub:t2('Height & weight unlock BMI and BW sets'),
      done: !!(DB.profile.height || DB.profile.bodyweight), go:() => { showView('dashboard'); setTimeout(openProfileModal, 150); } }
  ];
}
// tiny i18n passthrough (falls back to English when no JA entry)
function t2(s){ return t(s); }

function gsDismissed() { return localStorage.getItem('ll_gs_dismissed') === '1'; }
function dismissGettingStarted() {
  localStorage.setItem('ll_gs_dismissed', '1');
  renderDashboard();
}
function gsGo(i) {
  const step = gsSteps()[i];
  if (step && !step.done) step.go();
}
function gettingStartedHTML() {
  if (gsDismissed()) return '';
  const steps = gsSteps();
  const nDone = steps.filter(s => s.done).length;
  if (nDone === steps.length) return '';   // all done → card disappears for good
  return `
  <div class="gs-card">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:14px;font-weight:800">🚀 Getting started</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:11px;color:var(--green);font-weight:700">${nDone}/${steps.length}</span>
        <button class="gs-dismiss" onclick="dismissGettingStarted()" aria-label="Dismiss" title="Hide">✕</button>
      </div>
    </div>
    <div class="gs-bar-track"><div class="gs-bar-fill" style="width:${Math.round(nDone/steps.length*100)}%"></div></div>
    ${steps.map((s,i) => `
    <div class="gs-row${s.done?' done':''}" onclick="gsGo(${i})">
      <div class="gs-check">${s.done?'✓':''}</div>
      <div style="min-width:0">
        <div class="gs-title">${s.title}</div>
        <div class="gs-sub">${s.sub}</div>
      </div>
    </div>`).join('')}
  </div>`;
}

// ── Spotlight tour (coach marks on the real Log screen) ──
const LOG_TOUR = [
  { el:'tour-session',  emoji:'🗓️', text:'Pick a <strong>session type</strong> first — Push, Pull, Legs… If you saved a template, your whole menu loads in one tap.' },
  { el:'tour-duration', emoji:'⏱️', text:'Tap <strong>▶ Start</strong> when you begin training. Your workout time is saved automatically.' },
  { el:'tour-addex',    emoji:'➕', text:'Add your exercises here, then type the <strong>weight × reps</strong> for each set. Last time\'s numbers appear faintly — tap to accept.' },
  { el:'tour-finish',   emoji:'🏁', text:'Done training? <strong>Finish Workout</strong> saves everything and updates your records. That\'s it — go lift! 💪' }
];
let tourStep = -1;

function startLogTour() {
  if (currentView !== 'log') showView('log');
  tourStep = 0;
  setTimeout(showTourStep, 200);
}
function tourTargetEl(id) {
  return document.getElementById(id);
}
function showTourStep() {
  clearTourHighlight();
  if (tourStep < 0 || tourStep >= LOG_TOUR.length) { endLogTour(); return; }
  const step = LOG_TOUR[tourStep];
  const el = tourTargetEl(step.el);
  if (!el) { tourStep++; showTourStep(); return; }

  // Blocker swallows stray taps (advance instead of pressing buttons mid-tour)
  let block = document.getElementById('tour-block');
  if (!block) {
    block = document.createElement('div');
    block.id = 'tour-block';
    block.onclick = (e) => { e.stopPropagation(); nextTourStep(); };
    document.body.appendChild(block);
  }

  // Static elements need positioning for z-index to lift them above the dim
  if (getComputedStyle(el).position === 'static') {
    el.dataset.tourPos = '1';
    el.style.position = 'relative';
  }
  el.classList.add('tour-spot');
  el.scrollIntoView({ behavior:'smooth', block:'center' });

  let tip = document.getElementById('tour-tip');
  if (!tip) { tip = document.createElement('div'); tip.id = 'tour-tip'; document.body.appendChild(tip); }
  const last = tourStep === LOG_TOUR.length - 1;
  tip.innerHTML = `
    <div style="display:flex;gap:10px;align-items:flex-start">
      <div style="font-size:24px;flex-shrink:0">${step.emoji}</div>
      <div style="font-size:13.5px;line-height:1.55;color:var(--text)">${t(step.text)}</div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px">
      <div style="display:flex;gap:5px">${LOG_TOUR.map((_,i)=>
        `<div style="width:6px;height:6px;border-radius:50%;background:${i===tourStep?'var(--accent)':'var(--border)'}"></div>`).join('')}</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="endLogTour()" style="font-size:12px">${t('Skip')}</button>
        <button class="btn btn-primary btn-sm" onclick="nextTourStep()" style="min-width:84px;justify-content:center">${last?t('Done ✓'):t('Next →')}</button>
      </div>
    </div>`;

  // Keep the tip in the lower half: above the nav normally, or floated just
  // above the highlighted element when that element sits near the bottom.
  setTimeout(() => {
    const r = el.getBoundingClientRect();
    const mid = window.innerHeight / 2;
    tip.style.top = '';
    tip.style.bottom = r.top > mid
      ? (window.innerHeight - r.top + 12) + 'px'
      : 'calc(76px + env(safe-area-inset-bottom))';
  }, 60);
}
function nextTourStep() { tourStep++; showTourStep(); }
function clearTourHighlight() {
  document.querySelectorAll('.tour-spot').forEach(e => {
    e.classList.remove('tour-spot');
    if (e.dataset.tourPos) { e.style.position = ''; delete e.dataset.tourPos; }
  });
}
function endLogTour() {
  tourStep = -1;
  clearTourHighlight();
  document.getElementById('tour-tip')?.remove();
  document.getElementById('tour-block')?.remove();
}

// "?" header button → start the tour on the Log screen
function openHelpModal() {
  closeModal();
  startLogTour();
}

// ═══════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════
// Trigger a debounced cloud backup after any data-saving operation.
['save','saveExercises','saveProfile','saveGoals','saveExerciseMuscles','saveTemplates'].forEach(fn => {
  const orig = DB[fn].bind(DB);
  DB[fn] = function (...args) { const r = orig(...args); scheduleCloudBackup(); return r; };
});

runMigrations();
syncUnitToggle();

// Restore an unsaved in-progress workout if the app was closed mid-session.
const __draft = loadDraft();
if (__draft) {
  currentLog = __draft;
  if (currentLog.exercises && currentLog.exercises.length)
    openEx = new Set([currentLog.exercises.length - 1]); // newest open, rest collapsed
}

initEnhancements();
// If launched from the "unsaved workout" notification, go straight to the Log screen.
const __startView = (location.hash === '#log') ? 'log' : 'dashboard';
if (location.hash) { try { history.replaceState(null, '', location.pathname); } catch (e) {} }
showView(__startView);
startLangObserver();   // keep re-rendered screens translated (accordions, modals, log cards…)
if (__draft) setTimeout(() => showToast(t('Picked up your unsaved workout 💪')), 600);
setupMonthlyNotification(false);   // re-arm push (won't prompt; just schedules if already granted)
scheduleUnsavedReminder();         // re-arm unsaved-workout reminder if one is pending
gdBootstrap();                     // warm Google Drive token + sync if connected

// Persist the in-progress workout whenever the app is hidden or closed.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') saveDraft();   // saveDraft() also re-arms the reminder
});
window.addEventListener('pagehide', saveDraft);

// Let a tapped notification (handled by the service worker) route us to a view.
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data && e.data.type === 'navigate' && e.data.view) showView(e.data.view);
  });
}

// Keep the screen upright where the platform allows it (Android/installed PWA).
// iOS Safari ignores this — the CSS portrait notice covers that case.
if (screen.orientation && screen.orientation.lock) {
  screen.orientation.lock('portrait').catch(() => {});
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// Ask the browser to keep our data persistent (reduces the chance the OS
// silently evicts localStorage when storage runs low — esp. on iOS).
if (navigator.storage && navigator.storage.persist) {
  navigator.storage.persisted().then(p => { if (!p) navigator.storage.persist().catch(() => {}); }).catch(() => {});
}
</script>
