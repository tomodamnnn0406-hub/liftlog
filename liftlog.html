  <div id="edit-exercises-section">${renderEditExercisesHTML()}</div>

  <button class="btn btn-secondary btn-full" style="margin-bottom:12px;margin-top:4px" onclick="editOpenAddExModal()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Add Exercise
  </button>

  <div class="card-sm">
    <div class="input-group" style="margin-bottom:0">
      <div class="label">Notes (optional)</div>
      <textarea id="edit-log-notes" rows="2" placeholder="How did it feel?" oninput="editingWorkout.notes=this.value">${w.notes||''}</textarea>
    </div>
  </div>

  <div class="modal-action-bar">
    <button class="btn btn-secondary" style="flex:1" onclick="cancelEditWorkout()">Cancel</button>
    <button class="btn btn-primary" style="flex:2" onclick="saveEditedWorkout()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
      </svg>
      Save
    </button>
  </div>`;

  document.getElementById('modal-content').innerHTML = html;
  openModal();
}

function handleEditSessionSelect(val) {
  const customInput = document.getElementById('edit-log-name-custom');
  if (val === '__custom__') {
    customInput.style.display = '';
    editingWorkout.name = '';
    setTimeout(() => customInput.focus(), 50);
  } else {
    customInput.style.display = 'none';
    editingWorkout.name = val;
  }
}

function renderEditExercisesHTML() {
  const unit = DB.unit;
  const du   = wUnit(editingWorkout);
  return editingWorkout.exercises.map((ex, ei) => {
    const muscle  = getMuscleForExercise(ex.name);
    const isOpen  = editOpenEx.has(ei);
    const nSets   = ex.sets.length;
    const summary = muscle ? muscle : `${nSets} set${nSets!==1?'s':''}`;
    return `
  <div class="card-sm ex-acc${isOpen?' open':''}" id="edit-ex-${ei}" style="margin-bottom:10px;padding:0;overflow:hidden">
    <div class="ex-acc-header" onclick="toggleEditEx(${ei})">
      <div style="display:flex;align-items:center;gap:9px;min-width:0">
        <span class="ex-acc-chevron">▾</span>
        <div style="min-width:0">
          <div style="font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ex.name}</div>
          <div style="font-size:11px;color:${muscle?'var(--accent)':'var(--muted)'};margin-top:2px">${summary}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:3px;flex-shrink:0" onclick="event.stopPropagation()">
        ${ei>0?`<button class="reorder-btn" onclick="editMoveExercise(${ei},-1)">▲</button>`:''}
        ${ei<editingWorkout.exercises.length-1?`<button class="reorder-btn" onclick="editMoveExercise(${ei},1)">▼</button>`:''}
        <button class="del-btn" onclick="editRemoveExercise(${ei})">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="ex-acc-body">
    <div class="sets-header">
      <span>Set</span><span>Wt (${unit})</span><span>Reps</span><span>~1RM</span><span></span>
    </div>
    ${ex.sets.map((set, si) => {
      const dw       = dispW(+set.weight||0, du);
      const isFailed = !!set.failed;
      const rm1 = isFailed ? '<span style="color:var(--red);font-size:10px">FAIL</span>'
                           : (dw&&set.reps ? calc1RM(dw,set.reps) : '-');
      return `
    <div class="set-row">
      <div class="set-num">${si+1}</div>
      <div class="set-cell">
        <input type="number" inputmode="decimal" min="0" step="0.5" value="${dw||''}" placeholder="0"
          id="ew-${ei}-${si}"
          oninput="editUpdateSet(${ei},${si},'weight',this.value,true);editRefreshRM(${ei},${si})">
        <button class="set-qbtn${set._bw?' bw-on':''}" onclick="setBW(${ei},${si})">BW</button>
      </div>
      <div class="set-cell">
        <input type="number" inputmode="decimal" min="0" step="0.5" value="${set.reps||''}" placeholder="0"
          id="er-${ei}-${si}" ${isFailed?'style="opacity:0.4;pointer-events:none"':''}
          oninput="editUpdateSet(${ei},${si},'reps',this.value);editRefreshRM(${ei},${si})">
        <button class="set-qbtn${isFailed?' fail-on':''}" onclick="toggleFailed(${ei},${si})">Failed</button>
      </div>
      <div class="set-rm" id="erm-${ei}-${si}">${rm1}</div>
      <button class="del-btn" onclick="editRemoveSet(${ei},${si})">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>`;
    }).join('')}
    <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="editAddSet(${ei})">+ Add Set</button>
    <input type="text" class="ex-note-input" placeholder="Note for this exercise…"
      value="${(ex.note||'').replace(/"/g,'&quot;')}"
      oninput="editingWorkout.exercises[${ei}].note=this.value"
      style="margin-top:10px;font-size:13px;padding:9px 12px;min-height:38px">
    </div>
  </div>`;
  }).join('');
}

function editRefreshExSection() {
  const el = document.getElementById('edit-exercises-section');
  if (el) el.innerHTML = renderEditExercisesHTML();
}

// Weight stored in editingWorkout must always be in the workout's original dataUnit
function editUpdateSet(ei, si, field, val, isWeight) {
  if (isWeight) {
    // Convert display unit back to the workout's dataUnit
    const du  = wUnit(editingWorkout);
    const unit = DB.unit;
    let kg = toKg(+val, unit);
    let stored = (du === 'kg') ? kg : kg * KG_TO_LBS;
    editingWorkout.exercises[ei].sets[si][field] = stored ? Math.round(stored * 10) / 10 : val;
  } else {
    editingWorkout.exercises[ei].sets[si][field] = val;
  }
}
function editRefreshRM(ei, si) {
  const set = editingWorkout.exercises[ei].sets[si];
  const du  = wUnit(editingWorkout);
  const dw  = dispW(+set.weight||0, du);
  const el  = document.getElementById(`erm-${ei}-${si}`);
  if (!el) return;
  if (set.failed) { el.innerHTML = '<span style="color:var(--red);font-size:10px">FAIL</span>'; return; }
  el.textContent = dw && set.reps ? calc1RM(dw, set.reps) : '-';
}
function editAddSet(ei) {
  const last = editingWorkout.exercises[ei].sets.slice(-1)[0];
  editingWorkout.exercises[ei].sets.push({weight:last?.weight||'', reps:''});
  editRefreshExSection();
  setTimeout(()=>document.getElementById(`ew-${ei}-${editingWorkout.exercises[ei].sets.length-1}`)?.focus(),50);
}
function editRemoveSet(ei, si) {
  editingWorkout.exercises[ei].sets.splice(si,1);
  if(!editingWorkout.exercises[ei].sets.length) editingWorkout.exercises[ei].sets.push({weight:'',reps:''});
  editRefreshExSection();
}
function editRemoveExercise(ei) {
  editingWorkout.exercises.splice(ei,1);
  // keep accordion open-state aligned with the shifted indices
  const ns = new Set();
  editOpenEx.forEach(i => { if(i<ei) ns.add(i); else if(i>ei) ns.add(i-1); });
  editOpenEx = ns;
  editRefreshExSection();
}
function editOpenAddExModal() {
  // Temporarily close and reopen with exercise picker
  // Uses openAddExModal — addExercise() will detect editingWorkout and route there
  openAddExModal();
}

function saveEditedWorkout() {
  const nameEl  = document.getElementById('edit-log-name-select');
  const custEl  = document.getElementById('edit-log-name-custom');
  const dateEl  = document.getElementById('edit-log-date');
  const notesEl = document.getElementById('edit-log-notes');
  if (dateEl)  editingWorkout.date  = dateEl.value;
  if (nameEl && nameEl.value !== '__custom__') editingWorkout.name = nameEl.value;
  if (custEl && custEl.style.display !== 'none') editingWorkout.name = custEl.value;
  if (notesEl) editingWorkout.notes = notesEl.value;

  if (!editingWorkout.exercises.length) { showToast('Add at least one exercise!', false); return; }

  const cleaned = {
    ...editingWorkout,
    name: editingWorkout.name || 'Workout',
    exercises: editingWorkout.exercises.map(ex=>({
      ...ex,
      sets: ex.sets.filter(s => s.weight || s.reps)
    })).filter(ex => ex.sets.length)
  };

  const workouts = DB.workouts;
  const idx = workouts.findIndex(x => x.id === cleaned.id);
  if (idx >= 0) workouts[idx] = cleaned;
  else workouts.push(cleaned);
  DB.save(workouts);

  editingWorkout = null;
  closeModal();
  renderHistory();
  showToast('Workout updated! ✅');
}

function cancelEditWorkout() {
  editingWorkout = null;
  closeModal();
}

// ═══════════════════════════════════════════════════════
// PRs — grouped by body part
// ═══════════════════════════════════════════════════════
function renderPRs() {
  const prs   = getPRs();
  // Every known exercise (manually added + ever logged), not only ones with a PR
  const names = allExerciseNames();
  const unit  = DB.unit;

  const headerHTML = `
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px">
    <div style="font-size:22px;font-weight:800">Exercises</div>
    <button class="btn btn-secondary btn-sm" onclick="showView('goals')" style="white-space:nowrap">🎯 Manage Goals</button>
  </div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:16px">Tap a group to see all exercises · Tap exercise for progress chart</div>`;

  if(!names.length) {
    document.getElementById('main').innerHTML = headerHTML + `
    <div class="empty">
      <div class="empty-icon">📈</div>
      <div style="font-weight:600;margin-bottom:6px">Your exercise library lives here</div>
      <div style="font-size:13px;margin-bottom:18px">Every exercise shows the best weight you've lifted<br>and a progress chart over time.</div>
      <button class="btn btn-primary" onclick="openExercisesAddModal()">+ Add your first exercise</button>
    </div>`;
    return;
  }

  // Group by body part → sub-muscle. A multi-tagged exercise (e.g. Deadlift →
  // Lats + Hamstrings) appears under EVERY tagged body part.
  const groups = {};
  const addTo = (bp, sub, name) => {
    if(!groups[bp]) groups[bp] = {};
    if(!groups[bp][sub]) groups[bp][sub] = [];
    if(!groups[bp][sub].includes(name)) groups[bp][sub].push(name);
  };
  for(const name of names) {
    const muscles = getMusclesForExercise(name);
    if (muscles.length) {
      for (const m of muscles) addTo(getBodyPartForMuscle(m) || 'Other', m, name);
    } else {
      addTo(getBodyPart(name), 'General', name);
    }
  }

  // Order body parts: known ones first, then Other
  const ORDER = ['Chest','Back','Legs','Shoulders','Arms','Abs','Core','Other'];
  const sortedBPs = [
    ...ORDER.filter(bp => groups[bp]),
    ...Object.keys(groups).filter(bp => !ORDER.includes(bp))
  ];

  let html = headerHTML;

  for(const bp of sortedBPs) {
    const subGroups = groups[bp]; // { subName: [exerciseNames...] }
    const emoji     = (MUSCLE_GROUPS[bp]?.emoji) || BODY_PART_EMOJI[bp] || '⚡';
    const isOpen    = openBPGroups.has(bp);

    // All exercises in this body part
    const allExInBP = Object.values(subGroups).flat();
    const totalCount = allExInBP.length;

    // Best exercise (highest 1RM among those with data)
    let bestName = null, bestRM = 0;
    for(const n of allExInBP) {
      if(prs[n]?.bestSet && prs[n].best1RM_kg > bestRM) { bestRM=prs[n].best1RM_kg; bestName=n }
    }
    const bestPR   = bestName ? prs[bestName] : null;
    const bestDisp = bestPR?.displayWeight ?? '—';

    // Check if selected exercise is in this group
    const selInGroup = selectedPREx && allExInBP.includes(selectedPREx);

    // Build the sub-group body
    // Order sub-groups: MUSCLE_GROUPS defined order first, then General/Others
    const knownSubs = (MUSCLE_GROUPS[bp]?.sub) || [];
    const sortedSubs = [
      ...knownSubs.filter(s => subGroups[s]),
      ...Object.keys(subGroups).filter(s => !knownSubs.includes(s))
    ];

    let bodyHtml = '';
    for (const sub of sortedSubs) {
      const exList = subGroups[sub];
      const isTagged = sub !== 'General';

      if (isTagged) {
        bodyHtml += `<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:8px 16px 4px;border-top:1px solid var(--border)">${sub}</div>`;
      }

      for (const name of exList) {
        const pr      = prs[name];
        const hasData = !!pr?.bestSet;
        const sel     = name === selectedPREx;
        bodyHtml += `
        <div class="bp-ex-row" onclick="selectPRExercise('${esc(name)}')"
          style="${sel?'background:var(--accent-dim);border-left:3px solid var(--accent);':''}">
          <div>
            <div class="bp-ex-name" style="${sel?'color:var(--accent)':''}">${name}</div>
            <div class="bp-ex-date">${hasData ? fmtDate(pr.date) : 'No data yet'}</div>
          </div>
          ${hasData ? `
          <div class="bp-ex-pr">
            <div class="bp-ex-weight">${pr.displayWeight}<span style="font-size:11px;font-weight:500;color:var(--muted)">${unit}</span></div>
            <div class="bp-ex-reps">× ${pr.bestSet.reps} reps</div>
            <div class="bp-ex-1rm">est. 1RM ${pr.best1RM}${unit}</div>
          </div>`
          : `<div class="bp-ex-pr"><div style="font-size:12px;color:var(--muted)">— ${unit}</div><div class="bp-ex-reps" style="color:var(--accent)">Log to set</div></div>`}
        </div>`;
      }
    }

    // Chart area if an exercise in this group is selected
    if (selInGroup) {
      bodyHtml += `
      <div style="padding:0 16px 16px">
        <div class="label" style="margin-top:12px">Progress — ${selectedPREx}</div>
        <div id="pr-chart-area" style="min-height:50px;text-align:center;color:var(--muted);font-size:13px;padding:16px 0">
          Loading chart…
        </div>
      </div>`;
    }

    html += `
    <div class="bp-group ${isOpen?'open':''}" id="bpg-${bp.replace(/\s/g,'_')}">
      <div class="bp-group-header" onclick="toggleBPGroup('${esc(bp)}')">
        <div class="bp-group-header-left">
          <div class="bp-group-emoji">${emoji}</div>
          <div>
            <div class="bp-group-name">${bp}</div>
            <div class="bp-group-best">${totalCount} exercise${totalCount>1?'s':''}${bestName?` · Best: ${bestName}`:''}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="text-align:right">
            <div style="font-size:17px;font-weight:800;color:${bestPR?'var(--accent)':'var(--muted)'}">${bestDisp}<span style="font-size:11px;font-weight:500;color:var(--muted)">${unit}</span></div>
            <div style="font-size:10px;color:var(--muted)">${bestPR?`× ${bestPR.bestSet.reps} reps`:'No data'}</div>
          </div>
          <div class="bp-group-chevron">▾</div>
        </div>
      </div>
      <div class="bp-group-body">${bodyHtml}</div>
    </div>`;
  }

  // Sticky add-exercise button pinned at the bottom
  html += `
  <div style="height:64px"></div>
  <div class="sticky-action-bar">
    <button class="btn btn-primary btn-full" onclick="openExercisesAddModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add Exercise
    </button>
  </div>`;

  document.getElementById('main').innerHTML = html;

  // Render chart if a PR is selected and its group is open
  if(selectedPREx && prs[selectedPREx]) {
    const bp = getBodyPartForExercise(selectedPREx);
    if(openBPGroups.has(bp)) {
      const progress = getProgress(selectedPREx);
      setTimeout(()=>renderInlineChart(progress, unit), 80);
    }
  }
}

function toggleBPGroup(bp) {
  if(openBPGroups.has(bp)) {
    openBPGroups.delete(bp);
  } else {
    openBPGroups.add(bp);
  }
  renderPRs();
}

function selectPRExercise(name) {
  selectedPREx = name;
  // Auto-open the group containing this exercise
  const bp = getBodyPartForExercise(name);
  openBPGroups.add(bp);
  renderPRs();
  setTimeout(()=>{
    document.getElementById(`bpg-${bp.replace(/\s/g,'_')}`)
      ?.scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}

// ── Add an exercise straight from the Exercises tab (no workout needed) ──
function openExercisesAddModal() {
  const known = new Set(allExerciseNames());
  const avail = DEFAULT_EXERCISES.filter(e => !known.has(e));
  document.getElementById('modal-content').innerHTML = `
  <div style="font-size:18px;font-weight:700;margin-bottom:14px">Add Exercise</div>
  <div class="input-wrapper" style="margin-bottom:8px;position:relative">
    <input type="text" id="exadd-search" placeholder="Search or type a new exercise…"
      oninput="filterExAddDropdown(this.value)" autocomplete="off"
      autocapitalize="words" autocorrect="off" spellcheck="false"
      onkeydown="if(event.key==='Enter'){const v=this.value.trim();if(v)pickExerciseAddName(v)}">
    <div id="exadd-dropdown" class="ac-dropdown" style="display:none"></div>
  </div>
  <button class="btn btn-primary btn-full" style="margin-bottom:14px" onclick="pickExerciseAddName(document.getElementById('exadd-search').value.trim())">Next: Pick Muscle →</button>
  ${avail.length ? `<div class="label">Common Exercises</div>
  <div>${avail.map(e=>`<span class="ex-chip" onclick="pickExerciseAddName('${esc(e)}')">${e}</span>`).join('')}</div>` : ''}`;
  openModal();
  setTimeout(()=>document.getElementById('exadd-search')?.focus(), 100);
}

function filterExAddDropdown(q) {
  const dd = document.getElementById('exadd-dropdown');
  if(!q.trim()) { dd.style.display='none'; return }
  const all     = allExerciseNames();
  const lower   = all.map(e=>e.toLowerCase());
  const matches = all.filter(e=>e.toLowerCase().includes(q.toLowerCase()));
  const isNew   = q.trim() && !lower.includes(q.trim().toLowerCase());
  const items   = [
    ...matches.map(e=>`<div class="ac-item" onclick="pickExerciseAddName('${esc(e)}')">${e}</div>`),
    isNew ? `<div class="ac-item" onclick="pickExerciseAddName('${esc(q.trim())}')" style="color:var(--accent)">+ Add "${q.trim()}"</div>` : ''
  ].join('');
  dd.innerHTML = items || `<div class="ac-item" style="color:var(--muted)">No matches</div>`;
  dd.style.display = 'block';
}

function pickExerciseAddName(name) {
  name = name.trim();
  if (!name) { showToast('Enter an exercise name', false); return; }
  pickedMuscles = new Set(getMusclesForExercise(name));
  renderMusclePicker(name, 'openExercisesAddModal()', `confirmAddExerciseToLibrary('${esc(name)}')`);
}
function confirmAddExerciseToLibrary(name) {
  addExerciseToLibrary(name, [...pickedMuscles]);
}

function addExerciseToLibrary(name, muscle) {
  name = name.trim(); if(!name) return;
  const exs = DB.exercises;
  if(!exs.includes(name)) { exs.push(name); DB.saveExercises(exs); }
  const mList = Array.isArray(muscle) ? muscle : (muscle ? [muscle] : []);
  if (mList.length) {
    const muscles = DB.exerciseMuscles;
    muscles[name] = mList;
    DB.saveExerciseMuscles(muscles);
  }
  closeModal();
  // Open this exercise's group so the user sees it land
  const bp = getBodyPartForExercise(name);
  openBPGroups.add(bp);
  renderPRs();
  showToast('Exercise added 💪');
  setTimeout(()=>{
    document.getElementById(`bpg-${bp.replace(/\s/g,'_')}`)
      ?.scrollIntoView({behavior:'smooth',block:'start'});
  }, 120);
}

function renderInlineChart(progress, unit) {
  const area = document.getElementById('pr-chart-area');
  if(!area) return;
  if(progress.length < 2) {
    area.innerHTML = `<span>Log at least 2 sessions to see a chart</span>`;
    return;
  }
  area.innerHTML = `<div class="chart-wrap"><canvas id="prog-chart"></canvas></div>`;
  setTimeout(()=>drawProgressChart(progress, unit), 30);
}

function drawProgressChart(progress, unit) {
  const ctx = document.getElementById('prog-chart'); if(!ctx) return;
  if(prChart) { prChart.destroy(); prChart=null }

  const labels = progress.map(p=>{
    const d=new Date(p.date+'T12:00:00');
    return d.toLocaleDateString(L(),{month:'short',day:'numeric'});
  });

  prChart = new Chart(ctx, {
    type:'line',
    data:{
      labels,
      datasets:[
        {
          label:`Est. 1RM (${unit})`,
          data:progress.map(p=>p.est1RM),
          borderColor:'#f97316',backgroundColor:'rgba(249,115,22,0.12)',
          borderWidth:2.5,pointBackgroundColor:'#f97316',
          pointRadius:4,pointHoverRadius:6,tension:0.3,fill:true
        },
        {
          label:`Top Weight (${unit})`,
          data:progress.map(p=>p.weight),
          borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.05)',
          borderWidth:2,pointBackgroundColor:'#3b82f6',
          pointRadius:3,pointHoverRadius:5,tension:0.3,fill:false
        }
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#888',font:{size:11},boxWidth:12,padding:12}},
        tooltip:{
          backgroundColor:'#1a1a1a',borderColor:'#2a2a2a',borderWidth:1,
          titleColor:'#f0f0f0',bodyColor:'#aaa',
          callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}${unit}`}
        }
      },
      scales:{
        x:{grid:{color:'#1f1f1f'},ticks:{color:'#555',font:{size:10}}},
        y:{grid:{color:'#1f1f1f'},ticks:{color:'#555',font:{size:10},callback:v=>v+unit}}
      }
    }
  });
}

// ═══════════════════════════════════════════════════════
// GOALS VIEW
// ═══════════════════════════════════════════════════════
function renderGoals() {
  const goals = DB.goals;
  const unit  = DB.unit;
  const prs   = getPRs();

  let html = `
  <div class="section-header">
    <div style="font-size:22px;font-weight:800">Goals</div>
  </div>`;

  if(!goals.length) {
    html += `<div class="empty">
      <div class="empty-icon">🎯</div>
      <div style="font-weight:600;margin-bottom:8px">Goals turn workouts into progress</div>
      <div style="font-size:13px;margin-bottom:20px">Pick an exercise, a target weight × reps, and an optional deadline.<br>Every workout updates how close you are — with a celebration when you arrive. 🎉</div>
      <button class="btn btn-primary" onclick="openAddGoalModal()">Set Your First Goal</button>
    </div>`;
    document.getElementById('main').innerHTML = html;
    return;
  }

  for(const goal of goals) {
    const gp             = getGoalProgress(goal);
    const pr             = prs[goal.exercise];
    const hasPR          = !!pr?.bestSet;
    const done           = gp.done;

    // Current best set display
    const curWeight      = hasPR ? pr.displayWeight : '—';
    const curReps        = hasPR ? pr.bestSet.reps  : '—';

    // Target display (convert stored kg → display unit)
    const tgtWeight      = goal.targetWeightKg
      ? Math.round(dispW(goal.targetWeightKg, 'kg') * 10) / 10
      : '—';
    const tgtReps        = goal.targetReps || '—';

    // Progress bar % based on est. 1RM progress
    const pct = gp.target1RM > 0
      ? Math.min(100, Math.round((gp.currentKg / gp.target1RM) * 100))
      : 0;

    // Estimated weeks
    const weeksLeft = done ? 0 : estimateWeeks(goal.exercise, gp.target1RM);
    const etaText   = done
      ? `<span style="color:var(--green);font-weight:700">Goal reached! 🎉</span>`
      : weeksLeft === null
        ? `<span style="color:var(--muted)">Log more sets to estimate</span>`
        : weeksLeft === 0
          ? `<span style="color:var(--green);font-weight:700">Goal reached! 🎉</span>`
          : `<span style="color:var(--muted)">~${weeksLeft}w away</span>`;

    html += `

function openAddGoalModal(prefillExercise) {
  const unit    = DB.unit;
  const exNames = allExerciseNames();
  const prs     = getPRs();

  const optionsHTML = exNames.map(n => {
    const pr    = prs[n];
    const label = pr?.bestSet ? `${n} (PR: ${pr.displayWeight}${unit} × ${pr.bestSet.reps})` : n;
    return `<option value="${n}" ${prefillExercise===n?'selected':''}>${label}</option>`;
  }).join('');

  document.getElementById('modal-content').innerHTML = `
  <div style="font-size:18px;font-weight:700;margin-bottom:16px">Set a Goal</div>

  <div class="input-group">
    <div class="label">Exercise</div>
    <div class="select-wrap">
      <select id="goal-exercise" onchange="updateGoalCurrentPR(this.value)">
        <option value="">Select exercise…</option>
        ${optionsHTML}

    </div>
    <div class="input-group">
      <div class="label">Target Reps</div>
      <input type="number" inputmode="numeric" id="goal-target-reps" placeholder="e.g. 5" min="1" max="30" step="1" value="5">

  </div>

function updateGoalCurrentPR(exerciseName) {
  const prs  = getPRs();
  const unit = DB.unit;
  const el   = document.getElementById('goal-current-pr');
  if(!el) return;
  const pr = prs[exerciseName];
  if(pr?.bestSet) {
    el.innerHTML = `Current PR: <strong style="color:var(--text)">${pr.displayWeight}${unit} × ${pr.bestSet.reps}</strong> · est. 1RM <strong style="color:var(--accent)">${pr.best1RM}${unit}</strong>`;
  } else {
    el.textContent = exerciseName ? 'No data yet for this exercise' : '';
  }
}

function saveGoal() {
  const exercise     = document.getElementById('goal-exercise').value;
  const targetDisp   = +document.getElementById('goal-target-weight').value;
  const targetReps   = +document.getElementById('goal-target-reps').value || 5;
  const targetDate   = document.getElementById('goal-target-date').value || '';
  if(!exercise) { showToast('Pick an exercise', false); return }
  if(!targetDisp || targetDisp <= 0) { showToast('Enter a target weight', false); return }

  const targetWeightKg = toKg(targetDisp, DB.unit);
  const goals          = DB.goals;

  // Replace if same exercise already has a goal, else add
  const existing = goals.findIndex(g => g.exercise === exercise);
  if(existing >= 0) {
    goals[existing] = { ...goals[existing], targetWeightKg, targetReps, targetDate };
  } else {
    goals.push({ id: uid(), exercise, targetWeightKg, targetReps, targetDate });
  }
  DB.saveGoals(goals);
  closeModal();
  showToast('Goal saved! 🎯');
  showView('goals');
}

function openEditGoalModal(id) {
  const goal = DB.goals.find(g=>g.id===id); if(!goal) return;
  const unit       = DB.unit;
  const dispWeight = goal.targetWeightKg
    ? Math.round(dispW(goal.targetWeightKg, 'kg') * 10) / 10
    : '';
  const dispReps   = goal.targetReps || 5;

  document.getElementById('modal-content').innerHTML = `
  <div style="font-size:18px;font-weight:700;margin-bottom:16px">Edit Goal</div>
  <div style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--accent)">${goal.exercise}</div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="input-group">
      <div class="label">Target Weight (${unit})</div>
      <input type="number" inputmode="decimal" id="goal-edit-weight" value="${dispWeight}" min="1" step="2.5">
    </div>
    <div class="input-group">
      <div class="label">Target Reps</div>
      <input type="number" inputmode="numeric" id="goal-edit-reps" value="${dispReps}" min="1" max="30" step="1">
    </div>
  </div>

  <div class="input-group">
    <div class="label">Target Date (optional)</div>
    <input type="date" id="goal-edit-date" value="${goal.targetDate||''}" min="${todayStr()}">
  </div>

  <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="updateGoal('${id}')">Update Goal</button>
  <button class="btn btn-danger btn-full" style="margin-top:8px" onclick="deleteGoal('${id}')">Delete Goal</button>`;
  openModal();
  setTimeout(()=>document.getElementById('goal-edit-weight')?.focus(), 100);
}

function updateGoal(id) {
  const targetDisp = +document.getElementById('goal-edit-weight').value;
  const targetReps = +document.getElementById('goal-edit-reps').value || 5;
  if(!targetDisp || targetDisp <= 0) { showToast('Enter a valid weight', false); return }
  const goals = DB.goals;
  const i = goals.findIndex(g=>g.id===id);
  if(i<0) return;
  goals[i].targetWeightKg = toKg(targetDisp, DB.unit);
  goals[i].targetReps     = targetReps;
  goals[i].targetDate     = document.getElementById('goal-edit-date').value || '';
  DB.saveGoals(goals);
  closeModal();
  showToast('Goal updated!');
  renderGoals();
}

function deleteGoal(id) {
  if(!confirm('Delete this goal?')) return;
  DB.saveGoals(DB.goals.filter(g=>g.id!==id));
  closeModal();
  renderGoals();
}

function openModal() {
  const m = document.getElementById('modal');
  m.style.transform = '';        // clear any leftover swipe transform
  m.scrollTop = 0;
  document.getElementById('modal-overlay').style.background = '';
  document.getElementById('modal-overlay').classList.add('open');

function closeModal() {

  if(prChart && currentView!=='prs') { prChart.destroy(); prChart=null }
  editingWorkout = null;
  updateScrollFab();
}
function closeModalOutside(e) {
  if(e.target!==document.getElementById('modal-overlay')) return;
  if(editingWorkout) {
    // If in the edit workout modal itself → confirm discard
    if(document.getElementById('edit-exercises-section')) {
      if(!confirm('Discard changes?')) return;
      cancelEditWorkout();
    } else {
      // In add-exercise sub-modal → return to edit modal
      renderWorkoutEditModal();
    }
    return;
  }
  closeModal();
}

function exportData() {
  const data = {};
  DATA_KEYS.forEach(k => {
    const v = localStorage.getItem(k);
    if (v !== null) data[k] = v;
  });
  const json    = JSON.stringify(data, null, 2);
  const blob    = new Blob([json], { type: 'application/json' });
  const url     = URL.createObjectURL(blob);
  const date    = new Date().toISOString().slice(0,10);
  const a       = document.createElement('a');
  a.href        = url;
  a.download    = `liftlog-backup-${date}.json`;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
  showToast('Backup saved! 📦');
}

function importData() {
  const raw = document.getElementById('import-json').value.trim();
  if (!raw) { showToast('Paste your backup JSON first', false); return; }
  let data;
  try { data = JSON.parse(raw); } catch(e) { showToast('Invalid JSON — check your backup file', false); return; }
  if (!data.ll_workouts) { showToast('Doesn\'t look like a Lift Log backup', false); return; }
  if (!confirm('This will replace ALL current data with the backup. Continue?')) return;
  DATA_KEYS.forEach(k => {
    if (data[k] !== undefined) localStorage.setItem(k, data[k]);
  });
  closeModal();
  showToast('Data restored! 💪');
  runMigrations();
  showView('dashboard');
}

function moveExercise(ei, dir) {
  const arr = currentLog.exercises, ni = ei + dir;
  if (ni < 0 || ni >= arr.length) return;
  [arr[ei], arr[ni]] = [arr[ni], arr[ei]];
  refreshExSection();
}
function editMoveExercise(ei, dir) {
  const arr = editingWorkout.exercises, ni = ei + dir;
  if (ni < 0 || ni >= arr.length) return;
  [arr[ei], arr[ni]] = [arr[ni], arr[ei]];
  // keep accordion open-state attached to the moved cards
  const a = editOpenEx.has(ei), b = editOpenEx.has(ni);
  b ? editOpenEx.add(ei) : editOpenEx.delete(ei);
  a ? editOpenEx.add(ni) : editOpenEx.delete(ni);
  editRefreshExSection();
}
function toggleEditEx(ei) {
  editOpenEx.has(ei) ? editOpenEx.delete(ei) : editOpenEx.add(ei);
  editRefreshExSection();
}

function activeScrollEl() {
  const overlay = document.getElementById('modal-overlay');
  return overlay.classList.contains('open')
    ? document.getElementById('modal')
    : document.getElementById('main');
}
function scrollActiveTop() {
  activeScrollEl().scrollTo({ top: 0, behavior: 'smooth' });
}
function updateScrollFab() {
  const fab = document.getElementById('scroll-top-fab');
  if (!fab) return;
  fab.classList.toggle('show', activeScrollEl().scrollTop > 300);
}

function initEnhancements() {
  const main  = document.getElementById('main');
  const sheet = document.getElementById('modal');
  main.addEventListener('scroll', updateScrollFab, { passive: true });
  sheet.addEventListener('scroll', updateScrollFab, { passive: true });

  // Swipe the bottom sheet down to dismiss it
  const overlay = document.getElementById('modal-overlay');
  let startY = null, delta = 0, dragging = false;
  const reset = () => { sheet.style.transform = ''; overlay.style.background = ''; };

  sheet.addEventListener('touchstart', e => {
    if (e.touches.length !== 1 || sheet.scrollTop > 0) { dragging = false; startY = null; return; }
    startY = e.touches[0].clientY; delta = 0; dragging = true;
    sheet.style.transition = 'none';
  }, { passive: true });

  sheet.addEventListener('touchmove', e => {
    if (!dragging || startY === null) return;
    delta = e.touches[0].clientY - startY;
    if (delta > 0 && sheet.scrollTop <= 0) {
      e.preventDefault();
      sheet.style.transform = `translateY(${delta}px)`;
      overlay.style.background = `rgba(0,0,0,${Math.max(0, 0.75 - delta / 600)})`;
    }
  }, { passive: false });

  sheet.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    sheet.style.transition = 'transform .25s ease';
    if (delta <= 110) { reset(); startY = null; delta = 0; return; }

    if (editingWorkout && !document.getElementById('edit-exercises-section')) {
      // inside the add-exercise sub-modal → go back to the edit modal
      reset(); renderWorkoutEditModal();
    } else if (editingWorkout) {
      // the edit modal itself → confirm before discarding
      reset();
      if (confirm('Discard changes?')) cancelEditWorkout();
    } else {
      // any other modal → slide out, then close
      sheet.style.transform = 'translateY(100%)';
      overlay.style.background = '';
      setTimeout(() => { closeModal(); sheet.style.transform = ''; }, 220);
    }
    startY = null; delta = 0;
  });
}

// GOAL CELEBRATION
// ═══════════════════════════════════════════════════════
function fireConfetti() {
  const layer = document.getElementById('confetti-layer');
  if (!layer) return;
  layer.innerHTML = '';
  layer.classList.add('show');
  const colors = ['#22c55e','#86efac','#f97316','#fbbf24','#3b82f6','#a855f7','#ffffff'];
  const N = 110;
  for (let i = 0; i < N; i++) {
    const b = document.createElement('div');
    b.className = 'confetti-bit';
    b.style.left = (Math.random() * 100) + 'vw';
    b.style.background = colors[i % colors.length];
    b.style.animationDuration = (2.2 + Math.random() * 1.8) + 's';
    b.style.animationDelay = (Math.random() * 0.5) + 's';
    if (Math.random() < 0.5) b.style.borderRadius = '50%';
    layer.appendChild(b);
  }
  clearTimeout(window.__confettiTO);
  window.__confettiTO = setTimeout(() => { layer.classList.remove('show'); layer.innerHTML = ''; }, 4500);
}

// Fire confetti once when a goal is newly reached. Re-arms if the target is raised.
function checkGoalCelebrations() {
  let celebrated;
  try { celebrated = JSON.parse(localStorage.getItem('ll_celebrated') || '[]'); }
  catch (e) { celebrated = []; }
  const nowDone = [];
  let fresh = false;
  for (const goal of DB.goals) {
    if (getGoalProgress(goal).done) {
      nowDone.push(goal.id);
      if (!celebrated.includes(goal.id)) fresh = true;
    }
  }
  // Keep only still-completed ids, so raising a target lets it celebrate again later
  localStorage.setItem('ll_celebrated', JSON.stringify(nowDone));
  if (fresh) {
    fireConfetti();
    showToast('🎉 Goal reached! Set a new target to keep going');
  }
}

// CTA from a reached goal → open its editor so the user can raise the target
function raiseGoalTarget(id) {
  openEditGoalModal(id);
}

// ═══════════════════════════════════════════════════════
// MONTHLY GOAL REMINDER  (in-app banner + optional OS push)
// ═══════════════════════════════════════════════════════
function monthKey(d = new Date()) {
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1);
}
// Show the banner during the first 5 days of a month, until dismissed for that month.
function shouldShowMonthlyGoalBanner() {
  const now = new Date();
  if (now.getDate() > 5) return false;
  return localStorage.getItem('ll_month_banner_dismissed') !== monthKey(now);
}
function dismissMonthlyBanner() {
  localStorage.setItem('ll_month_banner_dismissed', monthKey());
}

// OS push: ask once, then (re)schedule a one-shot reminder for the next 1st-of-month.
async function setupMonthlyNotification(askPermission) {
  if (!('Notification' in window)) return;
  if (askPermission && Notification.permission === 'default') {
    try { await Notification.requestPermission(); } catch (e) {}
  }
  if (Notification.permission !== 'granted') return;

  // Fire if we've crossed into a new month and haven't notified for it yet.
  const now = new Date();
  if (now.getDate() === 1 && localStorage.getItem('ll_month_notified') !== monthKey(now)) {
    notifyNewMonth();
    localStorage.setItem('ll_month_notified', monthKey(now));
  }

  // Schedule an in-session timer for the next 1st 09:00 (covers app left open across midnight).
  const next = new Date(now.getFullYear(), now.getMonth() + 1, 1, 9, 0, 0, 0);
  const ms = next - now;
  clearTimeout(window.__monthNotifyTO);
  if (ms > 0 && ms < 2147483647) {   // setTimeout max ~24.8 days; only arm when within range
    window.__monthNotifyTO = setTimeout(() => {
      if (localStorage.getItem('ll_month_notified') !== monthKey(new Date())) {
        notifyNewMonth();
        localStorage.setItem('ll_month_notified', monthKey(new Date()));
      }
      setupMonthlyNotification(false);
    }, ms);
  }
}
function notifyNewMonth() {
  try {
    const body = "A new month is here — set a fresh workout goal to stay on track. 🎯";
    if (navigator.serviceWorker && navigator.serviceWorker.ready) {
      navigator.serviceWorker.ready.then(reg =>
        reg.showNotification('Lift Log', { body, icon: './icon-192.png', badge: './icon-192.png', tag: 'monthly-goal' })
      ).catch(() => new Notification('Lift Log', { body, icon: './icon-192.png' }));
    } else {
      new Notification('Lift Log', { body, icon: './icon-192.png' });
    }
  } catch (e) {}
}

// ═══════════════════════════════════════════════════════
// GETTING STARTED CHECKLIST + HELP GUIDE
// ═══════════════════════════════════════════════════════
// Steps auto-complete from real data — nothing to track manually.
function gsSteps() {
  return [
    { id:'workout',  title:t2('Log your first workout'),  sub:t2('Pick a session type, add an exercise, type weight × reps'),
      done: DB.workouts.length > 0, go:() => showView('log') },
    { id:'goal',     title:t2('Set a goal'),              sub:t2('A target weight to chase, e.g. 100kg × 1 rep'),
      done: DB.goals.length > 0, go:() => { showView('goals'); if(!DB.goals.length) setTimeout(openAddGoalModal, 150); } },
    { id:'template', title:t2('Save a workout template'), sub:t2('So next time your menu loads in one tap'),
      done: Object.keys(DB.templates).length > 0, go:() => showView('log') },
    { id:'stats',    title:t2('Add your body stats'),     sub:t2('Height & weight unlock BMI and BW sets'),
      done: !!(DB.profile.height || DB.profile.bodyweight), go:() => { showView('dashboard'); setTimeout(openProfileModal, 150); } }
  ];
}
// tiny i18n passthrough (falls back to English when no JA entry)
function t2(s){ return t(s); }

function gsDismissed() { return localStorage.getItem('ll_gs_dismissed') === '1'; }
function dismissGettingStarted() {
  localStorage.setItem('ll_gs_dismissed', '1');
  renderDashboard();
}
function gsGo(i) {
  const step = gsSteps()[i];
  if (step && !step.done) step.go();
}
function gettingStartedHTML() {
  if (gsDismissed()) return '';
  const steps = gsSteps();
  const nDone = steps.filter(s => s.done).length;
  if (nDone === steps.length) return '';   // all done → card disappears for good
  return `
  <div class="gs-card">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:14px;font-weight:800">🚀 Getting started</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:11px;color:var(--green);font-weight:700">${nDone}/${steps.length}</span>
        <button class="gs-dismiss" onclick="dismissGettingStarted()" aria-label="Dismiss" title="Hide">✕</button>
      </div>
    </div>
    <div class="gs-bar-track"><div class="gs-bar-fill" style="width:${Math.round(nDone/steps.length*100)}%"></div></div>
    ${steps.map((s,i) => `
    <div class="gs-row${s.done?' done':''}" onclick="gsGo(${i})">
      <div class="gs-check">${s.done?'✓':''}</div>
      <div style="min-width:0">
        <div class="gs-title">${s.title}</div>
        <div class="gs-sub">${s.sub}</div>
      </div>
    </div>`).join('')}
  </div>`;
}
