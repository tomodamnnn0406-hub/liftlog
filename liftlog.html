    <div style="font-size:22px;font-weight:800">Log Workout</div>
  </div>

  <div class="card">
    <div class="input-group">
      <div class="label">Date</div>
      <input type="date" id="log-date" value="${currentLog.date}" onchange="currentLog.date=this.value">
    </div>
    <div class="input-group" style="margin-bottom:0">
      <div class="label">Session Type</div>
      <div class="select-wrap" style="margin-bottom:${showCustom?'8px':'0'}">
        <select id="log-name-select" onchange="handleSessionSelect(this.value)">
          <option value="" ${!selectVal?'selected':''}>Select session type…</option>
          ${presetsHTML}
          <option value="__custom__" ${selectVal==='__custom__'?'selected':''}>✏️ Custom…</option>
        </select>
      </div>
      <input type="text" id="log-name-custom"
        placeholder="Type session name…"
        value="${showCustom ? currentLog.name : ''}"
        style="${showCustom?'':'display:none'}"
        oninput="currentLog.name=this.value"
        autocapitalize="words" autocorrect="off">
    </div>
  </div>

  <div id="exercises-section">${renderExercisesHTML()}</div>

  <button class="btn btn-secondary btn-full" style="margin-bottom:12px" onclick="openAddExModal()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Add Exercise
  </button>

  <div class="card">
    <div class="input-group" style="margin-bottom:0">
      <div class="label">Notes (optional)</div>
      <textarea id="log-notes" rows="2" placeholder="How did it feel?" oninput="currentLog.notes=this.value">${currentLog.notes}</textarea>
    </div>
  </div>

  <div style="display:flex;gap:10px;margin-top:4px;padding-bottom:4px">
    <button class="btn btn-secondary" style="flex:1" onclick="clearLog()">Clear</button>
    <button class="btn btn-primary" style="flex:2" onclick="saveWorkout()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
      </svg>
      Save Workout
    </button>
  </div>`;
}

function handleSessionSelect(val) {
  const customInput = document.getElementById('log-name-custom');
  if (val === '__custom__') {
    customInput.style.display = '';
    currentLog.name = '';
    setTimeout(() => customInput.focus(), 50);
  } else {
    customInput.style.display = 'none';
    currentLog.name = val;
  }
}

function renderExercisesHTML() {
  const unit = DB.unit;
  return currentLog.exercises.map((ex, ei) => `
  <div class="card" id="ex-${ei}" style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div>
        <div style="font-size:16px;font-weight:700">${ex.name}</div>
        ${getMuscleForExercise(ex.name)?`<div style="font-size:11px;color:var(--accent);margin-top:2px">${getMuscleForExercise(ex.name)}</div>`:''}
      </div>
      <button class="del-btn" onclick="removeExercise(${ei})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/>
        </svg>
      </button>
    </div>
    <div class="sets-header">
      <span>Set</span><span>Wt (${unit})</span><span>Reps</span><span>~1RM</span><span></span>
    </div>
    ${ex.sets.map((set, si) => {
      const isFailed = !!set.failed;
      const rm1 = isFailed ? '<span style="color:var(--red);font-size:10px">FAIL</span>'
                           : (set.weight&&set.reps ? calc1RM(set.weight,set.reps) : '-');
      return `
    <div class="set-row">
      <div class="set-num">${si+1}</div>
      <div class="set-cell">
        <input type="number" inputmode="decimal" min="0" step="0.5" value="${set.weight||''}" placeholder="0"
          id="w-${ei}-${si}"
          oninput="updateSet(${ei},${si},'weight',this.value);refreshRM(${ei},${si})">
        <button class="set-qbtn${set._bw?' bw-on':''}" onclick="setBW(${ei},${si})">BW</button>
      </div>
      <div class="set-cell">
        <input type="number" inputmode="decimal" min="0" step="0.5" value="${set.reps||''}" placeholder="0"
          id="r-${ei}-${si}" ${isFailed?'style="opacity:0.4;pointer-events:none"':''}
          oninput="updateSet(${ei},${si},'reps',this.value);refreshRM(${ei},${si})">
        <button class="set-qbtn${isFailed?' fail-on':''}" onclick="toggleFailed(${ei},${si})">Failed</button>
      </div>
      <div class="set-rm" id="rm-${ei}-${si}">${rm1}</div>
      <button class="del-btn" onclick="removeSet(${ei},${si})">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>`;
    }).join('')}
    <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="addSet(${ei})">+ Add Set</button>
  </div>`).join('');
}

function refreshExSection() {
  document.getElementById('exercises-section').innerHTML = renderExercisesHTML();
}

function updateSet(ei, si, field, val) {
  currentLog.exercises[ei].sets[si][field] = val;
}
function refreshRM(ei, si) {
  const set = currentLog.exercises[ei].sets[si];
  const el  = document.getElementById(`rm-${ei}-${si}`);
  if (!el) return;
  if (set.failed) { el.innerHTML = '<span style="color:var(--red);font-size:10px">FAIL</span>'; return; }
  el.textContent = set.weight && set.reps ? calc1RM(set.weight, set.reps) : '-';
}
function addSet(ei) {
  const last = currentLog.exercises[ei].sets.slice(-1)[0];
  currentLog.exercises[ei].sets.push({weight:last?.weight||'', reps:''});
  refreshExSection();
  setTimeout(()=>document.getElementById(`w-${ei}-${currentLog.exercises[ei].sets.length-1}`)?.focus(),50);
}
function removeSet(ei, si) {
  currentLog.exercises[ei].sets.splice(si,1);
  if(!currentLog.exercises[ei].sets.length) currentLog.exercises[ei].sets.push({weight:'',reps:''});
  refreshExSection();
}
function removeExercise(ei) {
  currentLog.exercises.splice(ei,1);
  refreshExSection();
}

function setBW(ei, si) {
  const bw = DB.profile.bodyweight;
  if (!bw) { showToast('Add your body weight in My Stats (tap 👤 icon) first', false); return; }
  const log = getActiveLog();
  const set = log.exercises[ei].sets[si];

  if (editingWorkout) {
    // Convert display-unit BW to the workout's stored data unit
    const du  = wUnit(editingWorkout);
    const kg  = toKg(+bw, DB.unit);
    set.weight = (du === 'kg') ? Math.round(kg * 10) / 10 : Math.round(kg * KG_TO_LBS * 10) / 10;
    set._bw    = true;
    const el   = document.getElementById(`ew-${ei}-${si}`);
    if (el) el.value = bw; // show in display unit
    editRefreshRM(ei, si);
    // Refresh BW button highlight without full re-render
    const btn = el?.closest('.set-cell')?.querySelector('.set-qbtn');
    if (btn) btn.className = 'set-qbtn bw-on';
  } else {
    set.weight = bw;
    set._bw    = true;
    const el   = document.getElementById(`w-${ei}-${si}`);
    if (el) el.value = bw;
    refreshRM(ei, si);
    const btn = el?.closest('.set-cell')?.querySelector('.set-qbtn');
    if (btn) btn.className = 'set-qbtn bw-on';
  }
}

function toggleFailed(ei, si) {
  const log = getActiveLog();
  const set = log.exercises[ei].sets[si];
  set.failed = !set.failed;
  if (editingWorkout) editRefreshExSection();
  else refreshExSection();
}

function openAddExModal() {
  const active = getActiveLog();
  const used   = new Set(active.exercises.map(e=>e.name));
  const avail  = allExerciseNames().filter(e=>!used.has(e));
  document.getElementById('modal-content').innerHTML = `
  <div style="font-size:18px;font-weight:700;margin-bottom:14px">Add Exercise</div>
  <div class="input-wrapper" style="margin-bottom:8px;position:relative">
    <input type="text" id="ex-search" placeholder="Search or type a new exercise…"
      oninput="filterExDropdown(this.value)" autocomplete="off"
      autocapitalize="words" autocorrect="off" spellcheck="false"
      onkeydown="if(event.key==='Enter'){const v=this.value.trim();if(v)pickExerciseName(v)}">
    <div id="ex-dropdown" class="ac-dropdown" style="display:none"></div>
  </div>
  <button class="btn btn-primary btn-full" style="margin-bottom:14px" onclick="pickExerciseName(document.getElementById('ex-search').value.trim())">Next: Pick Muscle →</button>
  <div class="label">Common Exercises</div>
  <div>${avail.map(e=>`<span class="ex-chip" onclick="pickExerciseName('${esc(e)}')">${e}</span>`).join('')}</div>`;
  openModal();
  setTimeout(()=>document.getElementById('ex-search')?.focus(), 100);
}

function pickExerciseName(name) {
  name = name.trim();
  if (!name) { showToast('Enter an exercise name', false); return; }
  const existingMuscle = DB.exerciseMuscles[name] || '';

  let html = `
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <button class="btn btn-secondary btn-sm" onclick="openAddExModal()" style="padding:8px 10px">← Back</button>
    <div style="font-size:18px;font-weight:700">Target Muscle</div>
  </div>
  <div style="font-size:14px;color:var(--accent);font-weight:600;margin-bottom:14px">${name}</div>`;

  for (const [bp, data] of Object.entries(MUSCLE_GROUPS)) {
    html += `<div class="label" style="margin-bottom:6px">${data.emoji} ${bp}</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">`;
    for (const m of data.sub) {
      const sel = m === existingMuscle;
      html += `<span class="ex-chip" onclick="addExercise('${esc(name)}','${esc(m)}')"
        style="${sel?'background:var(--accent);color:#fff;border-color:var(--accent)':''}">${m}</span>`;
    }
    html += `</div>`;
  }
  html += `<button class="btn btn-secondary btn-full" style="margin-top:4px" onclick="addExercise('${esc(name)}','')">Skip — don't tag a muscle</button>`;
  document.getElementById('modal-content').innerHTML = html;
}

function filterExDropdown(q) {
  const dd = document.getElementById('ex-dropdown');
  if(!q.trim()) { dd.style.display='none'; return }
  const active = getActiveLog();
  const used   = new Set(active.exercises.map(e=>e.name));
  const matches = allExerciseNames().filter(e=>!used.has(e)&&e.toLowerCase().includes(q.toLowerCase()));
  const isNew  = q.trim() && !allExerciseNames().map(e=>e.toLowerCase()).includes(q.trim().toLowerCase());
  const items  = [
    ...matches.map(e=>`<div class="ac-item" onclick="pickExerciseName('${esc(e)}')">${e}</div>`),
    isNew ? `<div class="ac-item" onclick="pickExerciseName('${esc(q.trim())}')" style="color:var(--accent)">+ Add "${q.trim()}"</div>` : ''
  ].join('');
  dd.innerHTML = items || `<div class="ac-item" style="color:var(--muted)">No matches</div>`;
  dd.style.display = 'block';
}

function addExercise(name, muscle) {
  name = name.trim(); if(!name) return;
  // Save to known exercises list
  const exs = DB.exercises;
  if(!exs.includes(name)) { exs.push(name); DB.saveExercises(exs) }
  // Save muscle mapping if provided
  if (muscle) {
    const muscles = DB.exerciseMuscles;
    muscles[name] = muscle;
    DB.saveExerciseMuscles(muscles);
  }

  if (editingWorkout) {
    // Edit mode — add to editingWorkout and refresh edit modal
    editingWorkout.exercises.push({name, sets:[{weight:'',reps:''}]});
    renderWorkoutEditModal();
    setTimeout(()=>{
      document.getElementById(`edit-ex-${editingWorkout.exercises.length-1}`)
        ?.scrollIntoView({behavior:'smooth',block:'start'});
    }, 120);
  } else {
    // Log mode
    currentLog.exercises.push({name, sets:[{weight:'',reps:''}]});
    closeModal();
    refreshExSection();
    setTimeout(()=>{
      document.getElementById(`ex-${currentLog.exercises.length-1}`)
        ?.scrollIntoView({behavior:'smooth',block:'start'});
    }, 100);
  }
}

function saveWorkout() {
  const dateEl  = document.getElementById('log-date');
  const nameEl  = document.getElementById('log-name-select');
  const custEl  = document.getElementById('log-name-custom');
  const notesEl = document.getElementById('log-notes');
  if(dateEl)  currentLog.date  = dateEl.value;
  if(nameEl && nameEl.value !== '__custom__') currentLog.name = nameEl.value;
  if(custEl && custEl.style.display !== 'none') currentLog.name = custEl.value;
  if(notesEl) currentLog.notes = notesEl.value;

  if(!currentLog.exercises.length) { showToast('Add at least one exercise!', false); return }

  const cleaned = {
    ...currentLog,
    name:     currentLog.name || 'Workout',
    dataUnit: DB.unit,                        // ← tag with current unit
    exercises: currentLog.exercises.map(ex=>({
      ...ex,
      sets: ex.sets.filter(s=>s.weight||s.reps)
    })).filter(ex=>ex.sets.length)
  };

  DB.addWorkout(cleaned);
  showToast('Workout saved! 💪');
  currentLog = newLog();
  showView('dashboard');
}

function clearLog() {
  if(currentLog.exercises.length && !confirm('Clear this workout?')) return;
  currentLog = newLog();
  renderLog();
}

// ═══════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════
function renderHistory() {
  const workouts = [...DB.workouts].sort((a,b)=>b.date.localeCompare(a.date));
  const unit     = DB.unit;
  let html = `
  <div class="section-header">
    <div style="font-size:22px;font-weight:800">History</div>
    <div style="font-size:13px;color:var(--muted)">${workouts.length} sessions</div>
  </div>`;

  if(!workouts.length) {
    html += `<div class="empty">
      <div class="empty-icon">⏱️</div>
      <div style="font-weight:600;margin-bottom:6px">No workouts logged yet</div>
      <div style="font-size:13px">Tap Log to get started</div>
    </div>`;
    document.getElementById('main').innerHTML = html;
    return;
  }

  let prevMonth = '';
  for(const w of workouts) {
    const month = new Date(w.date+'T12:00:00').toLocaleDateString('en-US',{month:'long',year:'numeric'});
    if(month !== prevMonth) {
      prevMonth = month;
      html += `<div class="label" style="margin-top:12px">${month}</div>`;
    }
    const du       = wUnit(w);
    const exNames  = w.exercises.map(e=>e.name).join(' · ') || 'No exercises';
    const totalSets= w.exercises.reduce((s,e)=>s+e.sets.length, 0);
    const vol      = w.exercises.reduce((s,e)=>s+e.sets.reduce((s2,set)=>s2+(dispW(+set.weight||0,du))*(+set.reps||0),0),0);
    html += `
    <div class="workout-item" onclick="showWorkoutDetail('${w.id}')">
      <div style="flex:1;min-width:0">
        <div class="workout-date">${fmtDate(w.date)} · ${daysAgo(w.date)}</div>
        <div class="workout-name">${w.name||'Workout'}</div>
        <div class="workout-exercises" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${exNames}</div>
        ${vol?`<div style="font-size:11px;color:var(--accent);font-weight:600;margin-top:4px">${Math.round(vol).toLocaleString()}${unit} vol · ${totalSets} sets</div>`:''}
      </div>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" style="margin-left:8px;flex-shrink:0;margin-top:2px">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>`;
  }
  document.getElementById('main').innerHTML = html;
}

function showWorkoutDetail(id) {
  const w = DB.workouts.find(x=>x.id===id); if(!w) return;
  const unit = DB.unit;
  const du   = wUnit(w);
  let html = `
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
    <div>
      <div style="font-size:20px;font-weight:800">${w.name||'Workout'}</div>
      <div style="font-size:13px;color:var(--muted)">${fmtDate(w.date)}</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-secondary btn-sm" onclick="openEditWorkoutModal('${id}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Edit
      </button>
      <button class="btn btn-danger btn-sm" onclick="deleteWorkout('${id}')">Delete</button>
    </div>
  </div>`;

  for(const ex of w.exercises) {
    html += `
    <div style="margin-bottom:16px">
      <div style="font-size:15px;font-weight:700;margin-bottom:8px;color:var(--accent)">${ex.name}</div>
      <div class="sets-header">
        <span>Set</span><span>Wt (${unit})</span><span>Reps</span><span>~1RM</span><span></span>
      </div>
      ${ex.sets.map((s,i)=>{
        const dw    = dispW(+s.weight||0, du);
        const drm   = s.failed ? '<span style="color:var(--red);font-size:10px">FAIL</span>'
                                : (dw && s.reps ? calc1RM(dw, s.reps) : '—');
        const bwTag = s._bw ? ' <span style="font-size:10px;color:var(--accent)">BW</span>' : '';
        return `
        <div class="set-row" style="pointer-events:none">
          <div class="set-num">${i+1}</div>
          <div style="text-align:center;font-size:14px;font-weight:700">${dw||'—'}${bwTag}</div>
          <div style="text-align:center;font-size:14px;font-weight:700">${s.failed?'✗':s.reps||'—'}</div>
          <div class="set-rm">${drm}</div>
          <div></div>
        </div>`;
      }).join('')}
    </div>`;
  }

  if(w.notes) html += `<div class="card-sm"><div class="label">Notes</div><div style="font-size:13px">${w.notes}</div></div>`;
  document.getElementById('modal-content').innerHTML = html;
  openModal();
}

function deleteWorkout(id) {
  if(!confirm('Delete this workout permanently?')) return;
  DB.removeWorkout(id);
  closeModal();
  renderHistory();
  showToast('Workout deleted');
}

// ── Edit workout ──────────────────────────────────────
function openEditWorkoutModal(id) {
  const w = DB.workouts.find(x=>x.id===id); if(!w) return;
  editingWorkout = JSON.parse(JSON.stringify(w));
  renderWorkoutEditModal();
}

function renderWorkoutEditModal() {
  const w         = editingWorkout;
  const unit      = DB.unit;
  const presetMatch  = SESSION_PRESETS.includes(w.name);
  const showCustom   = w.name && !presetMatch;
  const selectVal    = presetMatch ? w.name : (showCustom ? '__custom__' : '');
  const presetsHTML  = SESSION_PRESETS.map(p=>
    `<option value="${p}" ${selectVal===p?'selected':''}>${p}</option>`).join('');

  let html = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div style="font-size:18px;font-weight:700">Edit Workout</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-secondary btn-sm" onclick="cancelEditWorkout()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveEditedWorkout()">Save</button>
    </div>
  </div>

  <div class="card-sm" style="margin-bottom:12px">
    <div class="input-group">
      <div class="label">Date</div>
      <input type="date" id="edit-log-date" value="${w.date}" onchange="editingWorkout.date=this.value">
    </div>
    <div class="input-group" style="margin-bottom:0">
      <div class="label">Session Type</div>
      <div class="select-wrap" style="margin-bottom:${showCustom?'8px':'0'}">
        <select id="edit-log-name-select" onchange="handleEditSessionSelect(this.value)">
          <option value="" ${!selectVal?'selected':''}>Select session type…</option>
          ${presetsHTML}
          <option value="__custom__" ${selectVal==='__custom__'?'selected':''}>✏️ Custom…</option>
        </select>
      </div>
      <input type="text" id="edit-log-name-custom"
        placeholder="Type session name…"
        value="${showCustom ? w.name : ''}"
        style="${showCustom?'':'display:none'}"
        oninput="editingWorkout.name=this.value"
        autocapitalize="words" autocorrect="off">
    </div>
  </div>

  <div id="edit-exercises-section">${renderEditExercisesHTML()}</div>

  <button class="btn btn-secondary btn-full" style="margin-bottom:12px;margin-top:4px" onclick="editOpenAddExModal()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Add Exercise
  </button>

  <div class="card-sm">
    <div class="input-group" style="margin-bottom:0">
      <div class="label">Notes (optional)</div>
      <textarea id="edit-log-notes" rows="2" placeholder="How did it feel?" oninput="editingWorkout.notes=this.value">${w.notes||''}</textarea>
    </div>
  </div>`;

  document.getElementById('modal-content').innerHTML = html;
  openModal();
}

function handleEditSessionSelect(val) {
  const customInput = document.getElementById('edit-log-name-custom');
  if (val === '__custom__') {
    customInput.style.display = '';
    editingWorkout.name = '';
    setTimeout(() => customInput.focus(), 50);
  } else {
    customInput.style.display = 'none';
    editingWorkout.name = val;
  }
}

function renderEditExercisesHTML() {
  const unit = DB.unit;
  const du   = wUnit(editingWorkout);
  return editingWorkout.exercises.map((ex, ei) => {
    const muscle = getMuscleForExercise(ex.name);
    return `
  <div class="card-sm" id="edit-ex-${ei}" style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div>
        <div style="font-size:15px;font-weight:700">${ex.name}</div>
        ${muscle ? `<div style="font-size:11px;color:var(--accent);margin-top:2px">${muscle}</div>` : ''}
      </div>
      <button class="del-btn" onclick="editRemoveExercise(${ei})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/>
        </svg>
      </button>
    </div>
    <div class="sets-header">
      <span>Set</span><span>Wt (${unit})</span><span>Reps</span><span>~1RM</span><span></span>
    </div>
    ${ex.sets.map((set, si) => {
      const dw       = dispW(+set.weight||0, du);
      const isFailed = !!set.failed;
      const rm1 = isFailed ? '<span style="color:var(--red);font-size:10px">FAIL</span>'
                           : (dw&&set.reps ? calc1RM(dw,set.reps) : '-');
      return `
    <div class="set-row">
      <div class="set-num">${si+1}</div>
      <div class="set-cell">
        <input type="number" inputmode="decimal" min="0" step="0.5" value="${dw||''}" placeholder="0"
          id="ew-${ei}-${si}"
          oninput="editUpdateSet(${ei},${si},'weight',this.value,true);editRefreshRM(${ei},${si})">
        <button class="set-qbtn${set._bw?' bw-on':''}" onclick="setBW(${ei},${si})">BW</button>
      </div>
      <div class="set-cell">
        <input type="number" inputmode="decimal" min="0" step="0.5" value="${set.reps||''}" placeholder="0"
          id="er-${ei}-${si}" ${isFailed?'style="opacity:0.4;pointer-events:none"':''}
          oninput="editUpdateSet(${ei},${si},'reps',this.value);editRefreshRM(${ei},${si})">
        <button class="set-qbtn${isFailed?' fail-on':''}" onclick="toggleFailed(${ei},${si})">Failed</button>
      </div>
      <div class="set-rm" id="erm-${ei}-${si}">${rm1}</div>
      <button class="del-btn" onclick="editRemoveSet(${ei},${si})">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>`;
    }).join('')}
    <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="editAddSet(${ei})">+ Add Set</button>
  </div>`;
  }).join('');
}

function editRefreshExSection() {
  const el = document.getElementById('edit-exercises-section');
  if (el) el.innerHTML = renderEditExercisesHTML();
}

// Weight stored in editingWorkout must always be in the workout's original dataUnit
function editUpdateSet(ei, si, field, val, isWeight) {
  if (isWeight) {
    // Convert display unit back to the workout's dataUnit
    const du  = wUnit(editingWorkout);
    const unit = DB.unit;
    let kg = toKg(+val, unit);
    let stored = (du === 'kg') ? kg : kg * KG_TO_LBS;
    editingWorkout.exercises[ei].sets[si][field] = stored ? Math.round(stored * 10) / 10 : val;
  } else {
    editingWorkout.exercises[ei].sets[si][field] = val;
  }
}
function editRefreshRM(ei, si) {
  const set = editingWorkout.exercises[ei].sets[si];
  const du  = wUnit(editingWorkout);
  const dw  = dispW(+set.weight||0, du);
  const el  = document.getElementById(`erm-${ei}-${si}`);
  if (!el) return;
  if (set.failed) { el.innerHTML = '<span style="color:var(--red);font-size:10px">FAIL</span>'; return; }
  el.textContent = dw && set.reps ? calc1RM(dw, set.reps) : '-';
}
function editAddSet(ei) {
  const last = editingWorkout.exercises[ei].sets.slice(-1)[0];
  editingWorkout.exercises[ei].sets.push({weight:last?.weight||'', reps:''});
  editRefreshExSection();
  setTimeout(()=>document.getElementById(`ew-${ei}-${editingWorkout.exercises[ei].sets.length-1}`)?.focus(),50);
}
function editRemoveSet(ei, si) {
  editingWorkout.exercises[ei].sets.splice(si,1);
  if(!editingWorkout.exercises[ei].sets.length) editingWorkout.exercises[ei].sets.push({weight:'',reps:''});
  editRefreshExSection();
}
function editRemoveExercise(ei) {
  editingWorkout.exercises.splice(ei,1);
  editRefreshExSection();
}
function editOpenAddExModal() {
  // Temporarily close and reopen with exercise picker
  // Uses openAddExModal — addExercise() will detect editingWorkout and route there
  openAddExModal();
}

function saveEditedWorkout() {
  const nameEl  = document.getElementById('edit-log-name-select');
  const custEl  = document.getElementById('edit-log-name-custom');
  const dateEl  = document.getElementById('edit-log-date');
  const notesEl = document.getElementById('edit-log-notes');
  if (dateEl)  editingWorkout.date  = dateEl.value;
  if (nameEl && nameEl.value !== '__custom__') editingWorkout.name = nameEl.value;
  if (custEl && custEl.style.display !== 'none') editingWorkout.name = custEl.value;
  if (notesEl) editingWorkout.notes = notesEl.value;

  if (!editingWorkout.exercises.length) { showToast('Add at least one exercise!', false); return; }

  const cleaned = {
    ...editingWorkout,
    name: editingWorkout.name || 'Workout',
    exercises: editingWorkout.exercises.map(ex=>({
      ...ex,
      sets: ex.sets.filter(s => s.weight || s.reps)
    })).filter(ex => ex.sets.length)
  };

  const workouts = DB.workouts;
  const idx = workouts.findIndex(x => x.id === cleaned.id);
  if (idx >= 0) workouts[idx] = cleaned;
  else workouts.push(cleaned);
  DB.save(workouts);

  editingWorkout = null;
  closeModal();
  renderHistory();
  showToast('Workout updated! ✅');
}

function cancelEditWorkout() {
  editingWorkout = null;
  closeModal();
}

// ═══════════════════════════════════════════════════════
// PRs — grouped by body part
// ═══════════════════════════════════════════════════════
function renderPRs() {
  const prs   = getPRs();
  const names = Object.keys(prs).filter(n=>prs[n].bestSet).sort();
  const unit  = DB.unit;

  if(!names.length) {
    document.getElementById('main').innerHTML = `
    <div style="font-size:22px;font-weight:800;margin-bottom:16px">PRs & Progress</div>
    <div class="empty">
      <div class="empty-icon">📈</div>
      <div style="font-weight:600;margin-bottom:6px">No PRs yet</div>
      <div style="font-size:13px">Log workouts to see your personal records</div>
    </div>`;
    return;
  }

  // Group by body part → sub-muscle
  // groups = { 'Chest': { 'Upper Chest': ['Incline Bench', ...], 'General': [...] } }
  const groups = {};
  for(const name of names) {
    const muscle = getMuscleForExercise(name);
    const bp     = muscle ? (getBodyPartForMuscle(muscle) || 'Other') : getBodyPart(name);
    const sub    = muscle || 'General';
    if(!groups[bp]) groups[bp] = {};
    if(!groups[bp][sub]) groups[bp][sub] = [];
    groups[bp][sub].push(name);
  }

  // Order body parts: known ones first, then Other
  const ORDER = ['Chest','Back','Legs','Shoulders','Arms','Abs','Core','Other'];
  const sortedBPs = [
    ...ORDER.filter(bp => groups[bp]),
    ...Object.keys(groups).filter(bp => !ORDER.includes(bp))
  ];

  let html = `
  <div style="font-size:22px;font-weight:800;margin-bottom:4px">PRs & Progress</div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:16px">Tap a group to see all exercises · Tap exercise for progress chart</div>`;

  for(const bp of sortedBPs) {
    const subGroups = groups[bp]; // { subName: [exerciseNames...] }
    const emoji     = (MUSCLE_GROUPS[bp]?.emoji) || BODY_PART_EMOJI[bp] || '⚡';
    const isOpen    = openBPGroups.has(bp);

    // All exercises in this body part
    const allExInBP = Object.values(subGroups).flat();
    const totalCount = allExInBP.length;

    // Best exercise (highest 1RM)
    let bestName = allExInBP[0], bestRM = 0;
    for(const n of allExInBP) {
      if(prs[n]?.best1RM_kg > bestRM) { bestRM=prs[n].best1RM_kg; bestName=n }
    }
    const bestPR   = prs[bestName];
    const bestDisp = bestPR?.displayWeight || '—';

    // Check if selected exercise is in this group
    const selInGroup = selectedPREx && allExInBP.includes(selectedPREx);

    // Build the sub-group body
    // Order sub-groups: MUSCLE_GROUPS defined order first, then General/Others
    const knownSubs = (MUSCLE_GROUPS[bp]?.sub) || [];
    const sortedSubs = [
      ...knownSubs.filter(s => subGroups[s]),
      ...Object.keys(subGroups).filter(s => !knownSubs.includes(s))
    ];

    let bodyHtml = '';
    for (const sub of sortedSubs) {
      const exList = subGroups[sub];
      const isTagged = sub !== 'General';

      if (isTagged) {
        bodyHtml += `<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:8px 16px 4px;border-top:1px solid var(--border)">${sub}</div>`;
      }

      for (const name of exList) {
        const pr  = prs[name];
        const sel = name === selectedPREx;
        bodyHtml += `
        <div class="bp-ex-row" onclick="selectPRExercise('${esc(name)}')"
          style="${sel?'background:var(--accent-dim);border-left:3px solid var(--accent);':''}">
          <div>
            <div class="bp-ex-name" style="${sel?'color:var(--accent)':''}">${name}</div>
            <div class="bp-ex-date">${fmtDate(pr.date)}</div>
          </div>
          <div class="bp-ex-pr">
            <div class="bp-ex-weight">${pr.displayWeight}<span style="font-size:11px;font-weight:500;color:var(--muted)">${unit}</span></div>
            <div class="bp-ex-reps">× ${pr.bestSet.reps} reps</div>
            <div class="bp-ex-1rm">est. 1RM ${pr.best1RM}${unit}</div>
          </div>
        </div>`;
      }
    }

    // Chart area if an exercise in this group is selected
    if (selInGroup) {
      bodyHtml += `
      <div style="padding:0 16px 16px">
        <div class="label" style="margin-top:12px">Progress — ${selectedPREx}</div>
        <div id="pr-chart-area" style="min-height:50px;text-align:center;color:var(--muted);font-size:13px;padding:16px 0">
          Loading chart…
        </div>
      </div>`;
    }

    html += `
    <div class="bp-group ${isOpen?'open':''}" id="bpg-${bp.replace(/\s/g,'_')}">
      <div class="bp-group-header" onclick="toggleBPGroup('${esc(bp)}')">
        <div class="bp-group-header-left">
          <div class="bp-group-emoji">${emoji}</div>
          <div>
            <div class="bp-group-name">${bp}</div>
            <div class="bp-group-best">${totalCount} exercise${totalCount>1?'s':''} · Best: ${bestName}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="text-align:right">
            <div style="font-size:17px;font-weight:800;color:var(--accent)">${bestDisp}<span style="font-size:11px;font-weight:500;color:var(--muted)">${unit}</span></div>
            <div style="font-size:10px;color:var(--muted)">× ${bestPR?.bestSet.reps||'—'} reps</div>
          </div>
          <div class="bp-group-chevron">▾</div>
        </div>
      </div>
      <div class="bp-group-body">${bodyHtml}</div>
    </div>`;
  }

  // Add goal section
  html += `
  <div style="text-align:center;margin-top:8px;padding-bottom:4px">
    <button class="btn btn-secondary btn-sm" onclick="showView('goals')" style="font-size:13px">
      🎯 Manage Goals
    </button>
  </div>`;

  document.getElementById('main').innerHTML = html;

  // Render chart if a PR is selected and its group is open
  if(selectedPREx && prs[selectedPREx]) {
    const bp = getBodyPartForExercise(selectedPREx);
    if(openBPGroups.has(bp)) {
      const progress = getProgress(selectedPREx);
      setTimeout(()=>renderInlineChart(progress, unit), 80);
    }
  }
}

function toggleBPGroup(bp) {
  if(openBPGroups.has(bp)) {
    openBPGroups.delete(bp);
  } else {
    openBPGroups.add(bp);
  }
  renderPRs();
}

function selectPRExercise(name) {
  selectedPREx = name;
  // Auto-open the group containing this exercise
  const bp = getBodyPartForExercise(name);
  openBPGroups.add(bp);
  renderPRs();
  setTimeout(()=>{
    document.getElementById(`bpg-${bp.replace(/\s/g,'_')}`)
      ?.scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}

function renderInlineChart(progress, unit) {
  const area = document.getElementById('pr-chart-area');
  if(!area) return;
  if(progress.length < 2) {
    area.innerHTML = `<span>Log at least 2 sessions to see a chart</span>`;
    return;
  }
  area.innerHTML = `<div class="chart-wrap"><canvas id="prog-chart"></canvas></div>`;
  setTimeout(()=>drawProgressChart(progress, unit), 30);
}

function drawProgressChart(progress, unit) {
  const ctx = document.getElementById('prog-chart'); if(!ctx) return;
  if(prChart) { prChart.destroy(); prChart=null }

  const labels = progress.map(p=>{
    const d=new Date(p.date+'T12:00:00');
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  });

  prChart = new Chart(ctx, {
    type:'line',
    data:{
      labels,
      datasets:[
        {
          label:`Est. 1RM (${unit})`,
          data:progress.map(p=>p.est1RM),
          borderColor:'#f97316',backgroundColor:'rgba(249,115,22,0.12)',
          borderWidth:2.5,pointBackgroundColor:'#f97316',
          pointRadius:4,pointHoverRadius:6,tension:0.3,fill:true
        },
        {
          label:`Top Weight (${unit})`,
          data:progress.map(p=>p.weight),
          borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.05)',
          borderWidth:2,pointBackgroundColor:'#3b82f6',
          pointRadius:3,pointHoverRadius:5,tension:0.3,fill:false
        }
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#888',font:{size:11},boxWidth:12,padding:12}},
        tooltip:{
          backgroundColor:'#1a1a1a',borderColor:'#2a2a2a',borderWidth:1,
          titleColor:'#f0f0f0',bodyColor:'#aaa',
          callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}${unit}`}
        }
      },
      scales:{
        x:{grid:{color:'#1f1f1f'},ticks:{color:'#555',font:{size:10}}},
        y:{grid:{color:'#1f1f1f'},ticks:{color:'#555',font:{size:10},callback:v=>v+unit}}
      }
    }
  });
}

// ═══════════════════════════════════════════════════════
// GOALS VIEW
// ═══════════════════════════════════════════════════════
function renderGoals() {
  const goals = DB.goals;
  const unit  = DB.unit;
  const prs   = getPRs();

  let html = `
  <div class="section-header">
    <div style="font-size:22px;font-weight:800">Goals</div>
    <button class="btn btn-primary btn-sm" onclick="openAddGoalModal()">+ Add Goal</button>
  </div>`;

  if(!goals.length) {
    html += `<div class="empty">
      <div class="empty-icon">🎯</div>
      <div style="font-weight:600;margin-bottom:8px">No goals set yet</div>
      <div style="font-size:13px;margin-bottom:20px">Pick an exercise and a target 1RM — see how close you are every time you log</div>
      <button class="btn btn-primary" onclick="openAddGoalModal()">Set Your First Goal</button>
    </div>`;
    document.getElementById('main').innerHTML = html;
    return;
  }

  for(const goal of goals) {
    const gp             = getGoalProgress(goal);
    const pr             = prs[goal.exercise];
    const hasPR          = !!pr?.bestSet;
    const done           = gp.done;

    // Current best set display
    const curWeight      = hasPR ? pr.displayWeight : '—';
    const curReps        = hasPR ? pr.bestSet.reps  : '—';

    // Target display (convert stored kg → display unit)
    const tgtWeight      = goal.targetWeightKg
      ? Math.round(dispW(goal.targetWeightKg, 'kg') * 10) / 10
      : '—';
    const tgtReps        = goal.targetReps || '—';

    // Progress bar % based on est. 1RM progress
    const pct = gp.target1RM > 0
      ? Math.min(100, Math.round((gp.currentKg / gp.target1RM) * 100))
      : 0;

    // Estimated weeks
    const weeksLeft = done ? 0 : estimateWeeks(goal.exercise, gp.target1RM);
    const etaText   = done
      ? `<span style="color:var(--green);font-weight:700">Goal reached! 🎉</span>`
      : weeksLeft === null
        ? `<span style="color:var(--muted)">Log more sets to estimate</span>`
        : weeksLeft === 0
          ? `<span style="color:var(--green);font-weight:700">Goal reached! 🎉</span>`
          : `<span style="color:var(--muted)">~${weeksLeft}w away</span>`;

    html += `
    <div class="goal-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:16px;font-weight:700;margin-bottom:6px">${goal.exercise}</div>
          <div style="display:grid;grid-template-columns:auto 1fr;gap:4px 10px;font-size:13px">
            <span style="color:var(--muted)">Current</span>
            <span style="font-weight:600;color:${hasPR?'var(--text)':'var(--muted)'}">
              ${hasPR ? `${curWeight}${unit} × ${curReps} reps` : 'No data yet'}
            </span>
            <span style="color:var(--muted)">Target</span>
            <span style="font-weight:600;color:var(--accent)">${tgtWeight}${unit} × ${tgtReps} reps</span>
          </div>
        </div>
        <button class="del-btn" onclick="openEditGoalModal('${goal.id}')" style="color:var(--muted);margin-left:8px;flex-shrink:0">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </div>

      <div class="goal-bar-track">
        <div class="goal-bar-fill ${done?'done':''}" style="width:${pct}%"></div>
      </div>

      <div class="goal-meta">
        ${etaText}
      </div>
    </div>`;
  }

  document.getElementById('main').innerHTML = html;
}

function openAddGoalModal(prefillExercise) {
  const unit    = DB.unit;
  const exNames = allExerciseNames();
  const prs     = getPRs();

  const optionsHTML = exNames.map(n => {
    const pr    = prs[n];
    const label = pr?.bestSet ? `${n} (PR: ${pr.displayWeight}${unit} × ${pr.bestSet.reps})` : n;
    return `<option value="${n}" ${prefillExercise===n?'selected':''}>${label}</option>`;
  }).join('');

  document.getElementById('modal-content').innerHTML = `
  <div style="font-size:18px;font-weight:700;margin-bottom:16px">Set a Goal</div>

  <div class="input-group">
    <div class="label">Exercise</div>
    <div class="select-wrap">
      <select id="goal-exercise" onchange="updateGoalCurrentPR(this.value)">
        <option value="">Select exercise…</option>
        ${optionsHTML}
      </select>
    </div>
  </div>

  <div id="goal-current-pr" style="font-size:12px;color:var(--muted);margin:-4px 0 12px;min-height:18px"></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="input-group">
      <div class="label">Target Weight (${unit})</div>
      <input type="number" inputmode="decimal" id="goal-target-weight" placeholder="${unit==='kg'?'e.g. 80':'e.g. 175'}" min="1" step="2.5">
    </div>
    <div class="input-group">
      <div class="label">Target Reps</div>
      <input type="number" inputmode="numeric" id="goal-target-reps" placeholder="e.g. 5" min="1" max="30" step="1" value="5">
    </div>
  </div>

  <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="saveGoal()">Save Goal</button>`;

  openModal();
  if(prefillExercise) {
    setTimeout(()=>{
      updateGoalCurrentPR(prefillExercise);
      document.getElementById('goal-target')?.focus();
    }, 100);
  }
}

function updateGoalCurrentPR(exerciseName) {
  const prs  = getPRs();
  const unit = DB.unit;
  const el   = document.getElementById('goal-current-pr');
  if(!el) return;
  const pr = prs[exerciseName];
  if(pr?.bestSet) {
    el.innerHTML = `Current PR: <strong style="color:var(--text)">${pr.displayWeight}${unit} × ${pr.bestSet.reps}</strong> · est. 1RM <strong style="color:var(--accent)">${pr.best1RM}${unit}</strong>`;
  } else {
    el.textContent = exerciseName ? 'No data yet for this exercise' : '';
  }
}

function saveGoal() {
  const exercise     = document.getElementById('goal-exercise').value;
  const targetDisp   = +document.getElementById('goal-target-weight').value;
  const targetReps   = +document.getElementById('goal-target-reps').value || 5;
  if(!exercise) { showToast('Pick an exercise', false); return }
  if(!targetDisp || targetDisp <= 0) { showToast('Enter a target weight', false); return }

  const targetWeightKg = toKg(targetDisp, DB.unit);
  const goals          = DB.goals;

  // Replace if same exercise already has a goal, else add
  const existing = goals.findIndex(g => g.exercise === exercise);
  if(existing >= 0) {
    goals[existing] = { ...goals[existing], targetWeightKg, targetReps };
  } else {
    goals.push({ id: uid(), exercise, targetWeightKg, targetReps });
  }
  DB.saveGoals(goals);
  closeModal();
  showToast('Goal saved! 🎯');
  showView('goals');
}

function openEditGoalModal(id) {
  const goal = DB.goals.find(g=>g.id===id); if(!goal) return;
  const unit       = DB.unit;
  const dispWeight = goal.targetWeightKg
    ? Math.round(dispW(goal.targetWeightKg, 'kg') * 10) / 10
    : '';
  const dispReps   = goal.targetReps || 5;

  document.getElementById('modal-content').innerHTML = `
  <div style="font-size:18px;font-weight:700;margin-bottom:16px">Edit Goal</div>
  <div style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--accent)">${goal.exercise}</div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="input-group">
      <div class="label">Target Weight (${unit})</div>
      <input type="number" inputmode="decimal" id="goal-edit-weight" value="${dispWeight}" min="1" step="2.5">
    </div>
    <div class="input-group">
      <div class="label">Target Reps</div>
      <input type="number" inputmode="numeric" id="goal-edit-reps" value="${dispReps}" min="1" max="30" step="1">
    </div>
  </div>

  <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="updateGoal('${id}')">Update Goal</button>
  <button class="btn btn-danger btn-full" style="margin-top:8px" onclick="deleteGoal('${id}')">Delete Goal</button>`;
  openModal();
  setTimeout(()=>document.getElementById('goal-edit-weight')?.focus(), 100);
}

function updateGoal(id) {
  const targetDisp = +document.getElementById('goal-edit-weight').value;
  const targetReps = +document.getElementById('goal-edit-reps').value || 5;
  if(!targetDisp || targetDisp <= 0) { showToast('Enter a valid weight', false); return }
  const goals = DB.goals;
  const i = goals.findIndex(g=>g.id===id);
  if(i<0) return;
  goals[i].targetWeightKg = toKg(targetDisp, DB.unit);
  goals[i].targetReps     = targetReps;
  DB.saveGoals(goals);
  closeModal();
  showToast('Goal updated!');
  renderGoals();
}

function deleteGoal(id) {
  if(!confirm('Delete this goal?')) return;
  DB.saveGoals(DB.goals.filter(g=>g.id!==id));
  closeModal();
  renderGoals();
}

// ═══════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  if(prChart && currentView!=='prs') { prChart.destroy(); prChart=null }
  editingWorkout = null;
}
function closeModalOutside(e) {
  if(e.target!==document.getElementById('modal-overlay')) return;
  if(editingWorkout) {
    // If in the edit workout modal itself → confirm discard
    if(document.getElementById('edit-exercises-section')) {
      if(!confirm('Discard changes?')) return;
      cancelEditWorkout();
    } else {
      // In add-exercise sub-modal → return to edit modal
      renderWorkoutEditModal();
    }
    return;
  }
  closeModal();
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function showToast(msg, ok=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? 'var(--green)' : 'var(--red)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}

// ═══════════════════════════════════════════════════════
// DATA EXPORT / IMPORT
// ═══════════════════════════════════════════════════════
const DATA_KEYS = ['ll_workouts','ll_exercises','ll_unit','ll_profile','ll_goals','ll_migrated_v2','ll_migrated_v3','ll_exercise_muscles'];

function openDataModal() {
  const workoutCount = DB.workouts.length;
  document.getElementById('modal-content').innerHTML = `
  <div style="font-size:18px;font-weight:700;margin-bottom:6px">Data & Settings</div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:20px">${workoutCount} workout${workoutCount!==1?'s':''} stored on this device</div>

  <div style="font-size:13px;font-weight:600;margin-bottom:10px">Backup your data</div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:12px">
    Export saves all your workouts, PRs, and goals as a file.
    Keep it somewhere safe (Files, Notes, email yourself).
  </div>
  <button class="btn btn-primary btn-full" onclick="exportData()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Export All Data
  </button>

  <div class="divider" style="margin:20px 0"></div>

  <div style="font-size:13px;font-weight:600;margin-bottom:10px">Restore from backup</div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:12px">
    Paste your exported JSON below, then tap Import.
    <strong style="color:var(--red)">This will overwrite your current data.</strong>
  </div>
  <textarea id="import-json" rows="4" placeholder='Paste exported JSON here…'
    style="font-size:12px;font-family:monospace;resize:none;margin-bottom:10px"></textarea>
  <button class="btn btn-secondary btn-full" onclick="importData()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Import Data
  </button>`;
  openModal();
}

function exportData() {
  const data = {};
  DATA_KEYS.forEach(k => {
    const v = localStorage.getItem(k);
    if (v !== null) data[k] = v;
  });
  const json    = JSON.stringify(data, null, 2);
  const blob    = new Blob([json], { type: 'application/json' });
  const url     = URL.createObjectURL(blob);
  const date    = new Date().toISOString().slice(0,10);
  const a       = document.createElement('a');
  a.href        = url;
  a.download    = `liftlog-backup-${date}.json`;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
  showToast('Backup saved! 📦');
}

function importData() {
  const raw = document.getElementById('import-json').value.trim();
  if (!raw) { showToast('Paste your backup JSON first', false); return; }
  let data;
  try { data = JSON.parse(raw); } catch(e) { showToast('Invalid JSON — check your backup file', false); return; }
  if (!data.ll_workouts) { showToast('Doesn\'t look like a Lift Log backup', false); return; }
  if (!confirm('This will replace ALL current data with the backup. Continue?')) return;
  DATA_KEYS.forEach(k => {
    if (data[k] !== undefined) localStorage.setItem(k, data[k]);
  });
  closeModal();
  showToast('Data restored! 💪');
  runMigrations();
  showView('dashboard');
}
