// ── Templates & repeat-last-session ────────────────────
// Most recent workout with this session name (exact match)
function lastSessionNamed(name) {
  if (!name) return null;
  const sorted = [...DB.workouts].filter(w => w.name === name)
    .sort((a,b) => b.date.localeCompare(a.date));
  return sorted[0] || null;
}
// Last sets for an exercise across all workouts → placeholder values in display unit
function lastSetsFor(exName) {
  const sorted = [...DB.workouts].sort((a,b) => b.date.localeCompare(a.date));
  for (const w of sorted) {
    const ex = w.exercises.find(e => e.name === exName);
    if (ex && ex.sets.length) {
      const du = wUnit(w);
      return ex.sets.map(s => ({
        phW: s.weight ? Math.round(dispW(+s.weight, du) * 10) / 10 : '',
        phR: s.reps || ''
      }));
    }
  }
  return null;
}
// Build a fresh exercise entry with placeholder sets from history
function exerciseWithPlaceholders(name) {
  const last = lastSetsFor(name);
  const sets = last
    ? last.map(p => ({ weight:'', reps:'', phW:p.phW, phR:p.phR }))
    : [{ weight:'', reps:'' }];
  return { name, sets };
}
function applyTemplateToLog() {
  const tpl = DB.templates[currentLog.name];
  if (!tpl || !tpl.length) return;
  currentLog.exercises = tpl.map(exerciseWithPlaceholders);
  openEx = new Set(currentLog.exercises.length ? [0] : []);   // open the first, rest collapsed
  renderLog();
  showToast(tf('Loaded your {name} template 📋', {name:t(currentLog.name)}));
}
function applyLastSessionToLog() {
  const last = lastSessionNamed(currentLog.name);
  if (!last) return;
  currentLog.exercises = last.exercises.map(ex => {
    const du = wUnit(last);
    return { name: ex.name, sets: ex.sets.map(s => ({
      weight:'', reps:'',
      phW: s.weight ? Math.round(dispW(+s.weight, du) * 10) / 10 : '',
      phR: s.reps || ''
    })) };
  });
  openEx = new Set(currentLog.exercises.length ? [0] : []);   // open the first, rest collapsed
  renderLog();
  showToast(tf('Loaded last {name} session ⟳', {name:t(currentLog.name)}));
}
// Tap an empty input → accept the placeholder value, selected for easy bump
function phFill(el, ei, si, field) {
  if (!el.value && el.placeholder && el.placeholder !== '0') {
    el.value = el.placeholder;
    updateSet(ei, si, field, el.value);
    refreshRM(ei, si);
    el.select();
  }
}
function saveCurrentAsTemplate() {
  const name = currentLog.name;
  const exNames = currentLog.exercises.map(e => e.name);
  if (!name || !exNames.length) return;
  const t = DB.templates;
  t[name] = exNames;
  DB.saveTemplates(t);
  showToast(tf('Saved as your {name} template 📋', {name:t(name)}));
  renderLog();
}
function deleteTemplate(name) {
  if (!confirm(tf('Delete the "{name}" template?', {name:t(name)}))) return;
  const t = DB.templates;
  delete t[name];
  DB.saveTemplates(t);
  openDataModal();
  showToast(t('Template deleted'));
}

// ── Workout duration stopwatch ─────────────────────────
function currentDurationSec() {
  let s = currentLog.durationSec || 0;
  if (timerRunning && timerStartTs) s += (Date.now() - timerStartTs) / 1000;
  return s;
}
function paintTimer() {
  const d = document.getElementById('dur-display');
  if (d) d.textContent = fmtDuration(currentDurationSec());
  updateWkTimerChip();
}

// Keep a 1-second tick alive whenever the workout clock is running, regardless
// of which screen is showing (so the floating pill stays accurate everywhere).
function ensureTimerTicking() {
  if (timerRunning && !timerInterval) {
    timerInterval = setInterval(paintTimer, 1000);
  }
}

// Floating "Workout mm:ss" pill — pinned at the top on every screen (including
// Log, where the user keeps it open during a workout) while the stopwatch runs.
function updateWkTimerChip() {
  const chip = document.getElementById('wk-timer');
  if (!chip) return;
  const show = timerRunning;
  chip.classList.toggle('show', show);
  document.body.classList.toggle('wk-timer-on', show);
  if (show) {
    const t = document.getElementById('wk-timer-time');
    if (t) t.textContent = fmtDuration(currentDurationSec());
  }
}
function toggleTimer() {
  if (timerRunning) {
    // pause: bank elapsed time
    currentLog.durationSec = currentDurationSec();
    timerRunning = false;
    timerStartTs = null;
    clearInterval(timerInterval); timerInterval = null;
  } else {
    timerRunning = true;
    timerStartTs = Date.now();
    clearInterval(timerInterval);
    timerInterval = setInterval(paintTimer, 1000);
    logSetupExpanded = false;   // starting the timer collapses the setup card automatically
  }
  if (currentView === 'log') renderLog();
}
function resetTimer() {
  if ((currentLog.durationSec || timerRunning) && !confirm(t('Reset the timer to 0:00?'))) return;
  timerRunning = false;
  timerStartTs = null;
  clearInterval(timerInterval); timerInterval = null;
  currentLog.durationSec = 0;
  if (currentView === 'log') renderLog();
}
function stopTimerAndBank() {
  if (timerRunning) {
    currentLog.durationSec = currentDurationSec();
    timerRunning = false;
    timerStartTs = null;
  }
  clearInterval(timerInterval); timerInterval = null;
}

// ═══════════════════════════════════════════════════════
// REST TIMER  (between-set countdown)
// ═══════════════════════════════════════════════════════
let restInterval  = null;
let restEndTs     = 0;
let restTotal     = 0;     // planned length (s) — drives the progress bar
let restRemaining = 0;
let restAudioCtx  = null;

function restDefault() { return Math.max(15, Math.min(600, +localStorage.getItem('ll_rest_default') || 90)); }

// Unlock audio during the user's tap so the end-beep can play later (esp. iOS).
function ensureRestAudio() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (Ctx && !restAudioCtx) restAudioCtx = new Ctx();
    if (restAudioCtx && restAudioCtx.state === 'suspended') restAudioCtx.resume();
  } catch (e) {}
}

function startRest(sec) {
  ensureRestAudio();
  sec = sec || restDefault();
  restTotal     = sec;
  restRemaining = sec;
  restEndTs     = Date.now() + sec * 1000;
  clearInterval(restInterval);
  restInterval = setInterval(tickRest, 250);
  renderRestBar();
}

function tickRest() {
  restRemaining = Math.max(0, Math.round((restEndTs - Date.now()) / 1000));
  if (restRemaining <= 0) { finishRest(); return; }
  paintRest();
}

function addRestTime(delta) {
  if (restRemaining <= 0 && !restInterval) return;
  restRemaining = Math.max(1, restRemaining + delta);
  restTotal     = Math.max(restTotal + delta, restRemaining);
  restEndTs     = Date.now() + restRemaining * 1000;
  // Remember the adjusted length as the new default for next time.
  localStorage.setItem('ll_rest_default', String(Math.max(15, Math.min(600, restDefault() + delta))));
  renderRestBar();
}

function skipRest() {
  clearInterval(restInterval); restInterval = null;
  restRemaining = 0;
  renderRestBar();
}

function finishRest() {
  clearInterval(restInterval); restInterval = null;
  restRemaining = 0;
  restAlert();
  renderRestBar();
}

function restAlert() {
  try { if (navigator.vibrate) navigator.vibrate([180, 90, 180]); } catch (e) {}
  // Two short rising beeps via Web Audio.
  try {
    if (restAudioCtx) {
      const beep = (freq, when) => {
        const o = restAudioCtx.createOscillator(), g = restAudioCtx.createGain();
        o.connect(g); g.connect(restAudioCtx.destination);
        o.type = 'sine'; o.frequency.value = freq;
        const t = restAudioCtx.currentTime + when;
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.3, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);
        o.start(t); o.stop(t + 0.45);
      };
      beep(880, 0); beep(1175, 0.22);
    }
  } catch (e) {}
  showToast(t('Rest done — next set 💪'));
}

function paintRest() {
  const t = document.getElementById('rb-time');
  const f = document.getElementById('rb-fill');
  if (t) t.textContent = fmtDuration(restRemaining);
  if (f) f.style.width = (restTotal ? Math.max(0, Math.min(100, restRemaining / restTotal * 100)) : 0) + '%';
}

function renderRestBar() {
  const bar = document.getElementById('rest-bar');
  if (!bar) return;
  if (restRemaining <= 0 && !restInterval) { bar.classList.remove('show'); return; }
  const pct = restTotal ? Math.max(0, Math.min(100, restRemaining / restTotal * 100)) : 0;
  bar.innerHTML = `
    <div class="rb-top">
      <div>
        <div class="rb-label">⏱ Rest</div>
        <div class="rb-time" id="rb-time">${fmtDuration(restRemaining)}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="rb-btn" onclick="addRestTime(-15)">−15</button>
        <button class="rb-btn" onclick="addRestTime(15)">+15</button>
        <button class="rb-btn rb-skip" onclick="skipRest()">Skip</button>
      </div>
    </div>
    <div class="rb-track"><div class="rb-fill" id="rb-fill" style="width:${pct}%"></div></div>`;
  bar.classList.add('show');
}

function renderExercisesHTML() {
  const unit = DB.unit;
  return currentLog.exercises.map((ex, ei) => {
    const muscle = getMuscleForExercise(ex.name);
    const isOpen = openEx.has(ei);
    const nSets  = ex.sets.length;
    // Collapsed summary: muscle · sets · best entered set
    const best = ex.sets.filter(s => s.weight && s.reps)
      .sort((a,b) => ((+b.weight||0)*(+b.reps||0)) - ((+a.weight||0)*(+a.reps||0)))[0];
    const bits = [];
    if (muscle) bits.push(muscle);
    bits.push(`${nSets} set${nSets!==1?'s':''}`);
    if (best) bits.push(`${best.weight}${unit}×${best.reps}`);
    const summary = bits.join(' · ');
    return `
  <div class="card-sm ex-acc${isOpen?' open':''}" id="ex-${ei}" data-drag-item style="margin-bottom:10px;padding:0;overflow:hidden">
    <div class="ex-acc-header" onclick="toggleEx(${ei})">
      <div style="display:flex;align-items:center;gap:6px;min-width:0">
        <span class="drag-handle" data-drag-handle onclick="event.stopPropagation()" title="Drag to reorder" aria-label="Drag to reorder">⠿</span>
        <span class="ex-acc-chevron">▾</span>
        <div style="min-width:0">
          <div style="font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ex.name}</div>
          <div style="font-size:11px;color:${muscle?'var(--accent)':'var(--muted)'};margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${summary}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:3px;flex-shrink:0" onclick="event.stopPropagation()">
        <button class="del-btn" onclick="removeExercise(${ei})">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>

        </button>

    </div>
    <div class="ex-acc-body">
    <div class="sets-header">
      <span>Set</span><span>Wt (${unit})</span><span>Reps</span><span>~1RM</span><span></span>
    </div>
    ${ex.sets.map((set, si) => {
      const isFailed = !!set.failed;

                           : (set.weight&&set.reps ? calc1RM(set.weight,set.reps) : '-');
      return `
    <div class="set-row">

      <div class="set-cell">
        <input type="number" inputmode="decimal" min="0" step="0.5" value="${set.weight||''}" placeholder="${set.phW||0}"
          id="w-${ei}-${si}"
          onfocus="phFill(this,${ei},${si},'weight')"
          oninput="updateSet(${ei},${si},'weight',this.value);refreshRM(${ei},${si})">
        <button class="set-qbtn${set._bw?' bw-on':''}" onclick="setBW(${ei},${si})">BW</button>
      </div>
      <div class="set-cell">
        <input type="number" inputmode="decimal" min="0" step="0.5" value="${set.reps||''}" placeholder="${set.phR||0}"
          id="r-${ei}-${si}" ${isFailed?'style="opacity:0.4;pointer-events:none"':''}
          onfocus="phFill(this,${ei},${si},'reps')"

        <button class="set-qbtn${isFailed?' fail-on':''}" onclick="toggleFailed(${ei},${si})">Failed</button>
      </div>
      <div class="set-rm" id="rm-${ei}-${si}">${rm1}</div>
      <button class="del-btn" onclick="removeSet(${ei},${si})">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>

    </div>`;
    }).join('')}
    <div style="display:flex;gap:8px;margin-top:8px">

      style="margin-top:10px;font-size:13px;padding:9px 12px;min-height:38px">

function refreshExSection() {
  const el = document.getElementById('exercises-section');
  if (el) { el.innerHTML = renderExercisesHTML(); initLogExDrag(); }
  saveDraft();
}
// Expand / collapse a Log exercise (no draft write needed for a pure UI toggle)
function toggleEx(ei) {
  // Accordion: only one exercise open at a time — opening one closes the rest.
  openEx = openEx.has(ei) ? new Set() : new Set([ei]);
  const el = document.getElementById('exercises-section');
  if (el) { el.innerHTML = renderExercisesHTML(); initLogExDrag(); }
}
// Remap a tracked index after an item moves from→to within a list
function remapIndexAfterMove(i, from, to) {
  if (i === from) return to;
  if (from < to) return (i > from && i <= to) ? i - 1 : i;
  return (i >= to && i < from) ? i + 1 : i;
}
function reorderLogExercises(from, to) {
  const arr = currentLog.exercises;
  if (from === to || from < 0 || to < 0 || from >= arr.length || to >= arr.length) return;
  const [it] = arr.splice(from, 1);
  arr.splice(to, 0, it);
  openEx = new Set([...openEx].map(i => remapIndexAfterMove(i, from, to)));
  refreshExSection();
}
function initLogExDrag() {
  const el = document.getElementById('exercises-section');
  if (el) enableDragReorder(el, reorderLogExercises);
}

function updateSet(ei, si, field, val) {
  currentLog.exercises[ei].sets[si][field] = val;
  saveDraft();
}
function refreshRM(ei, si) {
  const set = currentLog.exercises[ei].sets[si];
  const el  = document.getElementById(`rm-${ei}-${si}`);
  if (!el) return;
  if (set.failed) { el.innerHTML = '<span style="color:var(--red);font-size:10px">FAIL</span>'; return; }
  el.textContent = set.weight && set.reps ? calc1RM(set.weight, set.reps) : '-';
}
function addSet(ei) {
  const last = currentLog.exercises[ei].sets.slice(-1)[0];
  currentLog.exercises[ei].sets.push({weight:last?.weight||'', reps:''});
  refreshExSection();
  setTimeout(()=>document.getElementById(`w-${ei}-${currentLog.exercises[ei].sets.length-1}`)?.focus(),50);
}
function removeSet(ei, si) {
  currentLog.exercises[ei].sets.splice(si,1);
  if(!currentLog.exercises[ei].sets.length) currentLog.exercises[ei].sets.push({weight:'',reps:''});
  refreshExSection();
}
function removeExercise(ei) {
  currentLog.exercises.splice(ei,1);
  // keep accordion open-state aligned with the shifted indices
  const ns = new Set();
  openEx.forEach(i => { if (i < ei) ns.add(i); else if (i > ei) ns.add(i-1); });
  openEx = ns;
  refreshExSection();
}

function setBW(ei, si) {
  const bw = DB.profile.bodyweight;
  if (!bw) { showToast(t('Add your body weight in My Stats (tap 👤 icon) first'), false); return; }
  const log = getActiveLog();
  const set = log.exercises[ei].sets[si];

  if (editingWorkout) {
    // Convert display-unit BW to the workout's stored data unit
    const du  = wUnit(editingWorkout);
    const kg  = toKg(+bw, DB.unit);
    set.weight = (du === 'kg') ? Math.round(kg * 10) / 10 : Math.round(kg * KG_TO_LBS * 10) / 10;
    set._bw    = true;
    const el   = document.getElementById(`ew-${ei}-${si}`);
    if (el) el.value = bw; // show in display unit
    editRefreshRM(ei, si);
    // Refresh BW button highlight without full re-render
    const btn = el?.closest('.set-cell')?.querySelector('.set-qbtn');
    if (btn) btn.className = 'set-qbtn bw-on';
  } else {
    set.weight = bw;
    set._bw    = true;
    const el   = document.getElementById(`w-${ei}-${si}`);
    if (el) el.value = bw;
    refreshRM(ei, si);
    const btn = el?.closest('.set-cell')?.querySelector('.set-qbtn');
    if (btn) btn.className = 'set-qbtn bw-on';
  }
}

function toggleFailed(ei, si) {
  const log = getActiveLog();
  const set = log.exercises[ei].sets[si];
  set.failed = !set.failed;
  if (editingWorkout) editRefreshExSection();
  else refreshExSection();
}

function openAddExModal() {
  const active = getActiveLog();
  const used   = new Set(active.exercises.map(e=>e.name));
  const avail  = allExerciseNames().filter(e=>!used.has(e));
  document.getElementById('modal-content').innerHTML = `
  <div style="font-size:18px;font-weight:700;margin-bottom:14px">Add Exercise</div>
  <div class="input-wrapper" style="margin-bottom:8px;position:relative">
    <input type="text" id="ex-search" placeholder="Search or type a new exercise…"
      oninput="filterExDropdown(this.value)" autocomplete="off"
      autocapitalize="words" autocorrect="off" spellcheck="false"
      onkeydown="if(event.key==='Enter'){const v=this.value.trim();if(v)pickExerciseName(v)}">
    <div id="ex-dropdown" class="ac-dropdown" style="display:none"></div>
  </div>
  <button class="btn btn-primary btn-full" style="margin-bottom:14px" onclick="pickExerciseName(document.getElementById('ex-search').value.trim())">Next: Pick Muscle →</button>
  <div class="label">Common Exercises</div>
  <div>${avail.map(e=>`<span class="ex-chip" onclick="pickExerciseName('${esc(e)}')">${e}</span>`).join('')}</div>`;

  setTimeout(()=>document.getElementById('ex-search')?.focus(), 100);
}

// Multi-select muscle picker (shared by log flow and Exercises-tab flow)
let pickedMuscles = new Set();
function renderMusclePicker(name, backFn, confirmFn) {
  let html = `
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <button class="btn btn-secondary btn-sm" onclick="${backFn}" style="padding:8px 10px">← Back</button>
    <div style="font-size:18px;font-weight:700">Target Muscles</div>
  </div>
  <div style="font-size:14px;color:var(--accent);font-weight:600;margin-bottom:4px">${name}</div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Tap all the muscles this exercise hits — e.g. Deadlift → Lats + Hamstrings + Glutes</div>`;

  for (const [bp, data] of Object.entries(MUSCLE_GROUPS)) {
    html += `<div class="label" style="margin-bottom:6px">${bodyPartLabel(bp)}</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">`;
    for (const m of data.sub) {
      const sel = pickedMuscles.has(m);
      html += `<span class="ex-chip" id="mchip-${m.replace(/\s/g,'_')}" onclick="toggleMuscleChip('${esc(m)}')"
        style="${sel?'background:var(--accent);color:#fff;border-color:var(--accent)':''}">${sel?'✓ ':''}${m}</span>`;
    }
    html += `</div>`;
  }
  html += `
  <button class="btn btn-primary btn-full" style="margin-top:4px" onclick="${confirmFn}">
    Add Exercise<span id="mcount">${pickedMuscles.size?` (${pickedMuscles.size} muscle${pickedMuscles.size>1?'s':''})`:''}</span>
  </button>
  <button class="btn btn-secondary btn-full" style="margin-top:8px" onclick="pickedMuscles.clear();${confirmFn}">Skip — don't tag muscles</button>`;
  document.getElementById('modal-content').innerHTML = html;
}
function toggleMuscleChip(m) {
  pickedMuscles.has(m) ? pickedMuscles.delete(m) : pickedMuscles.add(m);
  const chip = document.getElementById(`mchip-${m.replace(/\s/g,'_')}`);
  if (chip) {
    const on = pickedMuscles.has(m);
    chip.style.background  = on ? 'var(--accent)' : '';
    chip.style.color       = on ? '#fff' : '';
    chip.style.borderColor = on ? 'var(--accent)' : '';
    chip.textContent       = (on ? '✓ ' : '') + m;
  }
  const c = document.getElementById('mcount');
  if (c) c.textContent = pickedMuscles.size ? ` (${pickedMuscles.size} muscle${pickedMuscles.size>1?'s':''})` : '';
}

function pickExerciseName(name) {
  name = name.trim();
  if (!name) { showToast(t('Enter an exercise name'), false); return; }
  pickedMuscles = new Set(getMusclesForExercise(name));
  renderMusclePicker(name, 'openAddExModal()', `confirmAddExercise('${esc(name)}')`);
}
function confirmAddExercise(name) {
  addExercise(name, [...pickedMuscles]);
}

function filterExDropdown(q) {
  const dd = document.getElementById('ex-dropdown');
  if(!q.trim()) { dd.style.display='none'; return }
  const active = getActiveLog();
  const used   = new Set(active.exercises.map(e=>e.name));
  const matches = allExerciseNames().filter(e=>!used.has(e)&&e.toLowerCase().includes(q.toLowerCase()));
  const isNew  = q.trim() && !allExerciseNames().map(e=>e.toLowerCase()).includes(q.trim().toLowerCase());
  const items  = [
    ...matches.map(e=>`<div class="ac-item" onclick="pickExerciseName('${esc(e)}')">${e}</div>`),
    isNew ? `<div class="ac-item" onclick="pickExerciseName('${esc(q.trim())}')" style="color:var(--accent)">+ Add "${q.trim()}"</div>` : ''
  ].join('');
  dd.innerHTML = items || `<div class="ac-item" style="color:var(--muted)">No matches</div>`;
  dd.style.display = 'block';
}

function addExercise(name, muscle) {
  name = name.trim(); if(!name) return;
  // Save to known exercises list
  const exs = DB.exercises;
  if(!exs.includes(name)) { exs.push(name); DB.saveExercises(exs) }
  // Save muscle mapping if provided (array of muscles)
  const mList = Array.isArray(muscle) ? muscle : (muscle ? [muscle] : []);
  if (mList.length) {
    const muscles = DB.exerciseMuscles;
    muscles[name] = mList;
    DB.saveExerciseMuscles(muscles);
  }

  if (editingWorkout) {
    // Edit mode — add to editingWorkout and refresh edit modal
    editingWorkout.exercises.push({name, sets:[{weight:'',reps:''}]});
    editOpenEx.add(editingWorkout.exercises.length - 1); // expand the new one
    renderWorkoutEditModal();
    setTimeout(()=>{
      document.getElementById(`edit-ex-${editingWorkout.exercises.length-1}`)
        ?.scrollIntoView({behavior:'smooth',block:'start'});
    }, 120);
  } else {
    // Log mode — pre-fill placeholder sets from this exercise's last session
    currentLog.exercises.push(exerciseWithPlaceholders(name));
    openEx = new Set([currentLog.exercises.length - 1]); // newest open, rest collapsed
    closeModal();
    refreshExSection();
    setTimeout(()=>{
      document.getElementById(`ex-${currentLog.exercises.length-1}`)
        ?.scrollIntoView({behavior:'smooth',block:'start'});
    }, 100);
  }
}

function saveWorkout() {
  const dateEl  = document.getElementById('log-date');
  const nameEl  = document.getElementById('log-name-select');
  const custEl  = document.getElementById('log-name-custom');
  const notesEl = document.getElementById('log-notes');
  if(dateEl)  currentLog.date  = dateEl.value;
  if(nameEl && nameEl.value !== '__custom__') currentLog.name = nameEl.value;
  if(custEl && custEl.style.display !== 'none') currentLog.name = custEl.value;
  if(notesEl) currentLog.notes = notesEl.value;
  stopTimerAndBank();                          // freeze the stopwatch into durationSec

  if(!currentLog.exercises.length) { showToast(t('Add at least one exercise!'), false); return }

  const cleaned = {
    ...currentLog,
    name:     currentLog.name || 'Workout',
    durationSec: Math.round(currentLog.durationSec || 0),
    dataUnit: DB.unit,                        // ← tag with current unit
    exercises: currentLog.exercises.map(ex=>({
      ...ex,
      sets: ex.sets.filter(s=>s.weight||s.reps)
                   .map(({phW, phR, ...s}) => s)   // drop placeholder hints
    })).filter(ex=>ex.sets.length)
  };

  DB.addWorkout(cleaned);
  showToast(t('Workout saved! 💪'));
  timerRunning = false; timerStartTs = null;
  clearInterval(timerInterval); timerInterval = null;
  currentLog = newLog();
  clearDraft();
  skipRest();
  showView('dashboard');
  maybeAskFeedback();
}

function clearLog() {
  if(currentLog.exercises.length && !confirm(t('Clear this workout?'))) return;
  stopTimerAndBank();
  timerRunning = false; timerStartTs = null;
  clearInterval(timerInterval); timerInterval = null;
  currentLog = newLog();
  clearDraft();
  renderLog();
}

// ═══════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════
// ── History — calendar view ───────────────────────────
const pad2 = n => String(n).padStart(2, '0');

// Stable colour per workout name (same name → same colour, app-wide)
const WORKOUT_PALETTE = ['#f97316','#22c55e','#3b82f6','#a855f7','#ec4899',
                         '#eab308','#14b8a6','#ef4444','#06b6d4','#f43f5e'];
function workoutColor(name){
  const names = [...new Set(DB.workouts.map(w => w.name || 'Workout'))].sort();
  const i = names.indexOf(name || 'Workout');
  return WORKOUT_PALETTE[(i < 0 ? 0 : i) % WORKOUT_PALETTE.length];
}

function renderHistory() {
  const workouts = DB.workouts;
  let html = `
  <div class="section-header">
    <div style="font-size:22px;font-weight:800">${t('History')}</div>
    <div style="font-size:13px;color:var(--muted)">${workouts.length} ${t('sessions')}</div>
  </div>`;

  // Surface any unsaved (in-progress) workout at the top — tap to edit & save on the Log screen.
  if (hasUnsavedDraft()) {
    const dl = currentLog;
    const exCount = (dl.exercises || []).length;
    const summary = exCount ? tf('{n} exercises so far', {n:exCount}) : t('No exercises added yet');
    html += `
    <div class="card" style="border-color:var(--accent);background:var(--accent-dim);cursor:pointer;margin-bottom:14px" onclick="showView('log')">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:24px">📝</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px;color:var(--accent)">Unsaved workout${dl.name ? ` · ${esc(dl.name)}` : ''}</div>
          <div style="font-size:12px;color:var(--muted)">${tf('{summary} — tap to edit & save it on the Log screen', {summary})}</div>
        </div>
        <div style="color:var(--accent);font-size:22px;line-height:1">›</div>
      </div>
    </div>`;
  }

  if(!workouts.length) {
    html += `<div class="empty">
      <div class="empty-icon">⏱️</div>
      <div style="font-weight:600;margin-bottom:6px">Your workout history lives here</div>
      <div style="font-size:13px;margin-bottom:18px">Every workout you finish appears on a calendar.<br>Tap a day to review or edit it later.</div>
      <button class="btn btn-primary" onclick="showView('log')">Log your first workout →</button>
    </div>`;
    document.getElementById('main').innerHTML = html;
    return;
  }

  // Map each YYYY-MM-DD to the workouts logged that day
  const byDate = {};
  for(const w of workouts) (byDate[w.date] = byDate[w.date] || []).push(w);
  const allDates = Object.keys(byDate).sort();
  const earliestYM = allDates[0].slice(0,7);

  // Which month are we showing?
  const realNow = new Date();
  const currentYM = `${realNow.getFullYear()}-${pad2(realNow.getMonth()+1)}`;
  const ym = historyMonth || allDates[allDates.length-1].slice(0,7);
  const [year, mon] = ym.split('-').map(Number);
  const monthIdx = mon - 1;

  const monthLabel = new Date(year, monthIdx, 1)
    .toLocaleDateString(L(), { month:'long', year:'numeric' });
  const todayStr = `${realNow.getFullYear()}-${pad2(realNow.getMonth()+1)}-${pad2(realNow.getDate())}`;

  const startDOW    = new Date(year, monthIdx, 1).getDay();
  const daysInMonth = new Date(year, monthIdx+1, 0).getDate();

  // Sessions + distinct training days this month.
  // Weekly frequency = average training days across the Sun–Sat weeks that
  // actually had a workout (so a single full week of 5 days reads as 5, not 1.1).
  let monthSessions = 0;
  const monthDays = new Set();
  const weekDayCounts = {};   // weekKey (Sunday's date) → Set of training days
  for(let d=1; d<=daysInMonth; d++){
    const ds = `${year}-${pad2(monthIdx+1)}-${pad2(d)}`;
    if(byDate[ds]){
      monthSessions += byDate[ds].length;
      monthDays.add(ds);
      const dt = new Date(year, monthIdx, d);
      const sunday = new Date(dt); sunday.setDate(dt.getDate() - dt.getDay());
      const wk = `${sunday.getFullYear()}-${pad2(sunday.getMonth()+1)}-${pad2(sunday.getDate())}`;
      (weekDayCounts[wk] = weekDayCounts[wk] || new Set()).add(ds);
    }
  }
  const activeWeeks = Object.keys(weekDayCounts).length;
  const perWeekRaw  = activeWeeks ? monthDays.size / activeWeeks : 0;
  const perWeek     = Number.isInteger(perWeekRaw) ? perWeekRaw : Math.round(perWeekRaw * 10) / 10;

  const prevDisabled = ym <= earliestYM;
  const nextDisabled = ym >= currentYM;

  // Nav + month title
  html += `
  <div class="cal-nav">
    <button class="cal-nav-btn" onclick="historyShiftMonth(-1)" ${prevDisabled?'disabled':''}>‹</button>
    <div class="cal-nav-title">${monthLabel}</div>
    <button class="cal-nav-btn" onclick="historyShiftMonth(1)" ${nextDisabled?'disabled':''}>›</button>
  </div>`;

  // Weekday headers (localised)
  const dow = DB.lang === 'ja' ? ['日','月','火','水','木','金','土'] : ['S','M','T','W','T','F','S'];
  html += `<div class="cal-grid" style="margin-bottom:5px">`;
  for(const d of dow) html += `<div class="cal-dow">${d}</div>`;
  html += `</div>`;

  // Day cells — coloured by workout type
  html += `<div class="cal-grid">`;
  for(let i=0; i<startDOW; i++) html += `<div class="cal-cell blank"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const ds   = `${year}-${pad2(monthIdx+1)}-${pad2(d)}`;
    const list = byDate[ds];
    const isToday = ds === todayStr;
    if(list && list.length){
      const tap = list.length === 1
        ? `showWorkoutDetail('${list[0].id}')`
        : `showDaySessions('${ds}')`;
      const c0   = workoutColor(list[0].name);
      const dots = list.slice(0,4)
        .map(w => `<span class="cal-dot" style="background:${workoutColor(w.name)}"></span>`).join('');
      html += `
      <div class="cal-cell has-workout ${isToday?'today':''}" onclick="${tap}"
           style="background:${c0}22;border-color:${c0}">
        ${d}
        <span class="cal-dots">${dots}</span>
      </div>`;
    } else {
      html += `<div class="cal-cell ${isToday?'today':''}">${d}</div>`;
    }
  }
  html += `</div>`;

  // Legend — workout types present this month, with their colours
  const monthNames = [...new Set(
    [...monthDays].flatMap(ds => byDate[ds].map(w => w.name || 'Workout'))
  )].sort();
  if(monthNames.length){
    html += `<div class="cal-legend">`;
    for(const n of monthNames){
      html += `<div class="cal-legend-item">
        <span class="cal-legend-swatch" style="background:${workoutColor(n)}"></span>${n}</div>`;
    }
    html += `</div>`;
  }

  // Month summary
  html += `
  <div class="card" style="margin-top:16px;display:flex;justify-content:space-around;text-align:center">
    <div>
      <div style="font-size:20px;font-weight:800;color:var(--accent)">${monthSessions}</div>
      <div style="font-size:11px;color:var(--muted)">${t('sessions')}</div>
    </div>
    <div>
      <div style="font-size:20px;font-weight:800;color:var(--accent)">${monthDays.size}</div>
      <div style="font-size:11px;color:var(--muted)">${t('days trained')}</div>
    </div>
    <div>
      <div style="font-size:20px;font-weight:800;color:var(--accent)">${perWeek}</div>
      <div style="font-size:11px;color:var(--muted)">${t('days / week')}</div>
    </div>
  </div>
  <div style="text-align:center;font-size:11px;color:var(--muted);margin-top:6px">
    ${t('Tap a highlighted day to see that session')}
  </div>`;

  document.getElementById('main').innerHTML = html;
}

function historyShiftMonth(delta){
  const workouts = DB.workouts;
  const allDates = workouts.map(w=>w.date).sort();
  const ym = historyMonth || (allDates.length ? allDates[allDates.length-1].slice(0,7) : null);
  if(!ym) return;
  let [y, m] = ym.split('-').map(Number);
  m += delta;
  if(m < 1){ m = 12; y--; } else if(m > 12){ m = 1; y++; }
  historyMonth = `${y}-${pad2(m)}`;
  renderHistory();
}

// When a day has more than one session, list them and let the user pick
function showDaySessions(dateStr){
  const list = DB.workouts.filter(w=>w.date===dateStr);
  if(!list.length) return;
  if(list.length===1){ showWorkoutDetail(list[0].id); return; }
  const unit = DB.unit;
  let html = `<div style="font-size:18px;font-weight:800;margin-bottom:4px">${fmtDate(dateStr)}</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px">${list.length} ${t('sessions this day')}</div>`;
  for(const w of list){
    const du       = wUnit(w);
    const exNames  = w.exercises.map(e=>e.name).join(' · ') || 'No exercises';
    const totalSets= w.exercises.reduce((s,e)=>s+e.sets.length, 0);
    const vol      = w.exercises.reduce((s,e)=>s+e.sets.reduce((s2,set)=>s2+(dispW(+set.weight||0,du))*(+set.reps||0),0),0);
    html += `
    <div class="workout-item" onclick="showWorkoutDetail('${w.id}')">
      <div style="flex:1;min-width:0">

        <div class="workout-exercises" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${exNames}</div>
        ${vol?`<div style="font-size:11px;color:var(--accent);font-weight:600;margin-top:4px">${Math.round(vol).toLocaleString()}${unit} vol · ${totalSets} sets</div>`:''}
      </div>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" style="margin-left:8px;flex-shrink:0;margin-top:2px">
        <polyline points="9 18 15 12 9 6"/>

function deleteWorkout(id) {
  if(!confirm(t('Delete this workout permanently?'))) return;
  DB.removeWorkout(id);
  closeModal();
  renderHistory();
  showToast(t('Workout deleted'));
}

function handleEditSessionSelect(val) {

function editRefreshExSection() {
  const el = document.getElementById('edit-exercises-section');
  if (el) { el.innerHTML = renderEditExercisesHTML(); initEditExDrag(); }
}
function reorderEditExercises(from, to) {
  const arr = editingWorkout.exercises;
  if (from === to || from < 0 || to < 0 || from >= arr.length || to >= arr.length) return;
  const [it] = arr.splice(from, 1);
  arr.splice(to, 0, it);
  editOpenEx = new Set([...editOpenEx].map(i => remapIndexAfterMove(i, from, to)));
  editRefreshExSection();
}
function initEditExDrag() {
  enableDragReorder(document.getElementById('edit-exercises-section'), reorderEditExercises);
}

// Weight stored in editingWorkout must always be in the workout's original dataUnit
function editUpdateSet(ei, si, field, val, isWeight) {
  if (isWeight) {
    // Convert display unit back to the workout's dataUnit
    const du  = wUnit(editingWorkout);
    const unit = DB.unit;
    let kg = toKg(+val, unit);
    let stored = (du === 'kg') ? kg : kg * KG_TO_LBS;
    editingWorkout.exercises[ei].sets[si][field] = stored ? Math.round(stored * 10) / 10 : val;
  } else {
    editingWorkout.exercises[ei].sets[si][field] = val;
  }
}
function editRefreshRM(ei, si) {
  const set = editingWorkout.exercises[ei].sets[si];
  const du  = wUnit(editingWorkout);
  const dw  = dispW(+set.weight||0, du);
  const el  = document.getElementById(`erm-${ei}-${si}`);
  if (!el) return;
  if (set.failed) { el.innerHTML = '<span style="color:var(--red);font-size:10px">FAIL</span>'; return; }
  el.textContent = dw && set.reps ? calc1RM(dw, set.reps) : '-';
}
function editAddSet(ei) {
  const last = editingWorkout.exercises[ei].sets.slice(-1)[0];
  editingWorkout.exercises[ei].sets.push({weight:last?.weight||'', reps:''});
  editRefreshExSection();
  setTimeout(()=>document.getElementById(`ew-${ei}-${editingWorkout.exercises[ei].sets.length-1}`)?.focus(),50);
}
function editRemoveSet(ei, si) {
  editingWorkout.exercises[ei].sets.splice(si,1);
  if(!editingWorkout.exercises[ei].sets.length) editingWorkout.exercises[ei].sets.push({weight:'',reps:''});
  editRefreshExSection();
}
function editRemoveExercise(ei) {
  editingWorkout.exercises.splice(ei,1);
  // keep accordion open-state aligned with the shifted indices
  const ns = new Set();
  editOpenEx.forEach(i => { if(i<ei) ns.add(i); else if(i>ei) ns.add(i-1); });
  editOpenEx = ns;
  editRefreshExSection();
}
function editOpenAddExModal() {
  // Temporarily close and reopen with exercise picker
  // Uses openAddExModal — addExercise() will detect editingWorkout and route there
  openAddExModal();
}

function saveEditedWorkout() {
  const nameEl  = document.getElementById('edit-log-name-select');
  const custEl  = document.getElementById('edit-log-name-custom');
  const dateEl  = document.getElementById('edit-log-date');
  const notesEl = document.getElementById('edit-log-notes');
  if (dateEl)  editingWorkout.date  = dateEl.value;
  if (nameEl && nameEl.value !== '__custom__') editingWorkout.name = nameEl.value;
  if (custEl && custEl.style.display !== 'none') editingWorkout.name = custEl.value;
  if (notesEl) editingWorkout.notes = notesEl.value;

  if (!editingWorkout.exercises.length) { showToast(t('Add at least one exercise!'), false); return; }

  const cleaned = {
    ...editingWorkout,
    name: editingWorkout.name || 'Workout',
    exercises: editingWorkout.exercises.map(ex=>({
      ...ex,
      sets: ex.sets.filter(s => s.weight || s.reps)
    })).filter(ex => ex.sets.length)
  };

  const workouts = DB.workouts;
  const idx = workouts.findIndex(x => x.id === cleaned.id);
  if (idx >= 0) workouts[idx] = cleaned;
  else workouts.push(cleaned);
  DB.save(workouts);

  editingWorkout = null;
  closeModal();
  renderHistory();
  showToast(t('Workout updated! ✅'));
}

function cancelEditWorkout() {
  editingWorkout = null;
  closeModal();
}

// ═══════════════════════════════════════════════════════
// PRs — grouped by body part
// ═══════════════════════════════════════════════════════
function renderPRs() {
  const prs   = getPRs();
  // Every known exercise (manually added + ever logged), not only ones with a PR
  const names = allExerciseNames();
  const unit  = DB.unit;

  const headerHTML = `
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px">
    <div style="font-size:22px;font-weight:800">Exercises</div>
    <button class="btn btn-secondary btn-sm" onclick="showView('goals')" style="white-space:nowrap">🎯 Manage Goals</button>
  </div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:16px">Tap a group to see all exercises · Tap exercise for progress chart</div>
  ${templatesSectionHTML()}`;

  if(!names.length) {
    document.getElementById('main').innerHTML = headerHTML + `
    <div class="empty">
      <div class="empty-icon">📈</div>
      <div style="font-weight:600;margin-bottom:6px">Your exercise library lives here</div>
      <div style="font-size:13px;margin-bottom:18px">Every exercise shows the best weight you've lifted<br>and a progress chart over time.</div>
      <button class="btn btn-primary" onclick="openExercisesAddModal()">+ Add your first exercise</button>
    </div>`;
    return;
  }

  // Group by body part → sub-muscle. A multi-tagged exercise (e.g. Deadlift →
  // Lats + Hamstrings) appears under EVERY tagged body part.
  const groups = {};
  const addTo = (bp, sub, name) => {
    if(!groups[bp]) groups[bp] = {};
    if(!groups[bp][sub]) groups[bp][sub] = [];
    if(!groups[bp][sub].includes(name)) groups[bp][sub].push(name);
  };
  for(const name of names) {
    const muscles = getMusclesForExercise(name);
    if (muscles.length) {
      for (const m of muscles) addTo(getBodyPartForMuscle(m) || 'Other', m, name);
    } else {
      addTo(getBodyPart(name), 'General', name);
    }
  }

  // Order body parts: known ones first, then Other
  const ORDER = ['Chest','Back','Legs','Glutes','Shoulders','Arms','Abs','Core','Other'];
  const sortedBPs = [
    ...ORDER.filter(bp => groups[bp]),
    ...Object.keys(groups).filter(bp => !ORDER.includes(bp))
  ];

  let html = headerHTML;

  for(const bp of sortedBPs) {
    const subGroups = groups[bp]; // { subName: [exerciseNames...] }
    const isOpen    = openBPGroups.has(bp);

    // All exercises in this body part
    const allExInBP = Object.values(subGroups).flat();
    const totalCount = allExInBP.length;

    // Best exercise (highest 1RM among those with data)
    let bestName = null, bestRM = 0;
    for(const n of allExInBP) {
      if(prs[n]?.bestSet && prs[n].best1RM_kg > bestRM) { bestRM=prs[n].best1RM_kg; bestName=n }
    }
    const bestPR   = bestName ? prs[bestName] : null;
    const bestDisp = bestPR?.displayWeight ?? '—';

    // Check if selected exercise is in this group
    const selInGroup = selectedPREx && allExInBP.includes(selectedPREx);

    // Build the sub-group body
    // Order sub-groups: MUSCLE_GROUPS defined order first, then General/Others
    const knownSubs = (MUSCLE_GROUPS[bp]?.sub) || [];
    const sortedSubs = [
      ...knownSubs.filter(s => subGroups[s]),
      ...Object.keys(subGroups).filter(s => !knownSubs.includes(s))
    ];

    let bodyHtml = '';
    for (const sub of sortedSubs) {
      const exList = subGroups[sub];
      const isTagged = sub !== 'General';

      if (isTagged) {
        bodyHtml += `<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:8px 16px 4px;border-top:1px solid var(--border)">${sub}</div>`;
      }

      for (const name of exList) {
        const pr      = prs[name];
        const hasData = !!pr?.bestSet;
        const sel     = name === selectedPREx;
        bodyHtml += `
        <div class="bp-ex-row" onclick="selectPRExercise('${esc(name)}')"
          style="${sel?'background:var(--accent-dim);border-left:3px solid var(--accent);':''}">
          <div>
            <div class="bp-ex-name" style="${sel?'color:var(--accent)':''}">${name}</div>
            <div class="bp-ex-date">${hasData ? fmtDate(pr.date) : 'No data yet'}</div>
          </div>
          ${hasData ? `
          <div class="bp-ex-pr">
            <div class="bp-ex-weight">${pr.displayWeight}<span style="font-size:11px;font-weight:500;color:var(--muted)">${unit}</span></div>
            <div class="bp-ex-reps">× ${pr.bestSet.reps} reps</div>
            <div class="bp-ex-1rm">est. 1RM ${pr.best1RM}${unit}</div>
          </div>`
          : `<div class="bp-ex-pr"><div style="font-size:12px;color:var(--muted)">— ${unit}</div><div class="bp-ex-reps" style="color:var(--accent)">Log to set</div></div>`}
        </div>`;
      }
    }

    // Chart area if an exercise in this group is selected
    if (selInGroup) {
      bodyHtml += `
      <div style="padding:0 16px 16px">
        <div class="label" style="margin-top:12px">Progress — ${selectedPREx}</div>
        <div id="pr-chart-area" style="min-height:50px;text-align:center;color:var(--muted);font-size:13px;padding:16px 0">
          Loading chart…
        </div>
      </div>`;
    }

    html += `
    <div class="bp-group ${isOpen?'open':''}" id="bpg-${bp.replace(/\s/g,'_')}">
      <div class="bp-group-header" onclick="toggleBPGroup('${esc(bp)}')">
        <div class="bp-group-header-left">
          <div>
            <div class="bp-group-name">${bodyPartLabel(bp)}</div>
            <div class="bp-group-best">${totalCount} exercise${totalCount>1?'s':''}${bestName?` · Best: ${bestName}`:''}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="text-align:right">
            <div style="font-size:17px;font-weight:800;color:${bestPR?'var(--accent)':'var(--muted)'}">${bestDisp}<span style="font-size:11px;font-weight:500;color:var(--muted)">${unit}</span></div>
            <div style="font-size:10px;color:var(--muted)">${bestPR?`× ${bestPR.bestSet.reps} reps`:'No data'}</div>
          </div>
          <div class="bp-group-chevron">▾</div>
        </div>
      </div>
      <div class="bp-group-body">${bodyHtml}</div>
    </div>`;
  }

  // Sticky add-exercise button pinned at the bottom
  html += `
  <div style="height:64px"></div>
  <div class="sticky-action-bar">
    <button class="btn btn-primary btn-full" onclick="openExercisesAddModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add Exercise
    </button>
  </div>`;

  document.getElementById('main').innerHTML = html;

  // Render chart if a PR is selected and its group is open
  if(selectedPREx && prs[selectedPREx]) {
    const bp = getBodyPartForExercise(selectedPREx);
    if(openBPGroups.has(bp)) {
      const progress = getProgress(selectedPREx);
      setTimeout(()=>renderInlineChart(progress, unit), 80);
    }
  }
}

function toggleBPGroup(bp) {
  if(openBPGroups.has(bp)) {
    openBPGroups.delete(bp);
  } else {
    openBPGroups.add(bp);
  }
  renderPRs();
}

function selectPRExercise(name) {
  selectedPREx = name;
  // Auto-open the group containing this exercise
  const bp = getBodyPartForExercise(name);
  openBPGroups.add(bp);
  renderPRs();
  setTimeout(()=>{
    document.getElementById(`bpg-${bp.replace(/\s/g,'_')}`)
      ?.scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}

// ── Add an exercise straight from the Exercises tab (no workout needed) ──
function openExercisesAddModal() {
  const known = new Set(allExerciseNames());
  const avail = DEFAULT_EXERCISES.filter(e => !known.has(e));
  document.getElementById('modal-content').innerHTML = `
  <div style="font-size:18px;font-weight:700;margin-bottom:14px">Add Exercise</div>
  <div class="input-wrapper" style="margin-bottom:8px;position:relative">
    <input type="text" id="exadd-search" placeholder="Search or type a new exercise…"
      oninput="filterExAddDropdown(this.value)" autocomplete="off"
      autocapitalize="words" autocorrect="off" spellcheck="false"
      onkeydown="if(event.key==='Enter'){const v=this.value.trim();if(v)pickExerciseAddName(v)}">
    <div id="exadd-dropdown" class="ac-dropdown" style="display:none"></div>
  </div>
  <button class="btn btn-primary btn-full" style="margin-bottom:14px" onclick="pickExerciseAddName(document.getElementById('exadd-search').value.trim())">Next: Pick Muscle →</button>
  ${avail.length ? `<div class="label">Common Exercises</div>
  <div>${avail.map(e=>`<span class="ex-chip" onclick="pickExerciseAddName('${esc(e)}')">${e}</span>`).join('')}</div>` : ''}`;
  openModal();
  setTimeout(()=>document.getElementById('exadd-search')?.focus(), 100);
}

function filterExAddDropdown(q) {
  const dd = document.getElementById('exadd-dropdown');
  if(!q.trim()) { dd.style.display='none'; return }
  const all     = allExerciseNames();
  const lower   = all.map(e=>e.toLowerCase());
  const matches = all.filter(e=>e.toLowerCase().includes(q.toLowerCase()));
  const isNew   = q.trim() && !lower.includes(q.trim().toLowerCase());
  const items   = [
    ...matches.map(e=>`<div class="ac-item" onclick="pickExerciseAddName('${esc(e)}')">${e}</div>`),
    isNew ? `<div class="ac-item" onclick="pickExerciseAddName('${esc(q.trim())}')" style="color:var(--accent)">+ Add "${q.trim()}"</div>` : ''
  ].join('');
  dd.innerHTML = items || `<div class="ac-item" style="color:var(--muted)">No matches</div>`;
  dd.style.display = 'block';
}

function pickExerciseAddName(name) {
  name = name.trim();
  if (!name) { showToast(t('Enter an exercise name'), false); return; }
  pickedMuscles = new Set(getMusclesForExercise(name));
  renderMusclePicker(name, 'openExercisesAddModal()', `confirmAddExerciseToLibrary('${esc(name)}')`);
}
function confirmAddExerciseToLibrary(name) {
  addExerciseToLibrary(name, [...pickedMuscles]);
}

// ── Templates section (top of Exercises tab) ─────────────
function templatesSectionHTML() {
  const t = DB.templates, keys = Object.keys(t);
  let rows = '';
  for (const k of keys) {
    rows += `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="min-width:0;flex:1;cursor:pointer" onclick="openTemplateBuilder('${esc(k)}')">
        <div style="font-size:14px;font-weight:700">${k}</div>
        <div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t[k].join(' · ')}</div>
      </div>
      <button class="btn btn-secondary btn-sm" style="flex-shrink:0;padding:6px 10px;font-size:11px" onclick="openTemplateBuilder('${esc(k)}')">Edit</button>
    </div>`;
  }
  return `
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${keys.length?'4px':'8px'}">
      <div style="font-size:15px;font-weight:800">📋 Workout Templates</div>
    </div>
    ${keys.length ? rows : `<div style="font-size:12px;color:var(--muted);margin-bottom:10px">Save your menu per session type — like Push or Pull — and load it in one tap when logging.</div>`}
    <button class="btn btn-accent-outline btn-full btn-sm" style="margin-top:${keys.length?'12px':'4px'}" onclick="openTemplateBuilder()">+ Create Template</button>
  </div>`;
}

// Template builder modal — pick a session type, search & tick exercises
let tplBuilder = { name:'', picked:[], query:'' };
function openTemplateBuilder(name) {
  tplBuilder = {
    name: name || '',
    picked: name && DB.templates[name] ? [...DB.templates[name]] : [],
    query: ''
  };
  renderTemplateBuilder();
  setTimeout(()=>document.getElementById('tpl-search')?.focus(), 150);
}
function renderTemplateBuilder() {
  const isEdit  = !!(tplBuilder.name && DB.templates[tplBuilder.name]);
  const presets = SESSION_PRESETS.map(p =>
    `<option value="${p}" ${tplBuilder.name===p?'selected':''}>${p}</option>`).join('');
  const showCustom = tplBuilder.name && !SESSION_PRESETS.includes(tplBuilder.name);

  document.getElementById('modal-content').innerHTML = `
  <div style="min-height:80vh;display:flex;flex-direction:column">
  <div style="font-size:18px;font-weight:700;margin-bottom:4px">${isEdit?'Edit':'Create'} Template</div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Pick a session type, then tick the exercises in your menu.</div>

  <div class="input-group">
    <div class="label">Session Type</div>
    <div class="select-wrap">
      <select onchange="tplBuilder.name=this.value==='__custom__'?'':this.value;renderTemplateBuilder()">
        <option value="" ${!tplBuilder.name?'selected':''}>Select session type…</option>
        ${presets}
        <option value="__custom__" ${showCustom?'selected':''}>✏️ Custom…</option>
      </select>
    </div>
  </div>
  ${showCustom?`<input type="text" placeholder="Type session name…" value="${tplBuilder.name}"
    oninput="tplBuilder.name=this.value" style="margin:-4px 0 12px" autocapitalize="words">`:''}

  <div class="label" style="margin-bottom:6px">Exercises (<span id="tpl-count">${tplBuilder.picked.length}</span> selected)</div>
  <div id="tpl-picked" style="margin-bottom:8px">
    ${tplBuilder.picked.map(n=>`<span class="ex-chip" style="background:var(--accent);color:#fff;border-color:var(--accent)" onclick="tplToggle('${esc(n)}')">✓ ${n}</span>`).join('')}
  </div>

  <input type="text" id="tpl-search" placeholder="Search exercises…" value="${tplBuilder.query.replace(/"/g,'&quot;')}"
    oninput="tplBuilder.query=this.value;tplRefreshList()"
    autocomplete="off" autocapitalize="words" autocorrect="off" spellcheck="false"
    style="margin-bottom:10px">

  <div id="tpl-list" style="flex:1;margin-bottom:14px">${tplListHTML()}</div>

  <div style="margin-top:auto">
    <button class="btn btn-primary btn-full" onclick="saveTemplateFromBuilder()">${isEdit?'Update':'Save'} Template</button>
    ${isEdit?`<button class="btn btn-danger btn-full" style="margin-top:8px" onclick="deleteTemplateFromBuilder('${esc(tplBuilder.name)}')">Delete Template</button>`:''}
  </div>
  </div>`;
  openModal();
}
function tplListHTML() {
  const q = (tplBuilder.query || '').trim().toLowerCase();
  const avail = allExerciseNames().filter(n => !tplBuilder.picked.includes(n))
    .filter(n => !q || n.toLowerCase().includes(q));
  if (!avail.length) {
    return q
      ? `<div style="font-size:12px;color:var(--muted);padding:8px 2px">No match for "${tplBuilder.query}". Add it from the Exercises tab first.</div>`
      : `<div style="font-size:12px;color:var(--muted);padding:8px 2px">All exercises selected</div>`;
  }
  return avail.map(n=>`<span class="ex-chip" onclick="tplToggle('${esc(n)}')">${n}</span>`).join('');
}
function tplRefreshList() {
  const el = document.getElementById('tpl-list');
  if (el) el.innerHTML = tplListHTML();
}
function tplToggle(n) {
  const i = tplBuilder.picked.indexOf(n);
  if (i >= 0) tplBuilder.picked.splice(i, 1); else tplBuilder.picked.push(n);
  // Update picked chips, count, and list in place (keeps search focus & keyboard)
  const picked = document.getElementById('tpl-picked');
  if (picked) picked.innerHTML = tplBuilder.picked.map(x=>`<span class="ex-chip" style="background:var(--accent);color:#fff;border-color:var(--accent)" onclick="tplToggle('${esc(x)}')">✓ ${x}</span>`).join('');
  const count = document.getElementById('tpl-count');
  if (count) count.textContent = tplBuilder.picked.length;
  tplRefreshList();
}
function saveTemplateFromBuilder() {
  const name = (tplBuilder.name || '').trim();
  if (!name) { showToast(t('Pick a session type'), false); return; }
  if (!tplBuilder.picked.length) { showToast(t('Select at least one exercise'), false); return; }
  const t = DB.templates;
  t[name] = [...tplBuilder.picked];
  DB.saveTemplates(t);
  closeModal();
  showToast(tf('{name} template saved 📋', {name:t(name)}));
  if (currentView === 'prs') renderPRs(); else showView('prs');
}
function deleteTemplateFromBuilder(name) {
  if (!confirm(tf('Delete the "{name}" template?', {name:t(name)}))) return;
  const t = DB.templates;
  delete t[name];
  DB.saveTemplates(t);
  closeModal();
  renderPRs();
  showToast(t('Template deleted'));
}

function addExerciseToLibrary(name, muscle) {
  name = name.trim(); if(!name) return;
  const exs = DB.exercises;
  if(!exs.includes(name)) { exs.push(name); DB.saveExercises(exs); }
  const mList = Array.isArray(muscle) ? muscle : (muscle ? [muscle] : []);
  if (mList.length) {
    const muscles = DB.exerciseMuscles;
    muscles[name] = mList;
    DB.saveExerciseMuscles(muscles);
  }
  closeModal();
  // Open this exercise's group so the user sees it land
  const bp = getBodyPartForExercise(name);
  openBPGroups.add(bp);
  renderPRs();
  showToast(t('Exercise added 💪'));
  setTimeout(()=>{
    document.getElementById(`bpg-${bp.replace(/\s/g,'_')}`)
      ?.scrollIntoView({behavior:'smooth',block:'start'});
  }, 120);
}

function renderInlineChart(progress, unit) {
  const area = document.getElementById('pr-chart-area');
  if(!area) return;
  if(progress.length < 2) {
    area.innerHTML = `<span>Log at least 2 sessions to see a chart</span>`;
    return;
  }
  area.innerHTML = `<div class="chart-wrap"><canvas id="prog-chart"></canvas></div>`;
  setTimeout(()=>drawProgressChart(progress, unit), 30);
}

function drawProgressChart(progress, unit) {
  const ctx = document.getElementById('prog-chart'); if(!ctx) return;
  if(prChart) { prChart.destroy(); prChart=null }

  const labels = progress.map(p=>{
    const d=new Date(p.date+'T12:00:00');
    return d.toLocaleDateString(L(),{month:'short',day:'numeric'});
  });

  prChart = new Chart(ctx, {
    type:'line',
    data:{
      labels,
      datasets:[
        {
          label:`Est. 1RM (${unit})`,
          data:progress.map(p=>p.est1RM),
          borderColor:'#f97316',backgroundColor:'rgba(249,115,22,0.12)',
          borderWidth:2.5,pointBackgroundColor:'#f97316',
          pointRadius:4,pointHoverRadius:6,tension:0.3,fill:true
        },
        {
          label:`Top Weight (${unit})`,
          data:progress.map(p=>p.weight),
          borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.05)',
          borderWidth:2,pointBackgroundColor:'#3b82f6',
          pointRadius:3,pointHoverRadius:5,tension:0.3,fill:false
        }
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#888',font:{size:11},boxWidth:12,padding:12}},
        tooltip:{
          backgroundColor:'#1a1a1a',borderColor:'#2a2a2a',borderWidth:1,
          titleColor:'#f0f0f0',bodyColor:'#aaa',
          callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}${unit}`}
        }
      },
      scales:{
        x:{grid:{color:'#1f1f1f'},ticks:{color:'#555',font:{size:10}}},
        y:{grid:{color:'#1f1f1f'},ticks:{color:'#555',font:{size:10},callback:v=>v+unit}}
      }
    }
  });
}

// ═══════════════════════════════════════════════════════
// GOALS VIEW
// ═══════════════════════════════════════════════════════
function renderGoals() {
  const goals = DB.goals;
  const unit  = DB.unit;
  const prs   = getPRs();
  syncGoalArchive();                 // capture any newly-reached goals
  const achieved = achievedGoals();

  let html = `
  <div class="section-header">
    <div style="font-size:22px;font-weight:800">Goals</div>
  </div>`;

  if(!goals.length) {
    html += achieved.length
      ? `<div class="card" style="text-align:center;padding:22px 20px">
           <div style="font-size:30px;margin-bottom:6px">🎯</div>
           <div style="font-weight:600;margin-bottom:6px">No active goals right now</div>
           <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Nice work hitting your past targets — set a new one to keep progressing.</div>
           <button class="btn btn-primary btn-sm" onclick="openAddGoalModal()">Set a New Goal</button>
         </div>`
      : `<div class="empty">
           <div class="empty-icon">🎯</div>
           <div style="font-weight:600;margin-bottom:8px">Goals turn workouts into progress</div>
           <div style="font-size:13px;margin-bottom:20px">Pick an exercise, a target weight × reps, and an optional deadline.<br>Every workout updates how close you are — with a celebration when you arrive. 🎉</div>
           <button class="btn btn-primary" onclick="openAddGoalModal()">Set Your First Goal</button>
         </div>`;
    html += achievedSectionHTML(achieved);
    document.getElementById('main').innerHTML = html;
    return;
  }

  for(const goal of goals) {
    if (isBodyWeightGoal(goal)) { html += bodyWeightGoalCardHTML(goal); continue; }
    const gp             = getGoalProgress(goal);
    const pr             = prs[goal.exercise];
    const hasPR          = !!pr?.bestSet;
    const done           = gp.done;

    // Current best set display
    const curWeight      = hasPR ? pr.displayWeight : '—';
    const curReps        = hasPR ? pr.bestSet.reps  : '—';

    // Target display (convert stored kg → display unit)
    const tgtWeight      = goal.targetWeightKg
      ? Math.round(dispW(goal.targetWeightKg, 'kg') * 10) / 10
      : '—';
    const tgtReps        = goal.targetReps || '—';

    // Progress bar % based on est. 1RM progress
    const pct = gp.target1RM > 0
      ? Math.min(100, Math.round((gp.currentKg / gp.target1RM) * 100))
      : 0;

    // Estimated weeks
    const weeksLeft = done ? 0 : estimateWeeks(goal.exercise, gp.target1RM);
    const etaText   = done
      ? `<span style="color:var(--green);font-weight:700">Goal reached! 🎉</span>`
      : weeksLeft === null
        ? `<span style="color:var(--muted)">Log more sets to estimate</span>`
        : weeksLeft === 0
          ? `<span style="color:var(--green);font-weight:700">Goal reached! 🎉</span>`
          : `<span style="color:var(--muted)">~${weeksLeft}w away</span>`;

    html += `
    <div class="goal-card${done?' goal-reached':''}" style="cursor:pointer" onclick="openEditGoalModal('${goal.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:16px;font-weight:700;margin-bottom:6px">${goal.exercise}</div>
          <div style="display:grid;grid-template-columns:auto 1fr;gap:4px 10px;font-size:13px">
            <span style="color:var(--muted)">Current</span>
            <span style="font-weight:600;color:${hasPR?'var(--text)':'var(--muted)'}">
              ${hasPR ? `${curWeight}${unit} × ${curReps} reps` : 'No data yet'}
            </span>
            <span style="color:var(--muted)">Target</span>
            <span style="font-weight:600;color:var(--accent)">${tgtWeight}${unit} × ${tgtReps} reps</span>
          </div>
        </div>
        ${done?'<span class="goal-done-badge" style="margin-left:8px;flex-shrink:0">✓ REACHED</span>':''}
        <button class="del-btn" onclick="event.stopPropagation();openEditGoalModal('${goal.id}')" style="color:var(--muted);margin-left:8px;flex-shrink:0">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </div>

      <div class="goal-bar-track">
        <div class="goal-bar-fill ${done?'done':''}" style="width:${pct}%"></div>
      </div>

      ${done ? `
      <div class="goal-celebrate"><span class="trophy">🏆</span><span>Goal reached!</span></div>
      <button class="goal-cta" onclick="event.stopPropagation();raiseGoalTarget('${goal.id}')">Set a New Target →</button>
      ` : goalDeadlinePassed(goal) ? goalReviewHTML(goal) : `
      <div class="goal-meta">
        <span>${etaText}</span>
        ${(() => { const dl = deadlineInfo(goal.targetDate); return dl
          ? `<span style="display:inline-flex;align-items:center;gap:4px;color:${dl.overdue?'var(--red)':'var(--muted)'}">📅 ${dl.date} · <strong style="color:${dl.overdue?'var(--red)':'var(--accent)'}">${dl.label}</strong></span>`
          : ''; })()}
      </div>`}
    </div>`;
  }

  // Achieved archive
  html += achievedSectionHTML(achieved);

  // Sticky add-goal button pinned at the bottom (matches Exercises tab)
  html += `
  <div style="height:64px"></div>
  <div class="sticky-action-bar">
    <button class="btn btn-primary btn-full" onclick="openAddGoalModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add Goal
    </button>
  </div>`;

  document.getElementById('main').innerHTML = html;
  initBwGoalCharts();
  checkGoalCelebrations();
}

// ── Body-weight goal card ──────────────────────────────
function bodyWeightGoalCardHTML(goal) {
  const unit  = DB.unit;
  const gp    = getGoalProgress(goal);
  const done  = gp.done;
  const cur   = currentBodyWeightKg();
  const curDisp   = cur != null ? Math.round(dispW(cur, 'kg') * 10) / 10 : '—';
  const tgtDisp   = Math.round(dispW(gp.targetKg, 'kg') * 10) / 10;
  const remDisp   = Math.round(dispW(gp.remainingKg, 'kg') * 10) / 10;
  const remLabel  = gp.losing ? tf('{n}{u} to lose', { n:remDisp, u:unit }) : tf('{n}{u} to gain', { n:remDisp, u:unit });
  const hasChart  = DB.bwLog.length >= 2;
  return `
  <div class="goal-card${done?' goal-reached':''}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div style="flex:1;min-width:0">
        <div style="font-size:16px;font-weight:700;margin-bottom:6px">⚖️ ${t('Body weight goal')}</div>
        <div style="display:grid;grid-template-columns:auto 1fr;gap:4px 10px;font-size:13px">
          <span style="color:var(--muted)">${t('Current')}</span>
          <span style="font-weight:600;color:${cur!=null?'var(--text)':'var(--muted)'}">${curDisp}${unit}</span>
          <span style="color:var(--muted)">${t('Target')}</span>
          <span style="font-weight:600;color:var(--accent)">${tgtDisp}${unit}</span>
        </div>
      </div>
      ${done?'<span class="goal-done-badge" style="margin-left:8px;flex-shrink:0">✓ REACHED</span>':''}
      <button class="del-btn" onclick="openEditGoalModal('${goal.id}')" style="color:var(--muted);margin-left:8px;flex-shrink:0">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
    </div>

    <div class="goal-bar-track">
      <div class="goal-bar-fill ${done?'done':''}" style="width:${gp.pct}%"></div>
    </div>

    ${done ? `
    <div class="goal-celebrate"><span class="trophy">🏆</span><span>${t('Goal reached!')}</span></div>
    <button class="goal-cta" onclick="raiseGoalTarget('${goal.id}')">${t('Set a New Target →')}</button>
    ` : goalDeadlinePassed(goal) ? goalReviewHTML(goal) : `
    <div class="goal-meta">
      <span>${cur!=null ? remLabel : t('Weigh in to track progress')}</span>
      ${(() => { const dl = deadlineInfo(goal.targetDate); return dl
        ? `<span style="display:inline-flex;align-items:center;gap:4px;color:${dl.overdue?'var(--red)':'var(--muted)'}">📅 ${dl.date} · <strong style="color:${dl.overdue?'var(--red)':'var(--accent)'}">${dl.label}</strong></span>`
        : ''; })()}
    </div>`}

    ${hasChart
      ? `<div class="label" style="margin:14px 0 6px">${t('Period')}</div>
         <div style="display:flex;gap:6px;margin-bottom:8px">
           ${['1m','3m','6m','all'].map(r => `
             <button class="btn btn-sm ${bwChartRange===r?'btn-primary':'btn-secondary'}"
               style="flex:1;justify-content:center;padding:6px 0;font-size:11px" onclick="setBwChartRange('${r}')">
               ${r==='all'?'All':r.toUpperCase()}</button>`).join('')}

let bwGoalCharts = [];
function setBwChartRange(range) {
  bwChartRange = range;
  renderGoals();
}
function initBwGoalCharts() {
  bwGoalCharts.forEach(c => { try { c.destroy(); } catch(e){} });
  bwGoalCharts = [];
  if (typeof Chart === 'undefined') return;
  const unit = DB.unit;
  const cut  = rangeCutoff(bwChartRange);
  let   log  = DB.bwLog;
  if (cut) log = log.filter(e => new Date(e.date + 'T12:00:00') >= cut);
  if (!log.length) return;
  const labels = log.map(e => new Date(e.date + 'T12:00:00').toLocaleDateString(L(), { month:'short', day:'numeric' }));
  const data   = log.map(e => Math.round(dispW(e.kg, 'kg') * 10) / 10);
  const trend  = trendLineValues(data);
  for (const goal of DB.goals) {
    if (!isBodyWeightGoal(goal)) continue;
    const cv = document.getElementById('bwchart-' + goal.id);
    if (!cv) continue;
    const target = Math.round(dispW(goal.targetWeightKg, 'kg') * 10) / 10;
    const datasets = [
      { label: t('Body weight'), data, borderColor:'#f97316', backgroundColor:'rgba(249,115,22,.12)',
        borderWidth:2.5, pointRadius:2, tension:.3, fill:true },
      { label: t('Target'), data: labels.map(() => target), borderColor:'#22c55e',
        borderWidth:1.5, borderDash:[5,4], pointRadius:0 }
    ];
    if (trend) datasets.push({ label:'Trend', data:trend, borderColor:'rgba(249,115,22,0.5)',
      borderDash:[4,4], borderWidth:1.5, pointRadius:0, tension:0, fill:false });
    bwGoalCharts.push(new Chart(cv, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: {
          legend:{ labels:{ color:'#888', font:{ size:11 }, boxWidth:12, padding:10 } },
          subtitle:{ display: log.length < 3, text: t('Log a few more sessions to see your trajectory'),
            color:'#666', font:{ size:10 }, padding:{ bottom:8 } },
          tooltip:{ backgroundColor:'#1a1a1a', borderColor:'#2a2a2a', borderWidth:1,
            titleColor:'#f0f0f0', bodyColor:'#aaa', callbacks:{ label: c => ` ${c.dataset.label}: ${c.parsed.y}${unit}` } }
        },
        scales: {
          x:{ offset:true, grid:{ color:'#1f1f1f' }, ticks:{ color:'#555', font:{ size:10 }, maxTicksLimit:6 } },
          y:{ grid:{ color:'#1f1f1f' }, ticks:{ color:'#555', font:{ size:10 }, callback:v => v+unit } }
        }
      }
    }));
  }
}

// Searchable exercise picker for the goal modal: body-part chips + text search
// (matches English + Japanese names). Results show once a chip or query is set.
function setGoalExBP(bp) {
  goalExBP = (goalExBP === bp) ? null : bp;
  ['Chest','Back','Legs','Glutes','Shoulders','Arms','Abs'].forEach(b => {
    const el = document.getElementById('goalbp-' + b);
    if (el) el.classList.toggle('active', b === goalExBP);
  });
  renderGoalExResults(document.getElementById('goal-ex-search')?.value || '');
}
function renderGoalExResults(q) {
  const box = document.getElementById('goal-ex-results');
  if (!box) return;
  const ql = (q || '').trim().toLowerCase(), bp = goalExBP, prs = getPRs(), unit = DB.unit;
  if (!ql && !bp) { box.style.display = 'none'; box.innerHTML = ''; return; }   // nothing chosen yet
  const matches = allExerciseNames().filter(e => {
    if (bp && getBodyPartForExercise(e) !== bp) return false;
    if (!ql) return true;
    if (e.toLowerCase().includes(ql)) return true;
    const ja = tkey(e);                          // also match the Japanese name
    return ja && ja.toLowerCase().includes(ql);
  }).slice(0, 80);
  box.innerHTML = matches.length ? matches.map(e => {
    const disp = DB.lang === 'ja' ? (tkey(e) || e) : e;
    const pr   = prs[e];
    const sub  = pr?.bestSet ? ` <span style="color:var(--muted);font-size:12px">· ${pr.displayWeight}${unit}×${pr.bestSet.reps}</span>` : '';
    return `<div class="ac-item" onclick="pickGoalExercise('${esc(e)}')">${disp}${sub}</div>`;
  }).join('') : `<div class="ac-item" style="color:var(--muted)">${t('No matches')}</div>`;
  box.style.display = 'block';
}
function pickGoalExercise(name) {
  document.getElementById('goal-exercise').value = name;
  const inp = document.getElementById('goal-ex-search');
  if (inp) inp.value = DB.lang === 'ja' ? (tkey(name) || name) : name;
  const box = document.getElementById('goal-ex-results');
  if (box) { box.style.display = 'none'; box.innerHTML = ''; }
  updateGoalCurrentPR(name);
}

function updateGoalCurrentPR(exerciseName) {
  const prs  = getPRs();
  const unit = DB.unit;
  const el   = document.getElementById('goal-current-pr');
  if(!el) return;
  const pr = prs[exerciseName];
  if(pr?.bestSet) {
    el.innerHTML = tf('Current PR: <strong style="color:var(--text)">{w}{u} × {r}</strong> · est. 1RM <strong style="color:var(--accent)">{e}{u}</strong>', {w:pr.displayWeight, u:unit, r:pr.bestSet.reps, e:pr.best1RM});
  } else {
    el.textContent = exerciseName ? t('No data yet for this exercise') : '';
  }
}

function saveGoal() {
  // ── Body-weight goal ──
  if (addGoalType === 'bw') {
    const cur = currentBodyWeightKg();
    if (cur == null) { showToast(t('Set your current weight first'), false); return; }
    let targetKg;
    if (bwGoalMode === 'lose') {
      const amt = +document.getElementById('bw-amount').value;
      if (!amt || amt <= 0) { showToast(t('Enter an amount'), false); return; }
      targetKg = cur - toKg(amt, DB.unit);
      if (targetKg <= 0) { showToast(t('Enter a smaller amount'), false); return; }
    } else {
      const tw = +document.getElementById('bw-target').value;
      if (!tw || tw <= 0) { showToast(t('Enter a target weight'), false); return; }
      targetKg = toKg(tw, DB.unit);
    }
    const targetDate = document.getElementById('goal-target-date').value || '';
    const goals = DB.goals;
    const existing = goals.findIndex(g => g.type === 'bodyweight');
    const obj = { id: existing >= 0 ? goals[existing].id : uid(), type:'bodyweight',
      targetWeightKg: Math.round(targetKg * 10) / 10, startWeightKg: cur, targetDate };
    if (existing >= 0) goals[existing] = obj; else goals.push(obj);
    DB.saveGoals(goals);
    closeModal();
    showToast(t('Goal saved! 🎯'));
    showView('goals');
    return;
  }
  // ── Strength goal ──
  let exercise       = document.getElementById('goal-exercise').value;
  if (!exercise) {   // user typed but didn't tap a result → resolve the text
    const typed = (document.getElementById('goal-ex-search')?.value || '').trim();
    if (typed) exercise = allExerciseNames().find(e =>
      e.toLowerCase() === typed.toLowerCase() || (tkey(e) || '') === typed) || '';
  }
  const targetDisp   = +document.getElementById('goal-target-weight').value;
  const targetReps   = +document.getElementById('goal-target-reps').value || 5;
  const targetDate   = document.getElementById('goal-target-date').value || '';
  if(!exercise) { showToast(t('Pick an exercise'), false); return }
  if(!targetDisp || targetDisp <= 0) { showToast(t('Enter a target weight'), false); return }

  const targetWeightKg = toKg(targetDisp, DB.unit);
  const goals          = DB.goals;

  // Replace if same exercise already has a goal, else add
  const existing = goals.findIndex(g => g.exercise === exercise);
  if(existing >= 0) {
    goals[existing] = { ...goals[existing], targetWeightKg, targetReps, targetDate };
  } else {
    goals.push({ id: uid(), exercise, targetWeightKg, targetReps, targetDate });
  }
  DB.saveGoals(goals);
  closeModal();
  showToast(t('Goal saved! 🎯'));
  showView('goals');
}

function updateGoal(id) {
  const goals = DB.goals;
  const i = goals.findIndex(g=>g.id===id);
  if(i<0) return;

  // ── Body-weight goal ──
  if (isBodyWeightGoal(goals[i])) {
    const tw = +document.getElementById('goal-edit-bw').value;
    if(!tw || tw <= 0) { showToast(t('Enter a valid weight'), false); return; }
    if (getGoalProgress(goals[i]).done) archiveGoalIfNew(goals[i]);
    goals[i].targetWeightKg = Math.round(toKg(tw, DB.unit) * 10) / 10;
    goals[i].targetDate     = document.getElementById('goal-edit-date').value || '';
    DB.saveGoals(goals);
    closeModal();
    showToast(t('Goal updated!'));
    renderGoals();
    return;
  }

  const targetDisp = +document.getElementById('goal-edit-weight').value;
  const targetReps = +document.getElementById('goal-edit-reps').value || 5;
  if(!targetDisp || targetDisp <= 0) { showToast(t('Enter a valid weight'), false); return }
  // If the current target was already reached, preserve it in the archive
  // before we overwrite it with the new (higher) target.
  if (getGoalProgress(goals[i]).done) archiveGoalIfNew(goals[i]);
  goals[i].targetWeightKg = toKg(targetDisp, DB.unit);
  goals[i].targetReps     = targetReps;
  goals[i].targetDate     = document.getElementById('goal-edit-date').value || '';
  DB.saveGoals(goals);
  closeModal();
  showToast(t('Goal updated!'));
  renderGoals();
}

function deleteGoal(id) {
  if(!confirm(t('Delete this goal?'))) return;
  DB.saveGoals(DB.goals.filter(g=>g.id!==id));
  closeModal();
  renderGoals();
}

function openModal() {
  const m = document.getElementById('modal');
  m.style.transform = '';        // clear any leftover swipe transform
  m.scrollTop = 0;
  document.getElementById('modal-overlay').style.background = '';
  document.getElementById('modal-overlay').classList.add('open');
  applyLang();
  updateScrollFab();
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  if(prChart && currentView!=='prs') { prChart.destroy(); prChart=null }
  editingWorkout = null;
  updateScrollFab();
}
function closeModalOutside(e) {
  if(e.target!==document.getElementById('modal-overlay')) return;
  if(editingWorkout) {
    // If in the edit workout modal itself → confirm discard
    if(document.getElementById('edit-exercises-section')) {
      if(!confirm(t('Discard changes?'))) return;
      cancelEditWorkout();
    } else {
      // In add-exercise sub-modal → return to edit modal
      renderWorkoutEditModal();
    }
    return;
  }
  closeModal();
}
